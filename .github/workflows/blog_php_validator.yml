name: Blog PHP Validator

on:
  push:
    branches:
      - master
    paths:
      - 'blog/**'
  pull_request:
    branches:
      - master
    paths:
      - 'blog/**'

jobs:
  php-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install PHP CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run PHP Validator
        run: |
          uv run blog/tests/php_validator.py blog/

      - name: Run JS Validator
        run: |
          uv run blog/tests/js_validator.py blog/

  php-render-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install PHP CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Remove mismatched chromedriver
        run: |
          sudo rm -f /usr/bin/chromedriver
          sudo rm -f /usr/local/bin/chromedriver

      - name: Run PHP Render Validator
        run: |
          uv run blog/tests/php_render_validator.py blog/
