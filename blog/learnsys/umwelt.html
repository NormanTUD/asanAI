<script type="module">
import * as THREE from 'three';

// ============================================================
// AUDIO – proper bird chirps, not sirens
// ============================================================
let audioCtx = null;
let soundEnabled = false;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

// Short chirp burst – sounds like a bird
function playChirp(freq, startTime, vol) {
  if (!audioCtx || !soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, startTime);
  osc.frequency.linearRampToValueAtTime(freq * 1.3, startTime + 0.04);
  osc.frequency.linearRampToValueAtTime(freq * 0.9, startTime + 0.08);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.01);
  gain.gain.linearRampToValueAtTime(0, startTime + 0.1);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(startTime);
  osc.stop(startTime + 0.12);
}

// Schedule bird song pattern
let birdInterval = null;
let birdVolume = 0.05;

function startBirds(volume) {
  birdVolume = volume;
  if (birdInterval) return;
  birdInterval = setInterval(() => {
    if (!audioCtx || !soundEnabled) return;
    const now = audioCtx.currentTime;
    const baseFreq = 2000 + Math.random() * 2000;
    // 2-4 chirps in quick succession
    const count = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      playChirp(baseFreq + Math.random() * 500, now + i * 0.12, birdVolume);
    }
  }, 1500 + Math.random() * 2000);
}

function stopBirds() {
  if (birdInterval) { clearInterval(birdInterval); birdInterval = null; }
}

// Gentle wave noise via buffer
let waveSource = null;
let waveGain = null;

function startWaves(volume) {
  if (!audioCtx || waveSource) return;
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  // Brown noise (wave-like)
  let last = 0;
  for (let i = 0; i < bufferSize; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    data[i] = last * 3.5;
  }
  waveSource = audioCtx.createBufferSource();
  waveSource.buffer = buffer;
  waveSource.loop = true;
  waveGain = audioCtx.createGain();
  waveGain.gain.value = volume;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  waveSource.connect(filter);
  filter.connect(waveGain);
  waveGain.connect(masterGain);
  waveSource.start();
}

function stopWaves() {
  if (waveSource) { waveSource.stop(); waveSource = null; }
}

function updateAudioForScene(name) {
  if (!audioCtx || !soundEnabled) return;
  stopBirds();
  switch(name) {
    case 'human':
      startBirds(0.03);
      if (waveGain) waveGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.5);
      break;
    case 'dog':
      startBirds(0.12); // dogs hear more
      if (waveGain) waveGain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
      break;
    case 'butterfly':
      startBirds(0.01);
      if (waveGain) waveGain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.5);
      break;
    case 'ai':
      if (waveGain) waveGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
      break;
  }
}

window.toggleSound = function() {
  const btn = document.getElementById('sound-toggle');
  if (!soundEnabled) {
    initAudio();
    soundEnabled = true;
    btn.textContent = '🔊 Sound';
    startWaves(0.06);
    updateAudioForScene(currentSceneName);
  } else {
    soundEnabled = false;
    btn.textContent = '🔇 Sound';
    stopBirds();
    stopWaves();
  }
};

// ============================================================
// THREE.JS SCENE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 100);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 3.5, 14);
camera.lookAt(0, 1.2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Post-processing for dog vision
const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
const desatScene = new THREE.Scene();
const desatCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const desatMaterial = new THREE.ShaderMaterial({
  uniforms: {
    tDiffuse: { value: null },
    dogVision: { value: 0.0 }
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float dogVision;
    varying vec2 vUv;
    void main() {
      vec4 c = texture2D(tDiffuse, vUv);
      vec3 dog = vec3(c.r*0.5+c.g*0.5, c.r*0.5+c.g*0.5, c.b);
      dog = mix(dog, vec3(dog.r*1.1, dog.g*1.05, dog.b*0.7), 0.3);
      gl_FragColor = vec4(mix(c.rgb, dog, dogVision), 1.0);
    }
  `
});
desatScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), desatMaterial));

// ============================================================
// LIGHTING
// ============================================================
scene.add(new THREE.AmbientLight(0x8899bb, 0.5));
const sun = new THREE.DirectionalLight(0xffeedd, 1.6);
sun.position.set(20, 25, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x445522, 0.35));

// ============================================================
// MATERIALS
// ============================================================
const skinMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.7 });
const shirtMat = new THREE.MeshStandardMaterial({ color: 0x2255aa, roughness: 0.75 });
const shortsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.8 });
const hairMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
const shoeMat = new THREE.MeshStandardMaterial({ color: 0xee4422, roughness: 0.6 });
const dogFurMat = new THREE.MeshStandardMaterial({ color: 0xc4883a, roughness: 0.9 });
const sandMat = new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.95 });
const wetSandMat = new THREE.MeshStandardMaterial({ color: 0x9a8060, roughness: 0.6 });
const waterMat = new THREE.MeshStandardMaterial({ color: 0x2266aa, roughness: 0.15, transparent: true, opacity: 0.75 });

// ============================================================
// SKY
// ============================================================
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor: { value: new THREE.Color(0x3366aa) },
    bottomColor: { value: new THREE.Color(0xffccaa) }
  },
  vertexShader: `varying vec3 vWP; void main() { vWP = (modelMatrix * vec4(position,1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWP; void main() { float h = normalize(vWP + 20.0).y; gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h,0.0),0.4),0.0)),1.0); }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(200, 32, 32), skyMat));

// ============================================================
// BEACH
// ============================================================
// Sand
const sandGeo = new THREE.PlaneGeometry(80, 30, 40, 15);
const sv = sandGeo.attributes.position;
for (let i = 0; i < sv.count; i++) {
  sv.setZ(i, Math.sin(sv.getX(i)*0.3)*0.12 + Math.random()*0.02);
}
sandGeo.computeVertexNormals();
const sand = new THREE.Mesh(sandGeo, sandMat);
sand.rotation.x = -Math.PI/2;
sand.position.set(0, 0, 5);
sand.receiveShadow = true;
scene.add(sand);

// Wet sand
const wetSand = new THREE.Mesh(new THREE.PlaneGeometry(80, 4), wetSandMat);
wetSand.rotation.x = -Math.PI/2;
wetSand.position.set(0, 0.01, -6);
wetSand.receiveShadow = true;
scene.add(wetSand);

// Water
const waterGeo = new THREE.PlaneGeometry(80, 40, 30, 15);
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.rotation.x = -Math.PI/2;
waterMesh.position.set(0, -0.15, -28);
scene.add(waterMesh);

// Dunes
for (let i = 0; i < 5; i++) {
  const dune = new THREE.Mesh(
    new THREE.SphereGeometry(2.5 + Math.random()*3, 10, 8, 0, Math.PI*2, 0, Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0xc4a878, roughness: 1 })
  );
  dune.position.set(-20 + i*10, 0, 16 + Math.random()*4);
  dune.scale.set(1.5, 0.35, 1);
  scene.add(dune);
}

// Beach grass
for (let i = 0; i < 20; i++) {
  const g = new THREE.Group();
  for (let j = 0; j < 6; j++) {
    const blade = new THREE.Mesh(
      new THREE.PlaneGeometry(0.04, 0.25 + Math.random()*0.25),
      new THREE.MeshStandardMaterial({ color: 0x6a8a3a, side: THREE.DoubleSide })
    );
    blade.position.set((Math.random()-0.5)*0.15, 0.12, (Math.random()-0.5)*0.15);
    blade.rotation.y = Math.random()*Math.PI;
    g.add(blade);
  }
  g.position.set((Math.random()-0.5)*50, 0, 10 + Math.random()*8);
  scene.add(g);
}

// Flowers
for (let i = 0; i < 15; i++) {
  const f = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.25,4), new THREE.MeshStandardMaterial({color:0x3a6a2a}));
  stem.position.y = 0.12;
  f.add(stem);
  const petal = new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6), new THREE.MeshStandardMaterial({
    color: [0xff6688,0xffaa44,0xffff66,0xaa66ff][Math.floor(Math.random()*4)]
  }));
  petal.position.y = 0.26;
  petal.scale.y = 0.5;
  f.add(petal);
  f.position.set((Math.random()-0.5)*40, 0, 8 + Math.random()*10);
  scene.add(f);
}

// Sun disc
const sunDisc = new THREE.Mesh(new THREE.CircleGeometry(3,32), new THREE.MeshBasicMaterial({color:0xffeecc}));
sunDisc.position.set(40, 30, -60);
sunDisc.lookAt(0,0,0);
scene.add(sunDisc);

// ============================================================
// JOGGER with animated legs
// ============================================================
function createJogger() {
  const group = new THREE.Group();
  
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.2,14,12), skinMat);
  head.position.y = 1.68; head.castShadow = true;
  group.add(head);
  
  // Hair
  const hair = new THREE.Mesh(new THREE.SphereGeometry(0.22,14,10,0,Math.PI*2,0,Math.PI*0.5), hairMat);
  hair.position.y = 1.72;
  group.add(hair);
  
  // Torso
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.13,0.5,10), shirtMat);
  torso.position.y = 1.15; torso.castShadow = true;
  group.add(torso);
  
  // Earbuds
  [-1,1].forEach(s => {
    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.022,6,6), new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3}));
    eb.position.set(s*0.17, 1.65, 0.05);
    group.add(eb);
  });
  
  // Phone
  const phone = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.08,0.005), new THREE.MeshStandardMaterial({color:0x111111,metalness:0.5}));
  phone.position.set(0.3, 0.95, 0.12);
  group.add(phone);
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.035,0.065), new THREE.MeshBasicMaterial({color:0x4488ff}));
  screen.position.set(0.3, 0.95, 0.125);
  group.add(screen);
  
  // Hips
  const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.12,0.16,10), shortsMat);
  hips.position.y = 0.82;
  group.add(hips);
  
  // ANIMATED ARMS (pivots at shoulder)
  [-1,1].forEach(side => {
    const armPivot = new THREE.Group();
    armPivot.position.set(side * 0.2, 1.32, 0);
    
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.28,8), shirtMat);
    upper.position.y = -0.14;
    armPivot.add(upper);
    
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.028,0.25,8), skinMat);
    lower.position.set(0, -0.32, 0.05);
    armPivot.add(lower);
    
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6), skinMat);
    hand.position.set(0, -0.42, 0.08);
    armPivot.add(hand);
    
    armPivot.userData = { type: 'joggerArm', side: side };
    group.add(armPivot);
  });
  
  // ANIMATED LEGS (pivots at hip)
  [-1,1].forEach(side => {
    const legPivot = new THREE.Group();
    legPivot.position.set(side * 0.07, 0.75, 0);
    
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.048,0.36,8), shortsMat);
    upper.position.y = -0.18;
    upper.castShadow = true;
    legPivot.add(upper);
    
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.042,0.035,0.34,8), skinMat);
    lower.position.y = -0.42;
    legPivot.add(lower);
    
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.045,0.13), shoeMat);
    shoe.position.set(0, -0.6, 0.02);
    shoe.castShadow = true;
    legPivot.add(shoe);
    
    legPivot.userData = { type: 'joggerLeg', side: side };
    group.add(legPivot);
  });
  
  return group;
}

// DOG with animated legs
// ============================================================
function createDog() {
  const group = new THREE.Group();

  body.rotation.z = Math.PI/2;
  body.position.set(0, 0.42, 0);
  body.castShadow = true;
  group.add(body);

  chest.position.set(0.2, 0.44, 0);
  group.add(chest);
  
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14,12,10), dogFurMat);
  head.position.set(0.4, 0.54, 0);
  head.castShadow = true;
  group.add(head);
  
  const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.11,8), dogFurMat);
  snout.rotation.z = Math.PI/2;
  snout.position.set(0.52, 0.51, 0);
  group.add(snout);

  nose.position.set(0.58, 0.52, 0);
  group.add(nose);
  
  [-1,1].forEach(s => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,6), dogFurMat);

    group.add(ear);
    
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6), new THREE.MeshStandardMaterial({color:0x2a1a0a}));
    eye.position.set(0.48, 0.57, s*0.065);
    group.add(eye);
  });
  
  // Tongue
  const tongue = new THREE.Mesh(new THREE.PlaneGeometry(0.025,0.04), new THREE.MeshStandardMaterial({color:0xff6688,side:THREE.DoubleSide}));
  tongue.position.set(0.55, 0.46, 0);
  tongue.rotation.y = Math.PI/2;
  group.add(tongue);
  
  // Tail
  const tailCurve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(-0.3,0.42,0), new THREE.Vector3(-0.45,0.7,0), new THREE.Vector3(-0.38,0.8,0)
  );
  const tail = new THREE.Mesh(new THREE.TubeGeometry(tailCurve,8,0.02,6,false), dogFurMat);
  tail.userData = { type: 'dogTail' };
  group.add(tail);
  
  // ANIMATED LEGS
  const legDefs = [
    { x: 0.17, z: 0.09, label: 'FL' },
    { x: 0.17, z: -0.09, label: 'FR' },
    { x: -0.17, z: 0.09, label: 'BL' },
    { x: -0.17, z: -0.09, label: 'BR' }
  ];
  legDefs.forEach(ld => {
    const pivot = new THREE.Group();
    pivot.position.set(ld.x, 0.32, ld.z);
    
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.03,0.2,8), dogFurMat);
    upper.position.y = -0.1;
    pivot.add(upper);
    
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.024,0.15,8), dogFurMat);
    lower.position.y = -0.22;
    pivot.add(lower);
    
    const paw = new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6), dogFurMat);
    paw.scale.y = 0.45;
    paw.position.y = -0.3;
    pivot.add(paw);
    
    pivot.userData = { type: 'dogLeg', label: ld.label };
    group.add(pivot);
  });
  
  return group;
}

// ============================================================
// BUTTERFLY (bigger, slower)
// ============================================================
function createButterfly() {
  const group = new THREE.Group();
  
  const bodyMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.6});
  const wingMat1 = new THREE.MeshStandardMaterial({color:0xff6600, roughness:0.5, side:THREE.DoubleSide, transparent:true, opacity:0.85});
  const wingMat2 = new THREE.MeshStandardMaterial({color:0xffaa22, roughness:0.5, side:THREE.DoubleSide, transparent:true, opacity:0.8});
  
  // Body (bigger than before)
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.025, 0.12, 6, 8), bodyMat);
  group.add(body);
  
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), bodyMat);
  head.position.y = 0.09;
  group.add(head);
  
  // Antennae
  [-1,1].forEach(side => {
    const curve = new THREE.QuadraticBezierCurve3(
      new THREE.Vector3(0, 0.09, 0),
      new THREE.Vector3(side*0.04, 0.16, 0.02),
      new THREE.Vector3(side*0.06, 0.18, 0)
    );
    const geo = new THREE.TubeGeometry(curve, 6, 0.003, 4, false);
    group.add(new THREE.Mesh(geo, bodyMat));
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.006, 4, 4), bodyMat);
    tip.position.set(side*0.06, 0.18, 0);
    group.add(tip);
  });
  
  // Upper wings (larger, monarch-style)

function createBubble(radius, color, opacity) {
  const geo = new THREE.SphereGeometry(radius, 48, 36);
  const mat = new THREE.MeshPhysicalMaterial({
    color, transparent:true, opacity, side:THREE.DoubleSide,
    depthWrite:false, roughness:0.05, transmission:0.5, thickness:0.3, clearcoat:1.0
  });
  return new THREE.Mesh(geo, mat);
}

function createTextSprite(text, color, fontSize, maxWidth) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = `bold ${fontSize||32}px Segoe UI, Arial, sans-serif`;
  ctx.fillStyle = color || '#ffffff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 8;
  ctx.fillText(text, 256, 64);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({map:texture, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(maxWidth||2, 0.5, 1);
  return sprite;
}

// ============================================================
// MOVEMENT – jogger loops left to right, dog ahead, butterfly opposite
// ============================================================
const WALK_SPEED = 1.8; // units per second
const WALK_LEFT = -25;
const WALK_RIGHT = 25;
const BUTTERFLY_SPEED = 0.6; // much slower
const BUTTERFLY_LEFT = -30;
const BUTTERFLY_RIGHT = 30;

let joggerX = WALK_LEFT;
let dogX = joggerX + 3; // dog is 3 units ahead
let butterflyX = BUTTERFLY_RIGHT;
let moveTime = 0;

function updateMovement(dt) {
  moveTime += dt;
  
  // Jogger: left to right, then reset
  joggerX += WALK_SPEED * dt;
  if (joggerX > WALK_RIGHT) joggerX = WALK_LEFT;
  
  jogger.position.x = joggerX;
  jogger.position.y = Math.abs(Math.sin(moveTime * 4.5)) * 0.06; // jog bounce
  
  // Animate jogger legs (pendulum swing)
  jogger.children.forEach(child => {
    if (child.userData && child.userData.type === 'joggerLeg') {
      const phase = child.userData.side === 1 ? 0 : Math.PI;
      child.rotation.x = Math.sin(moveTime * 9 + phase) * 0.6;
    }
    if (child.userData && child.userData.type === 'joggerArm') {
      const phase = child.userData.side === 1 ? Math.PI : 0; // opposite to legs
      child.rotation.x = Math.sin(moveTime * 9 + phase) * 0.4;
    }
  });
  
  // Dog: ahead of jogger, slight weave
  const dogTargetX = joggerX + 3;
  dogX += (dogTargetX - dogX) * 0.05;
  if (dogX > WALK_RIGHT + 3) dogX = WALK_LEFT + 3;
  
  dog.position.x = dogX;
  dog.position.z = -3 + Math.sin(moveTime * 0.8) * 1.0; // slight weave
  dog.position.y = Math.abs(Math.sin(moveTime * 5)) * 0.03;
  
  // Dog looks roughly forward
  const dogDz = Math.cos(moveTime * 0.8) * 1.0;
  dog.rotation.y = Math.atan2(WALK_SPEED, dogDz) * 0.3 + Math.PI * 0.3;
  
  // Animate dog legs
  dog.children.forEach(child => {
    if (child.userData && child.userData.type === 'dogLeg') {
      const isLeft = child.userData.label.includes('L');
      const isFront = child.userData.label.includes('F');
      const phase = (isLeft ? 0 : Math.PI) + (isFront ? 0 : Math.PI * 0.5);
      child.rotation.x = Math.sin(moveTime * 8 + phase) * 0.35;
    }
    if (child.userData && child.userData.type === 'dogTail') {
      child.rotation.y = Math.sin(moveTime * 8) * 0.4;
    }
  });
  
  // Butterfly: right to left, MUCH slower, gentle bob
  butterflyX -= BUTTERFLY_SPEED * dt;
  if (butterflyX < BUTTERFLY_LEFT) butterflyX = BUTTERFLY_RIGHT;
  
  butterfly.position.x = butterflyX;
  butterfly.position.y = 1.8 + Math.sin(moveTime * 0.5) * 0.4 + Math.sin(moveTime * 0.2) * 0.2;
  butterfly.position.z = -1 + Math.sin(moveTime * 0.3) * 1.5;
  
  // Wing flapping
  butterfly.children.forEach(child => {
    if (child.userData && child.userData.type === 'butterflyWing') {
      const flapSpeed = 8;
      const flapAmount = child.userData.wingType === 'upper' ? 0.7 : 0.5;
      child.rotation.y = child.userData.side * (Math.sin(moveTime * flapSpeed) * flapAmount + 0.15);
    }
  });
}

  const upperGeo = new THREE.ShapeGeometry(upperShape);
  [-1,1].forEach(side => {
    const wing = new THREE.Mesh(upperGeo, wingMat1);
    wing.scale.set(side * 1.4, 1.4, 1);
    wing.position.set(0, 0.02, 0);
    wing.rotation.x = Math.PI / 2;
    wing.userData = { type: 'butterflyWing', side: side, wingType: 'upper' };
    group.add(wing);
  });
  
  // Lower wings (smaller)
  const lowerShape = new THREE.Shape();
  lowerShape.moveTo(0, 0);
  lowerShape.bezierCurveTo(0.03, 0.04, 0.08, 0.05, 0.09, 0.02);
  lowerShape.bezierCurveTo(0.08, -0.02, 0.04, -0.03, 0, 0);
  
  const lowerGeo = new THREE.ShapeGeometry(lowerShape);
  [-1,1].forEach(side => {
    const wing = new THREE.Mesh(lowerGeo, wingMat2);
    wing.scale.set(side * 1.4, 1.4, 1);
    wing.position.set(0, -0.04, 0);
    wing.rotation.x = Math.PI / 2;
    wing.userData = { type: 'butterflyWing', side: side, wingType: 'lower' };
    group.add(wing);
  });
  
  // Wing spots
  [-1,1].forEach(side => {
    const spot = new THREE.Mesh(
      new THREE.CircleGeometry(0.015, 8),
      new THREE.MeshStandardMaterial({color:0x111111, side:THREE.DoubleSide})
    );
    spot.position.set(side*0.07, 0.02, 0.015);
    spot.rotation.x = Math.PI/2;
    group.add(spot);
  });
  
  return group;
}

function createBubble(radius, color, opacity) {
  const geo = new THREE.SphereGeometry(radius, 48, 36);
  const mat = new THREE.MeshPhysicalMaterial({
    color, transparent:true, opacity, side:THREE.DoubleSide,
    depthWrite:false, roughness:0.05, transmission:0.5, thickness:0.3, clearcoat:1.0
  });
  return new THREE.Mesh(geo, mat);
}

function createTextSprite(text, color, fontSize, maxWidth) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = `bold ${fontSize||32}px Segoe UI, Arial, sans-serif`;
  ctx.fillStyle = color || '#ffffff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 8;
  ctx.fillText(text, 256, 64);
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({map:texture, transparent:true, depthTest:false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(maxWidth||2, 0.5, 1);
  return sprite;
}

// ============================================================
// MOVEMENT – jogger loops left to right, dog ahead, butterfly opposite
// ============================================================
const WALK_SPEED = 1.8; // units per second
const WALK_LEFT = -25;
const WALK_RIGHT = 25;
const BUTTERFLY_SPEED = 0.6; // much slower
const BUTTERFLY_LEFT = -30;
const BUTTERFLY_RIGHT = 30;

let joggerX = WALK_LEFT;
let dogX = joggerX + 3; // dog is 3 units ahead
let butterflyX = BUTTERFLY_RIGHT;
let moveTime = 0;

function updateMovement(dt) {
  moveTime += dt;
  
  // Jogger: left to right, then reset
  joggerX += WALK_SPEED * dt;
  if (joggerX > WALK_RIGHT) joggerX = WALK_LEFT;
  
  jogger.position.x = joggerX;
  jogger.position.y = Math.abs(Math.sin(moveTime * 4.5)) * 0.06; // jog bounce
  
  // Animate jogger legs (pendulum swing)
  jogger.children.forEach(child => {
    if (child.userData && child.userData.type === 'joggerLeg') {
      const phase = child.userData.side === 1 ? 0 : Math.PI;
      child.rotation.x = Math.sin(moveTime * 9 + phase) * 0.6;
    }
    if (child.userData && child.userData.type === 'joggerArm') {
      const phase = child.userData.side === 1 ? Math.PI : 0; // opposite to legs
      child.rotation.x = Math.sin(moveTime * 9 + phase) * 0.4;
    }
  });
  
  // Dog: ahead of jogger, slight weave
  const dogTargetX = joggerX + 3;
  dogX += (dogTargetX - dogX) * 0.05;
  if (dogX > WALK_RIGHT + 3) dogX = WALK_LEFT + 3;
  
  dog.position.x = dogX;
  dog.position.z = -3 + Math.sin(moveTime * 0.8) * 1.0; // slight weave
  dog.position.y = Math.abs(Math.sin(moveTime * 5)) * 0.03;
  
  // Dog looks roughly forward
  const dogDz = Math.cos(moveTime * 0.8) * 1.0;
  dog.rotation.y = Math.atan2(WALK_SPEED, dogDz) * 0.3 + Math.PI * 0.3;
  
  // Animate dog legs
  dog.children.forEach(child => {
    if (child.userData && child.userData.type === 'dogLeg') {
      const isLeft = child.userData.label.includes('L');
      const isFront = child.userData.label.includes('F');
      const phase = (isLeft ? 0 : Math.PI) + (isFront ? 0 : Math.PI * 0.5);
      child.rotation.x = Math.sin(moveTime * 8 + phase) * 0.35;
    }
    if (child.userData && child.userData.type === 'dogTail') {
      child.rotation.y = Math.sin(moveTime * 8) * 0.4;
    }
  });
  
  // Butterfly: right to left, MUCH slower, gentle bob
  butterflyX -= BUTTERFLY_SPEED * dt;
  if (butterflyX < BUTTERFLY_LEFT) butterflyX = BUTTERFLY_RIGHT;
  
  butterfly.position.x = butterflyX;
  butterfly.position.y = 1.8 + Math.sin(moveTime * 0.5) * 0.4 + Math.sin(moveTime * 0.2) * 0.2;
  butterfly.position.z = -1 + Math.sin(moveTime * 0.3) * 1.5;
  
  // Wing flapping
  butterfly.children.forEach(child => {
    if (child.userData && child.userData.type === 'butterflyWing') {
      const flapSpeed = 8;
      const flapAmount = child.userData.wingType === 'upper' ? 0.7 : 0.5;
      child.rotation.y = child.userData.side * (Math.sin(moveTime * flapSpeed) * flapAmount + 0.15);
    }
  });
}

      // Floating data fragments
      for (let i = 0; i < 70; i++) {
        const cube = new THREE.Mesh(
          new THREE.BoxGeometry(0.025,0.025,0.025),
          new THREE.MeshBasicMaterial({color:0x1a1a2a, transparent:true, opacity:0.2})
        );
        cube.position.set(
          (Math.random()-0.5)*12,
          Math.random()*6,
          (Math.random()-0.5)*8
        );
        cube.userData = { type:'dataFloat', baseY:cube.position.y, floatSpeed:0.001+Math.random()*0.004 };
        scene.add(cube);
        overlayObjects.push(cube);
      }
      
      // Key annotations
      const anno1 = createTextSprite('"Baum" = nahe "grün", "Natur" — kein echter Baum', '#556666', 16, 4);
      anno1.position.set(-2, 4.0, 1);
      scene.add(anno1);
      overlayObjects.push(anno1);
      
      const anno2 = createTextSprite('"Strand" = nahe "Sand", "Meer" — kein Sand unter den Füßen', '#556666', 16, 4);
      anno2.position.set(2.5, 3.2, 0.5);
      scene.add(anno2);
      overlayObjects.push(anno2);
      
      const anno3 = createTextSprite('v_schmerz = [0.12, -0.54, 0.87, ...] — bedeutungslos', '#664444', 16, 4);
      anno3.position.set(-3, -0.2, -1);
      scene.add(anno3);
      overlayObjects.push(anno3);
      
      const annoTop = createTextSprite('← Kopfhörer → Übersetzungs-KI → Vektorraum', '#445566', 16, 4.5);
      annoTop.position.set(0, 5.5, 0);
      scene.add(annoTop);
      overlayObjects.push(annoTop);
      
      setCameraTarget([0, 3, 10], [0, 2.5, 0]);
      break;
    }
  }
  
  updateAudioForScene(name);
};

// ============================================================
// ANIMATION LOOP
// ============================================================
let time = 0;
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  time += dt;
  
  // Update movement (jogger, dog, butterfly)
  updateMovement(dt);
  
  // Smooth camera – very gentle, almost stable
  camera.position.lerp(camTargetPos, 0.02);
  const currentLookAt = new THREE.Vector3();
  // Gentle sway
  const swayX = Math.sin(time * 0.15) * 0.08;
  const swayY = Math.cos(time * 0.1) * 0.03;
  currentLookAt.copy(camTargetLookAt);
  currentLookAt.x += swayX;
  currentLookAt.y += swayY;
  camera.lookAt(currentLookAt);
  
  // Smooth dog vision transition
  const curDV = desatMaterial.uniforms.dogVision.value;
  desatMaterial.uniforms.dogVision.value += (targetDogVision - curDV) * 0.03;
  
  // Update overlay objects
  overlayObjects.forEach(obj => {
    if (!obj.userData) return;
    
    // Follow jogger
    if (obj.userData.type === 'followJogger') {
      obj.position.x = jogger.position.x;
      obj.position.z = jogger.position.z;
      if (obj.userData.offsetY !== undefined) obj.position.y = obj.userData.offsetY;
    }
    
    // Follow dog
    if (obj.userData.type === 'followDog') {
      obj.position.x = dog.position.x;
      obj.position.z = dog.position.z;
      if (obj.userData.offsetY !== undefined) obj.position.y = obj.userData.offsetY;
    }
    
    // Follow butterfly
    if (obj.userData.type === 'followButterfly') {
      obj.position.x = butterfly.position.x + (obj.userData.offsetX || 0);
      obj.position.y = butterfly.position.y + (obj.userData.offsetY || 0);
      obj.position.z = butterfly.position.z;
    }
    
    // Orbiting particles
    if (obj.userData.type === 'orbitParticle') {
      obj.userData.angle += obj.userData.speed;
      
      let cx = 0, cz = 0, cy = 0;
      if (obj.userData.follow === 'jogger') {
        cx = jogger.position.x;
        cz = jogger.position.z;
      } else if (obj.userData.follow === 'dog') {
        cx = dog.position.x;
        cz = dog.position.z;
      } else if (obj.userData.follow === 'butterfly') {
        cx = butterfly.position.x;
        cz = butterfly.position.z;
        cy = butterfly.position.y;
      }
      
      obj.position.x = cx + Math.cos(obj.userData.angle) * obj.userData.radius;
      obj.position.z = cz + Math.sin(obj.userData.angle) * obj.userData.radius;
      
      if (obj.userData.follow === 'butterfly') {
        obj.position.y = cy + Math.sin(time * obj.userData.bobSpeed + obj.userData.angle) * obj.userData.bobAmt;
      } else {
        obj.position.y = obj.userData.baseY + Math.sin(time * obj.userData.bobSpeed + obj.userData.angle) * obj.userData.bobAmt;
      }
    }
    
    // Knowledge orbit labels
    if (obj.userData.type === 'knowledgeOrbit') {
      obj.userData.angle += 0.0015;
      obj.position.x = jogger.position.x + Math.cos(obj.userData.angle) * obj.userData.radius;
      obj.position.z = jogger.position.z + Math.sin(obj.userData.angle) * obj.userData.radius;
      obj.position.y = obj.userData.offsetY;
    }
    
    // Dog sound waves
    if (obj.userData.type === 'dogSound') {
      obj.position.x = dog.position.x;
      obj.position.z = dog.position.z;
      obj.position.y = 0.6;
      const pulse = 1 + Math.sin(time * 1.8 + obj.userData.phase) * 0.2;
      obj.scale.set(pulse, pulse, pulse);
      obj.material.opacity = 0.05 + Math.sin(time * 1.8 + obj.userData.phase) * 0.05;
    }
    
    // Token glow pulse (AI scene)
    if (obj.userData.type === 'tokenGlow') {
      obj.material.opacity = 0.05 + Math.sin(time * 2 + obj.position.x * 3) * 0.04;
    }
    
    // Floating data cubes (AI scene)
    if (obj.userData.type === 'dataFloat') {
      obj.position.y = obj.userData.baseY + Math.sin(time * 1.2 + obj.position.x * 2) * 0.25;
      obj.rotation.x += 0.006;
      obj.rotation.y += 0.009;
    }
    
    // Server lines pulse (AI scene)
    if (obj.userData.type === 'serverLine') {
      obj.material.opacity = 0.3 + Math.sin(time * 3 + obj.userData.phase) * 0.3;
    }
    
    // AI eye
    if (obj.userData.type === 'aiEye') {
      obj.material.color.setHSL(0.55 + Math.sin(time * 0.5) * 0.05, 0.8, 0.5);
    }
    if (obj.userData.type === 'aiEyeGlow') {
      obj.material.opacity = 0.1 + Math.sin(time * 1.5) * 0.1;
    }
  });
  
  // Bubble breathing
  overlayObjects.forEach(obj => {
    if (obj.geometry && obj.geometry.type === 'SphereGeometry' &&
        obj.material && obj.material.transparent &&
        obj.material.opacity < 0.1 && obj.material.opacity > 0.005 &&
        !obj.userData.type) {
      const breathe = 1 + Math.sin(time * 0.5) * 0.012;
      obj.scale.set(breathe, breathe, breathe);
    }
  });
  
  // Water animation (gentle)
  const wv = waterMesh.geometry.attributes.position;
  for (let i = 0; i < wv.count; i++) {
    const x = wv.getX(i);
    const y = wv.getY(i);
    wv.setZ(i, Math.sin(x*0.25 + time*0.6)*0.12 + Math.sin(y*0.3 + time*0.4)*0.08);
  }
  wv.needsUpdate = true;
  waterMesh.geometry.computeVertexNormals();
  
  // Render with post-processing if dog vision active
  if (desatMaterial.uniforms.dogVision.value > 0.01) {
    renderer.setRenderTarget(renderTarget);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    desatMaterial.uniforms.tDiffuse.value = renderTarget.texture;
    renderer.render(desatScene, desatCamera);
  } else {
    renderer.render(scene, camera);
  }
}

animate();

// ============================================================
// WINDOW RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderTarget.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// START
// ============================================================
window.switchScene('human');

</script>
