<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Umwelten – Uexküll meets AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #info-panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);

    max-width: 680px; text-align: center; z-index: 20;
    font-size: 13.5px; line-height: 1.75;
    backdrop-filter: blur(16px); box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #info-panel em { color: #88bbff; }
  #info-panel strong { color: #fff; }
  #scene-label {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 20px; z-index: 20; letter-spacing: 3px; font-weight: 300;
    text-shadow: 0 2px 15px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.35); padding: 8px 28px; border-radius: 10px;
    backdrop-filter: blur(10px);
  }
  #nav-buttons {
    position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 6px;
  }
  #nav-buttons button {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    color: #bbb; padding: 7px 18px; cursor: pointer;
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px;
    border-radius: 22px; transition: all 0.35s; backdrop-filter: blur(6px);
  }
  #nav-buttons button:hover { background: rgba(255,255,255,0.18); color: #fff; }
  #nav-buttons button.active { background: rgba(100,180,255,0.2); border-color: rgba(100,180,255,0.45); color: #fff; }
  #sound-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 25;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: #aaa; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;
  }
  #sound-toggle:hover { color: #fff; }
</style>
</head>
<body>
<div id="scene-label">UMWELTEN</div>
<div id="nav-buttons">
  <button onclick="switchScene('human')">👤 Mensch</button>
  <button onclick="switchScene('dog')">🐕 Hund</button>
  <button onclick="switchScene('butterfly')">🦋 Schmetterling</button>
  <button onclick="switchScene('ai')">🤖 KI</button>
</div>
<button id="sound-toggle" onclick="toggleSound()">🔇 Sound</button>
<div id="info-panel">
  Ein Jogger am Strand mit seinem Hund. Ein Schmetterling fliegt vorbei.<br>
  Jedes Wesen lebt in seiner eigenen <strong>Umwelt</strong> – seiner subjektiven Blase.
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';

/* ===== AUDIO ===== */
let audioCtx=null, soundEnabled=false, masterGain=null, birdInterval=null, birdVolume=0.05, waveSource=null, waveGainNode=null;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0.3;masterGain.connect(audioCtx.destination);}
function playChirp(freq,st,vol){if(!audioCtx||!soundEnabled)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(freq,st);o.frequency.linearRampToValueAtTime(freq*1.3,st+0.04);o.frequency.linearRampToValueAtTime(freq*0.9,st+0.08);g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.01);g.gain.linearRampToValueAtTime(0,st+0.1);o.connect(g);g.connect(masterGain);o.start(st);o.stop(st+0.12);}
function startBirds(v){birdVolume=v;if(birdInterval)return;birdInterval=setInterval(()=>{if(!audioCtx||!soundEnabled)return;const n=audioCtx.currentTime,f=2000+Math.random()*2000,c=2+Math.floor(Math.random()*3);for(let i=0;i<c;i++)playChirp(f+Math.random()*500,n+i*0.12,birdVolume);},1500+Math.random()*2000);}
function stopBirds(){if(birdInterval){clearInterval(birdInterval);birdInterval=null;}}
function startWaves(v){if(!audioCtx||waveSource)return;const bs=audioCtx.sampleRate*2,buf=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),d=buf.getChannelData(0);let l=0;for(let i=0;i<bs;i++){l=(l+0.02*(Math.random()*2-1))/1.02;d[i]=l*3.5;}waveSource=audioCtx.createBufferSource();waveSource.buffer=buf;waveSource.loop=true;waveGainNode=audioCtx.createGain();waveGainNode.gain.value=v;const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;waveSource.connect(f);f.connect(waveGainNode);waveGainNode.connect(masterGain);waveSource.start();}
function stopWaves(){if(waveSource){waveSource.stop();waveSource=null;}}
function updateAudioForScene(n){if(!audioCtx||!soundEnabled)return;stopBirds();const t=audioCtx.currentTime;switch(n){case'human':startBirds(0.03);if(waveGainNode)waveGainNode.gain.linearRampToValueAtTime(0.06,t+0.5);break;case'dog':startBirds(0.12);if(waveGainNode)waveGainNode.gain.linearRampToValueAtTime(0.1,t+0.5);break;case'butterfly':startBirds(0.01);if(waveGainNode)waveGainNode.gain.linearRampToValueAtTime(0.02,t+0.5);break;case'ai':if(waveGainNode)waveGainNode.gain.linearRampToValueAtTime(0,t+0.8);break;}}
window.toggleSound=function(){const b=document.getElementById('sound-toggle');if(!soundEnabled){initAudio();soundEnabled=true;b.textContent='🔊 Sound';startWaves(0.06);updateAudioForScene(currentSceneName);}else{soundEnabled=false;b.textContent='🔇 Sound';stopBirds();stopWaves();}};

/* ===== THREE.JS SCENE ===== */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0x87CEEB,50,100);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,500);
camera.position.set(0,3.5,14);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

/* Post-processing for dog vision */
const renderTarget=new THREE.WebGLRenderTarget(window.innerWidth,window.innerHeight);
const desatScene=new THREE.Scene();
const desatCamera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const desatMaterial=new THREE.ShaderMaterial({
  uniforms:{tDiffuse:{value:null},dogVision:{value:0.0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.0);}`,
  fragmentShader:`uniform sampler2D tDiffuse;uniform float dogVision;varying vec2 vUv;void main(){vec4 c=texture2D(tDiffuse,vUv);vec3 dg=vec3(c.r*0.5+c.g*0.5,c.r*0.5+c.g*0.5,c.b);dg=mix(dg,vec3(dg.r*1.1,dg.g*1.05,dg.b*0.7),0.3);gl_FragColor=vec4(mix(c.rgb,dg,dogVision),1.0);}`
});
desatScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),desatMaterial));

/* Lighting */
scene.add(new THREE.AmbientLight(0x8899bb,0.5));
const sun=new THREE.DirectionalLight(0xffeedd,1.6);
sun.position.set(20,25,15);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-30;sun.shadow.camera.right=30;
sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB,0x445522,0.35));

/* Materials */
const skinMat=new THREE.MeshStandardMaterial({color:0xd4a574,roughness:0.7});
const shirtMat=new THREE.MeshStandardMaterial({color:0x2255aa,roughness:0.75});
const shortsMat=new THREE.MeshStandardMaterial({color:0x1a1a2a,roughness:0.8});
const hairMat=new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.9});
const shoeMat=new THREE.MeshStandardMaterial({color:0xee4422,roughness:0.6});
const dogFurMat=new THREE.MeshStandardMaterial({color:0xc4883a,roughness:0.9});

/* Sky */
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,
  uniforms:{topColor:{value:new THREE.Color(0x3366aa)},bottomColor:{value:new THREE.Color(0xffccaa)}},
  vertexShader:`varying vec3 vWP;void main(){vWP=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform vec3 topColor;uniform vec3 bottomColor;varying vec3 vWP;void main(){float h=normalize(vWP+20.0).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(pow(max(h,0.0),0.4),0.0)),1.0);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(200,32,32),skyMat));

/* Beach */
const sandGeo=new THREE.PlaneGeometry(80,30,40,15);
const sv=sandGeo.attributes.position;
for(let i=0;i<sv.count;i++)sv.setZ(i,Math.sin(sv.getX(i)*0.3)*0.12+Math.random()*0.02);
sandGeo.computeVertexNormals();
const sand=new THREE.Mesh(sandGeo,new THREE.MeshStandardMaterial({color:0xd4b896,roughness:0.95}));
sand.rotation.x=-Math.PI/2;sand.position.set(0,0,5);sand.receiveShadow=true;scene.add(sand);

const wetSand=new THREE.Mesh(new THREE.PlaneGeometry(80,4),new THREE.MeshStandardMaterial({color:0x9a8060,roughness:0.6}));
wetSand.rotation.x=-Math.PI/2;wetSand.position.set(0,0.01,-6);wetSand.receiveShadow=true;scene.add(wetSand);

const waterGeo=new THREE.PlaneGeometry(80,40,30,15);
const waterMesh=new THREE.Mesh(waterGeo,new THREE.MeshStandardMaterial({color:0x2266aa,roughness:0.15,transparent:true,opacity:0.75}));
waterMesh.rotation.x=-Math.PI/2;waterMesh.position.set(0,-0.15,-28);scene.add(waterMesh);

for(let i=0;i<5;i++){const d=new THREE.Mesh(new THREE.SphereGeometry(2.5+Math.random()*3,10,8,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0xc4a878,roughness:1}));d.position.set(-20+i*10,0,16+Math.random()*4);d.scale.set(1.5,0.35,1);scene.add(d);}
for(let i=0;i<20;i++){const g=new THREE.Group();for(let j=0;j<6;j++){const b=new THREE.Mesh(new THREE.PlaneGeometry(0.04,0.25+Math.random()*0.25),new THREE.MeshStandardMaterial({color:0x6a8a3a,side:THREE.DoubleSide}));b.position.set((Math.random()-0.5)*0.15,0.12,(Math.random()-0.5)*0.15);b.rotation.y=Math.random()*Math.PI;g.add(b);}g.position.set((Math.random()-0.5)*50,0,10+Math.random()*8);scene.add(g);}
for(let i=0;i<15;i++){const f=new THREE.Group();const st=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.25,4),new THREE.MeshStandardMaterial({color:0x3a6a2a}));st.position.y=0.12;f.add(st);const p=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),new THREE.MeshStandardMaterial({color:[0xff6688,0xffaa44,0xffff66,0xaa66ff][Math.floor(Math.random()*4)]}));p.position.y=0.26;p.scale.y=0.5;f.add(p);f.position.set((Math.random()-0.5)*40,0,8+Math.random()*10);scene.add(f);}

const sunDisc=new THREE.Mesh(new THREE.CircleGeometry(3,32),new THREE.MeshBasicMaterial({color:0xffeecc}));
sunDisc.position.set(40,30,-60);sunDisc.lookAt(0,0,0);scene.add(sunDisc);

/* ===== JOGGER ===== */
function createJogger(){
  const g=new THREE.Group();
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.2,14,12),skinMat);head.position.y=1.68;head.castShadow=true;g.add(head);
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,10,0,Math.PI*2,0,Math.PI*0.5),hairMat);hair.position.y=1.72;g.add(hair);
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.13,0.5,10),shirtMat);torso.position.y=1.15;torso.castShadow=true;g.add(torso);
  [-1,1].forEach(s=>{const eb=new THREE.Mesh(new THREE.SphereGeometry(0.022,6,6),new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3}));eb.position.set(s*0.17,1.65,0.05);g.add(eb);});
  const phone=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.08,0.005),new THREE.MeshStandardMaterial({color:0x111111,metalness:0.5}));phone.position.set(0.3,0.95,0.12);g.add(phone);
  const screen=new THREE.Mesh(new THREE.PlaneGeometry(0.035,0.065),new THREE.MeshBasicMaterial({color:0x4488ff}));screen.position.set(0.3,0.95,0.125);g.add(screen);
  const hips=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.12,0.16,10),shortsMat);hips.position.y=0.82;g.add(hips);
  [-1,1].forEach(side=>{
    const ap=new THREE.Group();ap.position.set(side*0.2,1.32,0);
    ap.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.28,8),shirtMat),{position:new THREE.Vector3(0,-0.14,0)}));
    ap.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.028,0.25,8),skinMat),{position:new THREE.Vector3(0,-0.32,0.05)}));
    ap.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),skinMat),{position:new THREE.Vector3(0,-0.42,0.08)}));
    ap.userData={type:'joggerArm',side};g.add(ap);
  });
  [-1,1].forEach(side=>{
    const lp=new THREE.Group();lp.position.set(side*0.07,0.75,0);
    const ul=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.048,0.36,8),shortsMat);ul.position.y=-0.18;ul.castShadow=true;lp.add(ul);
    const ll=new THREE.Mesh(new THREE.CylinderGeometry(0.042,0.035,0.34,8),skinMat);ll.position.y=-0.42;lp.add(ll);
    const sh=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.045,0.13),shoeMat);sh.position.set(0,-0.6,0.02);sh.castShadow=true;lp.add(sh);
    lp.userData={type:'joggerLeg',side};g.add(lp);
  });
  return g;
}

/* ===== DOG ===== */
function createDog(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.17,0.42,8,12),dogFurMat);body.rotation.z=Math.PI/2;body.position.set(0,0.42,0);body.castShadow=true;g.add(body);
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.19,10,8),dogFurMat),{position:new THREE.Vector3(0.2,0.44,0)}));
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.14,12,10),dogFurMat);head.position.set(0.4,0.54,0);head.castShadow=true;g.add(head);
  const snout=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.11,8),dogFurMat);snout.rotation.z=Math.PI/2;snout.position.set(0.52,0.51,0);g.add(snout);
  g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6),new THREE.MeshStandardMaterial({color:0x1a1a1a})),{position:new THREE.Vector3(0.58,0.52,0)}));
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,6),dogFurMat);ear.scale.set(0.4,1,0.6);ear.position.set(0.34,0.6,s*0.11);g.add(ear);
    g.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6),new THREE.MeshStandardMaterial({color:0x2a1a0a})),{position:new THREE.Vector3(0.48,0.57,s*0.065)}));
  });
  const tongue=new THREE.Mesh(new THREE.PlaneGeometry(0.025,0.04),new THREE.MeshStandardMaterial({color:0xff6688,side:THREE.DoubleSide}));tongue.position.set(0.55,0.46,0);tongue.rotation.y=Math.PI/2;g.add(tongue);
  const tc=new THREE.QuadraticBezierCurve3(new THREE.Vector3(-0.3,0.42,0),new THREE.Vector3(-0.45,0.7,0),new THREE.Vector3(-0.38,0.8,0));
  const tail=new THREE.Mesh(new THREE.TubeGeometry(tc,8,0.02,6,false),dogFurMat);tail.userData={type:'dogTail'};g.add(tail);
  [{x:0.17,z:0.09,l:'FL'},{x:0.17,z:-0.09,l:'FR'},{x:-0.17,z:0.09,l:'BL'},{x:-0.17,z:-0.09,l:'BR'}].forEach(ld=>{
    const p=new THREE.Group();p.position.set(ld.x,0.32,ld.z);
    p.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.03,0.2,8),dogFurMat),{position:new THREE.Vector3(0,-0.1,0)}));
    p.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.024,0.15,8),dogFurMat),{position:new THREE.Vector3(0,-0.22,0)}));
    const pw=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),dogFurMat);pw.scale.y=0.45;pw.position.y=-0.3;p.add(pw);
    p.userData={type:'dogLeg',label:ld.l};g.add(p);
  });
  return g;
}

/* ===== BUTTERFLY ===== */
function createButterfly(){
  const g=new THREE.Group();
  const bm=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.6});
  const wm1=new THREE.MeshStandardMaterial({color:0xff6600,roughness:0.5,side:THREE.DoubleSide,transparent:true,opacity:0.85});
  const wm2=new THREE.MeshStandardMaterial({color:0xffaa22,roughness:0.5,side:THREE.DoubleSide,transparent:true,opacity:0.8});
  g.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.025,0.12,6,8),bm));
  const hd=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),bm);hd.position.y=0.09;g.add(hd);
  [-1,1].forEach(s=>{
    const cv=new THREE.QuadraticBezierCurve3(new THREE.Vector3(0,0.09,0),new THREE.Vector3(s*0.04,0.16,0.02),new THREE.Vector3(s*0.06,0.18,0));
    g.add(new THREE.Mesh(new THREE.TubeGeometry(cv,6,0.003,4,false),bm));
    const tp=new THREE.Mesh(new THREE.SphereGeometry(0.006,4,4),bm);tp.position.set(s*0.06,0.18,0);g.add(tp);
  });
  const us=new THREE.Shape();us.moveTo(0,0);us.bezierCurveTo(0.04,0.08,0.12,0.1,0.14,0.06);us.bezierCurveTo(0.16,0.02,0.12,-0.04,0.06,-0.02);us.lineTo(0,0);
  const ug=new THREE.ShapeGeometry(us);
  [-1,1].forEach(s=>{const w=new THREE.Mesh(ug,wm1);w.scale.set(s*1.4,1.4,1);w.position.set(0,0.02,0);w.rotation.x=Math.PI/2;w.userData={type:'butterflyWing',side:s,wingType:'upper'};g.add(w);});
  const ls=new THREE.Shape();ls.moveTo(0,0);ls.bezierCurveTo(0.03,0.04,0.08,0.05,0.09,0.02);ls.bezierCurveTo(0.08,-0.02,0.04,-0.03,0,0);
  const lg=new THREE.ShapeGeometry(ls);
  [-1,1].forEach(s=>{const w=new THREE.Mesh(lg,wm2);w.scale.set(s*1.4,1.4,1);w.position.set(0,-0.04,0);w.rotation.x=Math.PI/2;w.userData={type:'butterflyWing',side:s,wingType:'lower'};g.add(w);});
  return g;
}

/* ===== AI MONOLITH ===== */
function createAIMonolith(){
  const g=new THREE.Group();
  const b=new THREE.Mesh(new THREE.BoxGeometry(0.9,2.0,0.5),new THREE.MeshStandardMaterial({color:0x0a0a14,roughness:0.15,metalness:0.85}));
  b.position.y=1.0;b.castShadow=true;g.add(b);
  for(let i=0;i<10;i++){const ln=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.006,0.01),new THREE.MeshBasicMaterial({color:0x0066cc,transparent:true,opacity:0.6}));ln.position.set(0,0.15+i*0.18,0.26);ln.userData={type:'serverLine',phase:i*0.4};g.add(ln);}
  const eye=new THREE.Mesh(new THREE.CircleGeometry(0.05,16),new THREE.MeshBasicMaterial({color:0x00aaff}));eye.position.set(0,1.7,0.26);eye.userData={type:'aiEye'};g.add(eye);
  const eg=new THREE.Mesh(new THREE.CircleGeometry(0.1,16),new THREE.MeshBasicMaterial({color:0x0066ff,transparent:true,opacity:0.2}));eg.position.set(0,1.7,0.255);eg.userData={type:'aiEyeGlow'};g.add(eg);
  return g;
}

/* Helpers */
function createBubble(r,c,o){return new THREE.Mesh(new THREE.SphereGeometry(r,48,36),new THREE.MeshPhysicalMaterial({color:c,transparent:true,opacity:o,side:THREE.DoubleSide,depthWrite:false,roughness:0.05,transmission:0.5,thickness:0.3,clearcoat:1.0}));}
function createTextSprite(text,color,fs,mw){
  const cv=document.createElement('canvas');cv.width=512;cv.height=128;
  const cx=cv.getContext('2d');
  cx.font=`bold ${fs||32}px Segoe UI,Arial,sans-serif`;
  cx.fillStyle=color||'#ffffff';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.shadowColor='rgba(0,0,0,0.7)';cx.shadowBlur=8;
  cx.fillText(text,256,64);
  const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;
  const mt=new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false});
  const sp=new THREE.Sprite(mt);sp.scale.set(mw||2,0.5,1);return sp;
}

/* ===== PLACE CHARACTERS ===== */
const jogger=createJogger();
jogger.position.set(-25,0,-2);
jogger.rotation.y=Math.PI*0.5;
scene.add(jogger);

const dog=createDog();
dog.position.set(-22,0,-3);
dog.rotation.y=Math.PI*0.4;
scene.add(dog);

const butterfly=createButterfly();
butterfly.position.set(25,2.0,-1);
butterfly.rotation.y=-Math.PI*0.5;
scene.add(butterfly);

/* ===== MOVEMENT ===== */
const WALK_SPEED=1.8, WALK_LEFT=-25, WALK_RIGHT=25;
const BF_SPEED=0.6, BF_LEFT=-30, BF_RIGHT=30;
let joggerX=WALK_LEFT, dogX=joggerX+3, butterflyX=BF_RIGHT, moveTime=0;

function updateMovement(dt){
  moveTime+=dt;

  // Jogger left to right, loop
  joggerX+=WALK_SPEED*dt;
  if(joggerX>WALK_RIGHT) joggerX=WALK_LEFT;
  jogger.position.x=joggerX;
  jogger.position.y=Math.abs(Math.sin(moveTime*4.5))*0.06;

  // Animate jogger legs + arms
  jogger.children.forEach(c=>{
    if(!c.userData)return;
    if(c.userData.type==='joggerLeg'){
      const ph=c.userData.side===1?0:Math.PI;
      c.rotation.x=Math.sin(moveTime*9+ph)*0.6;
    }
    if(c.userData.type==='joggerArm'){
      const ph=c.userData.side===1?Math.PI:0;
      c.rotation.x=Math.sin(moveTime*9+ph)*0.4;
    }
  });

  // Dog ahead of jogger, slight weave
  const dogTargetX=joggerX+3;
  dogX+=(dogTargetX-dogX)*0.05;
  if(dogX>WALK_RIGHT+3) dogX=WALK_LEFT+3;
  dog.position.x=dogX;
  dog.position.z=-3+Math.sin(moveTime*0.8)*1.0;
  dog.position.y=Math.abs(Math.sin(moveTime*5))*0.03;

  const dogDz=Math.cos(moveTime*0.8)*1.0;
  dog.rotation.y=Math.atan2(WALK_SPEED,dogDz)*0.3+Math.PI*0.3;

  // Dog legs + tail
  dog.children.forEach(c=>{
    if(!c.userData)return;
    if(c.userData.type==='dogLeg'){
      const isL=c.userData.label.includes('L'), isF=c.userData.label.includes('F');
      const ph=(isL?0:Math.PI)+(isF?0:Math.PI*0.5);
      c.rotation.x=Math.sin(moveTime*8+ph)*0.35;
    }
    if(c.userData.type==='dogTail') c.rotation.y=Math.sin(moveTime*8)*0.4;
  });

  // Butterfly right to left, much slower
  butterflyX-=BF_SPEED*dt;
  if(butterflyX<BF_LEFT) butterflyX=BF_RIGHT;
  butterfly.position.x=butterflyX;
  butterfly.position.y=1.8+Math.sin(moveTime*0.5)*0.4+Math.sin(moveTime*0.2)*0.2;
  butterfly.position.z=-1+Math.sin(moveTime*0.3)*1.5;

  // Wing flap
  butterfly.children.forEach(c=>{
    if(c.userData&&c.userData.type==='butterflyWing'){
      const amt=c.userData.wingType==='upper'?0.7:0.5;
      c.rotation.y=c.userData.side*(Math.sin(moveTime*8)*amt+0.15);
    }
  });
}

/* ===== OVERLAY SYSTEM ===== */
let overlayObjects=[], currentSceneName='human', targetDogVision=0;

function clearOverlays(){overlayObjects.forEach(o=>scene.remove(o));overlayObjects=[];}
function setActiveButton(n){
  document.querySelectorAll('#nav-buttons button').forEach(b=>b.classList.remove('active'));
  const idx=['human','dog','butterfly','ai'].indexOf(n);
  const btns=document.querySelectorAll('#nav-buttons button');
  if(idx>=0&&btns[idx])btns[idx].classList.add('active');
}

/* Camera target (almost stable) */
let camTargetPos=new THREE.Vector3(0,3.5,14);
let camTargetLookAt=new THREE.Vector3(0,1.2,0);
function setCameraTarget(p,l){camTargetPos=new THREE.Vector3(...p);camTargetLookAt=new THREE.Vector3(...l);}

/* ===== SCENE SWITCHING ===== */

      scene.add(ib);overlayObjects.push(ib);

      const cols=[0xff6688,0x66aaff,0xffcc44,0x66ff88,0xff66ff,0xffffff];
      for(let i=0;i<80;i++){

        const p=new THREE.Mesh(new THREE.SphereGeometry(sz,5,5),new THREE.MeshBasicMaterial({color:cols[Math.floor(Math.random()*cols.length)],transparent:true,opacity:0.2+Math.random()*0.3}));

        p.position.set(Math.cos(a)*r,0.3+Math.random()*4.5,Math.sin(a)*r);
        p.userData={type:'orbitParticle',follow:'jogger',angle:a,radius:r,speed:0.002+Math.random()*0.005,baseY:p.position.y,bobSpeed:0.8+Math.random()*1.2,bobAmt:0.02+Math.random()*0.03};
        scene.add(p);overlayObjects.push(p);
      }

      ['Andromeda ✦','New York','Quantenphysik','Erinnerungen','Musik ♪','Geschichte'].forEach((item,i)=>{

        lbl.userData={type:'knowledgeOrbit',angle:a,radius:5.5,offsetY:3.5+Math.sin(i)*1.2};
        scene.add(lbl);overlayObjects.push(lbl);
      });

      setCameraTarget([0,3.5,14],[0,1.2,0]);
      break;
    }

    case 'dog':{
      label.textContent='🐕 UMWELT: HUND';
      info.innerHTML=`Die Bubble des <strong>Hundes</strong>: Kleiner als die des Menschen.<br>
        Kein Wissen über ferne Planeten. Mehr <strong>im Jetzt</strong>.<br>
        Aber die Geruchswelt <strong>explodiert</strong>: 200 Mio. Riechzellen.<br>
        Farben verblassen (Dichromat). Geräusche werden <strong>lauter und detaillierter</strong>.`;

      targetDogVision=1.0;

      const db=createBubble(3.2,0xcc8833,0.045);
      db.userData={type:'followDog',offsetY:0.8};
      scene.add(db);overlayObjects.push(db);

      const sc=[0xffaa00,0xff6600,0xffcc33,0xee8833,0xddaa22];
      for(let i=0;i<220;i++){
        const sz=0.01+Math.random()*0.035;
        const p=new THREE.Mesh(new THREE.SphereGeometry(sz,4,4),new THREE.MeshBasicMaterial({color:sc[Math.floor(Math.random()*sc.length)],transparent:true,opacity:0.15+Math.random()*0.4}));

        p.position.set(Math.cos(a)*r,0.05+Math.random()*1.0,Math.sin(a)*r);
        p.userData={type:'orbitParticle',follow:'dog',angle:a,radius:r,speed:0.003+Math.random()*0.01,baseY:p.position.y,bobSpeed:0.4+Math.random()*1.0,bobAmt:0.006+Math.random()*0.015};

      }

      for(let i=0;i<5;i++){
        const rn=new THREE.Mesh(new THREE.TorusGeometry(0.7+i*0.45,0.01,8,32),new THREE.MeshBasicMaterial({color:0xffdd88,transparent:true,opacity:0.1}));
        rn.rotation.x=Math.PI/2;

        const trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xffaa33,transparent:true,opacity:0.2}));

    }

    case 'butterfly':{
      label.textContent='🦋 UMWELT: SCHMETTERLING';
      info.innerHTML=`Die Bubble des <strong>Schmetterlings</strong>: Winzig. Radikal im <strong>Hier und Jetzt</strong>.<br>
        Kein Strand als Konzept. Kein Jogger. Kein Meer.<br>
        Nur: <strong>UV-Muster</strong>, <strong>Windrichtung</strong>, <strong>Pheromone</strong>, <strong>Licht/Dunkel</strong>.<br>
        <em>Er sieht Farben die wir nicht sehen (UV) – aber kennt kein "Morgen".</em>`;

      const bb=createBubble(0.7,0xff6600,0.06);
      bb.userData={type:'followButterfly',offsetY:0};
      scene.add(bb);overlayObjects.push(bb);

      const uvc=[0xaa00ff,0xcc44ff,0x8800cc,0xff00ff];
      for(let i=0;i<18;i++){
        const sz=0.005+Math.random()*0.012;
        const p=new THREE.Mesh(new THREE.SphereGeometry(sz,4,4),new THREE.MeshBasicMaterial({color:uvc[Math.floor(Math.random()*uvc.length)],transparent:true,opacity:0.3+Math.random()*0.5}));

        scene.add(ar);overlayObjects.push(ar);
      }

      setCameraTarget([0,3,12],[0,1.8,-1]);
      break;
    }

    case 'ai':{
      label.textContent='🤖 UMWELT: KI';
      info.innerHTML=`<strong>Überleitung:</strong> Der Jogger hört über Kopfhörer einen Podcast –<br>

        Sie kennt "Strand" – aber nur als Punkt im Vektorraum, nahe "Sand", "Meer", "Urlaub".<br>
        <strong>Kein Sand unter den Füßen.</strong><br>
        Ein "Baum" ist kein Ding mit harter Rinde, das man verbrennen kann –<br>
        sondern ein <strong>Begriff, der oft mit "grün" und "Natur" in Texten vorkommt</strong>.<br><br>
        <em>Die KI hat keine Umwelt. Sie hat einen Vektorraum. Und der ist dunkel.</em>`;

      jogger.visible=false; dog.visible=false; butterfly.visible=false;
      scene.background=new THREE.Color(0x020208);
      scene.fog=new THREE.Fog(0x020208,10,40);

      const vs=new THREE.Mesh(new THREE.SphereGeometry(55,24,24),new THREE.MeshBasicMaterial({color:0x020208,side:THREE.BackSide}));
      scene.add(vs);overlayObjects.push(vs);

      const cl=new THREE.PointLight(0x2244aa,0.8,20);cl.position.set(0,5,3);
      scene.add(cl);overlayObjects.push(cl);

      const ai=createAIMonolith();ai.position.set(0,0,0);
      scene.add(ai);overlayObjects.push(ai);

      const tokens=[
        {label:'Strand',pos:[2.5,2.0,0.5],color:0xddaa44},
        {label:'Sand',pos:[2.8,2.3,0.8],color:0xddaa44},
        {label:'Meer',pos:[2.2,1.7,-0.2],color:0x4488cc},
        {label:'Urlaub',pos:[3.0,2.5,0.2],color:0xddaa44},
        {label:'Baum',pos:[-2.0,3.0,1.0],color:0x44aa44},
        {label:'grün',pos:[-1.7,3.3,1.3],color:0x44aa44},
        {label:'Natur',pos:[-2.3,2.8,0.7],color:0x44aa44},
        {label:'Schmerz',pos:[-3.0,0.8,-1.0],color:0xff4444},
        {label:'unangenehm',pos:[-2.6,1.1,-0.7],color:0xff6666},
        {label:'Verletzung',pos:[-3.3,0.5,-1.3],color:0xff6666},
        {label:'Hund',pos:[0.5,1.5,-2.0],color:0xcc8833},
        {label:'bellen',pos:[0.3,1.2,-2.3],color:0xcc8833},
        {label:'Freude',pos:[1.5,4.0,-0.5],color:0x44aaff},
        {label:'Sonne',pos:[3.5,4.5,1.0],color:0xffff44},
        {label:'warm',pos:[3.2,4.2,1.3],color:0xffff44}
      ];

      tokens.forEach(t=>{
        const sp=new THREE.Mesh(new THREE.SphereGeometry(0.07,10,10),new THREE.MeshBasicMaterial({color:t.color}));
        sp.position.set(...t.pos);scene.add(sp);overlayObjects.push(sp);

        const gl=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8),new THREE.MeshBasicMaterial({color:t.color,transparent:true,opacity:0.08}));
        gl.position.set(...t.pos);gl.userData={type:'tokenGlow'};
        scene.add(gl);overlayObjects.push(gl);

        const lb=createTextSprite(t.label,'#'+t.color.toString(16).padStart(6,'0'),22,1.2);
        lb.position.set(t.pos[0],t.pos[1]+0.25,t.pos[2]);
        scene.add(lb);overlayObjects.push(lb);
      });

      const lm=new THREE.LineBasicMaterial({color:0x223344,transparent:true,opacity:0.25});
      for(let i=0;i<tokens.length;i++){
        for(let j=i+1;j<tokens.length;j++){
          const dx=tokens[i].pos[0]-tokens[j].pos[0],dy=tokens[i].pos[1]-tokens[j].pos[1],dz=tokens[i].pos[2]-tokens[j].pos[2];
          if(Math.sqrt(dx*dx+dy*dy+dz*dz)<1.8){
            const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...tokens[i].pos),new THREE.Vector3(...tokens[j].pos)]);
            const ln=new THREE.Line(g,lm);scene.add(ln);overlayObjects.push(ln);
          }
        }
      }

      const am=new THREE.LineBasicMaterial({color:0x222233,transparent:true,opacity:0.15});
      [[[-5,0,0],[5,0,0]],[[0,-1,0],[0,6,0]],[[0,0,-4],[0,0,4]]].forEach(([a,b])=>{
        const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a),new THREE.Vector3(...b)]);
        const ax=new THREE.Line(g,am);scene.add(ax);overlayObjects.push(ax);
      });

      for(let i=0;i<70;i++){
        const cb=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.025,0.025),new THREE.MeshBasicMaterial({color:0x1a1a2a,transparent:true,opacity:0.2}));
        cb.position.set((Math.random()-0.5)*12,Math.random()*6,(Math.random()-0.5)*8);
        cb.userData={type:'dataFloat',baseY:cb.position.y,floatSpeed:0.001+Math.random()*0.004};
        scene.add(cb);overlayObjects.push(cb);
      }

      const a1=createTextSprite('"Baum" = nahe "grün", "Natur" — kein echter Baum','#556666',16,4);
      a1.position.set(-2,4.0,1);scene.add(a1);overlayObjects.push(a1);
      const a2=createTextSprite('"Strand" = nahe "Sand", "Meer" — kein Sand unter den Füßen','#556666',16,4);
      a2.position.set(2.5,3.2,0.5);scene.add(a2);overlayObjects.push(a2);
      const a3=createTextSprite('v_schmerz = [0.12, -0.54, 0.87, ...] — bedeutungslos','#664444',16,4);
      a3.position.set(-3,-0.2,-1);scene.add(a3);overlayObjects.push(a3);
      const a4=createTextSprite('← Kopfhörer → Übersetzungs-KI → Vektorraum','#445566',16,4.5);
      a4.position.set(0,5.5,0);scene.add(a4);overlayObjects.push(a4);

      setCameraTarget([0,3,10],[0,2.5,0]);
      break;
    }
  }

  updateAudioForScene(name);
};

/* ===== ANIMATION LOOP ===== */
let time=0, lastTime=performance.now();

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=(now-lastTime)/1000;
  lastTime=now; time+=dt;

  updateMovement(dt);

  // Smooth camera with very gentle sway
  camera.position.lerp(camTargetPos,0.02);
  const look=camTargetLookAt.clone();
  look.x+=Math.sin(time*0.15)*0.08;
  look.y+=Math.cos(time*0.1)*0.03;
  camera.lookAt(look);

  // Dog vision transition
  desatMaterial.uniforms.dogVision.value+=(targetDogVision-desatMaterial.uniforms.dogVision.value)*0.03;

  // Update overlays
  overlayObjects.forEach(o=>{
    if(!o.userData)return;

    if(o.userData.type==='followJogger'){o.position.x=jogger.position.x;o.position.z=jogger.position.z;if(o.userData.offsetY!==undefined)o.position.y=o.userData.offsetY;}
    if(o.userData.type==='followDog'){o.position.x=dog.position.x;o.position.z=dog.position.z;if(o.userData.offsetY!==undefined)o.position.y=o.userData.offsetY;}
    if(o.userData.type==='followButterfly'){o.position.x=butterfly.position.x+(o.userData.offsetX||0);o.position.y=butterfly.position.y+(o.userData.offsetY||0);o.position.z=butterfly.position.z;}

    if(o.userData.type==='orbitParticle'){
      o.userData.angle+=o.userData.speed;
      let cx=0,cz=0;
      if(o.userData.follow==='jogger'){cx=jogger.position.x;cz=jogger.position.z;}
      else if(o.userData.follow==='dog'){cx=dog.position.x;cz=dog.position.z;}
      else if(o.userData.follow==='butterfly'){cx=butterfly.position.x;cz=butterfly.position.z;}
      o.position.x=cx+Math.cos(o.userData.angle)*o.userData.radius;
      o.position.z=cz+Math.sin(o.userData.angle)*o.userData.radius;
      if(o.userData.follow==='butterfly'){o.position.y=butterfly.position.y+Math.sin(time*o.userData.bobSpeed+o.userData.angle)*o.userData.bobAmt;}
      else{o.position.y=o.userData.baseY+Math.sin(time*o.userData.bobSpeed+o.userData.angle)*o.userData.bobAmt;}
    }

    if(o.userData.type==='knowledgeOrbit'){o.userData.angle+=0.0015;o.position.x=jogger.position.x+Math.cos(o.userData.angle)*o.userData.radius;o.position.z=jogger.position.z+Math.sin(o.userData.angle)*o.userData.radius;o.position.y=o.userData.offsetY;}
    if(o.userData.type==='dogSound'){o.position.x=dog.position.x;o.position.z=dog.position.z;o.position.y=0.6;const p=1+Math.sin(time*1.8+o.userData.phase)*0.2;o.scale.set(p,p,p);o.material.opacity=0.05+Math.sin(time*1.8+o.userData.phase)*0.05;}
    if(o.userData.type==='tokenGlow'){o.material.opacity=0.05+Math.sin(time*2+o.position.x*3)*0.04;}
    if(o.userData.type==='dataFloat'){o.position.y=o.userData.baseY+Math.sin(time*1.2+o.position.x*2)*0.25;o.rotation.x+=0.006;o.rotation.y+=0.009;}
    if(o.userData.type==='serverLine'){o.material.opacity=0.3+Math.sin(time*3+o.userData.phase)*0.3;}
    if(o.userData.type==='aiEye'){o.material.color.setHSL(0.55+Math.sin(time*0.5)*0.05,0.8,0.5);}
    if(o.userData.type==='aiEyeGlow'){o.material.opacity=0.1+Math.sin(time*1.5)*0.1;}
  });

  // Water animation
  const wv=waterMesh.geometry.attributes.position;
  for(let i=0;i<wv.count;i++){wv.setZ(i,Math.sin(wv.getX(i)*0.25+time*0.6)*0.12+Math.sin(wv.getY(i)*0.3+time*0.4)*0.08);}
  wv.needsUpdate=true;waterMesh.geometry.computeVertexNormals();

  // Render
  if(desatMaterial.uniforms.dogVision.value>0.01){
    renderer.setRenderTarget(renderTarget);
    renderer.render(scene,camera);
    renderer.setRenderTarget(null);
    desatMaterial.uniforms.tDiffuse.value=renderTarget.texture;
    renderer.render(desatScene,desatCamera);
  }else{
    renderer.render(scene,camera);
  }
}
animate();

/* Resize */
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderTarget.setSize(window.innerWidth,window.innerHeight);
});

/* Start */
window.switchScene('human');
