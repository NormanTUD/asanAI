<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BasinHopper – Loss Landscape Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: #161b22;
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #sidebar h1 {
    font-size: 1.3em;
    color: #58a6ff;
    margin-bottom: 4px;
  }
  #sidebar h2 {
    font-size: 0.95em;
    color: #8b949e;
    font-weight: normal;
    margin-bottom: 8px;
  }
  .control-group {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
  }
  .control-group h3 {
    font-size: 0.85em;
    color: #58a6ff;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .slider-row label {
    font-size: 0.82em;
    color: #8b949e;
    flex: 1;
  }
  .slider-row input[type=range] {
    width: 120px;
    accent-color: #58a6ff;
  }
  .slider-row .val {
    width: 50px;
    text-align: right;
    font-size: 0.82em;
    color: #e6edf3;
    font-family: monospace;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .toggle-row label { font-size: 0.85em; }
  .switch {
    position: relative;
    width: 42px;
    height: 22px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-toggle {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #30363d;
    border-radius: 22px;
    transition: 0.3s;
  }
  .slider-toggle:before {
    content: "";
    position: absolute;
    height: 16px; width: 16px;
    left: 3px; bottom: 3px;
    background: #c9d1d9;
    border-radius: 50%;
    transition: 0.3s;
  }
  .switch input:checked + .slider-toggle { background: #238636; }
  .switch input:checked + .slider-toggle:before { transform: translateX(20px); }
  button {
    padding: 8px 16px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #c9d1d9;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85em;
    transition: 0.2s;
  }
  button:hover { background: #30363d; border-color: #58a6ff; }
  button.primary { background: #238636; border-color: #238636; color: #fff; }
  button.primary:hover { background: #2ea043; }
  button.danger { background: #da3633; border-color: #da3633; color: #fff; }
  button.danger:hover { background: #f85149; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  #log {
    flex: 1;
    min-height: 80px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px;
    font-family: monospace;
    font-size: 0.75em;
    overflow-y: auto;
    color: #8b949e;
    line-height: 1.5;
  }
  #log .jump { color: #d29922; }
  #log .accept { color: #3fb950; }
  #log .reject { color: #f85149; }
  #log .info { color: #58a6ff; }
  #canvas-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #hud {
    position: absolute;
    top: 12px;
    right: 16px;
    background: rgba(22,27,34,0.9);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 0.8em;
    line-height: 1.7;
    pointer-events: none;
  }
  #hud span { color: #58a6ff; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>🏔️ BasinHopper</h1>
  <h2>Interactive Loss Landscape Explorer</h2>

  <div class="control-group">
    <h3>⚙️ Base Optimizer</h3>
    <div class="slider-row">
      <label>Learning Rate</label>
      <input type="range" id="lr" min="0.1" max="5" step="0.1" value="1.2">
      <div class="val" id="lr-val">1.2</div>
    </div>
    <div class="slider-row">
      <label>Momentum</label>
      <input type="range" id="momentum" min="0" max="0.99" step="0.01" value="0.85">
      <div class="val" id="momentum-val">0.85</div>
    </div>
    <div class="slider-row">
      <label>Friction (drag)</label>
      <input type="range" id="friction" min="0.8" max="1" step="0.005" value="0.97">
      <div class="val" id="friction-val">0.97</div>
    </div>
  </div>

  <div class="control-group">
    <h3>🚀 Basin Hopping</h3>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="hopping-enabled" checked>
        <span class="slider-toggle"></span>
      </label>
      <label>Enable Basin Hopping</label>
    </div>
    <div class="slider-row">
      <label>Patience (steps)</label>
      <input type="range" id="patience" min="10" max="200" step="5" value="60">
      <div class="val" id="patience-val">60</div>
    </div>
    <div class="slider-row">
      <label>Plateau Threshold</label>
      <input type="range" id="plateau-thresh" min="0.001" max="0.1" step="0.001" value="0.01">
      <div class="val" id="plateau-thresh-val">0.010</div>
    </div>
    <div class="slider-row">
      <label>Jump LR Multiplier</label>
      <input type="range" id="jump-mult" min="2" max="80" step="1" value="30">
      <div class="val" id="jump-mult-val">30</div>
    </div>
    <div class="slider-row">
      <label>Exploration Steps</label>
      <input type="range" id="explore-steps" min="1" max="30" step="1" value="8">
      <div class="val" id="explore-steps-val">8</div>
    </div>
    <div class="slider-row">
      <label>Descent Steps</label>
      <input type="range" id="descent-steps" min="1" max="60" step="1" value="25">
      <div class="val" id="descent-steps-val">25</div>
    </div>
  </div>

  <div class="control-group">
    <h3>🌄 Landscape</h3>
    <div class="slider-row">
      <label>Complexity</label>
      <input type="range" id="complexity" min="1" max="8" step="1" value="4">
      <div class="val" id="complexity-val">4</div>
    </div>
    <div class="slider-row">
      <label>Roughness</label>
      <input type="range" id="roughness" min="0" max="2" step="0.05" value="0.6">
      <div class="val" id="roughness-val">0.60</div>
    </div>
    <div class="slider-row">
      <label>Speed</label>
      <input type="range" id="speed" min="0.2" max="5" step="0.1" value="1.0">
      <div class="val" id="speed-val">1.0</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="primary" id="btn-start">▶ Start</button>
    <button id="btn-pause">⏸ Pause</button>
    <button class="danger" id="btn-reset">↺ Reset</button>
    <button id="btn-new-landscape">🗺 New Map</button>
  </div>

  <div id="log"></div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div>Step: <span id="hud-step">0</span></div>
    <div>Loss: <span id="hud-loss">—</span></div>
    <div>Best: <span id="hud-best">—</span></div>
    <div>State: <span id="hud-state">idle</span></div>
    <div>Stale: <span id="hud-stale">0</span></div>
  </div>
</div>

<script>
// ============================================================
//  LANDSCAPE GENERATION
// ============================================================
class Landscape {
  constructor(complexity = 4, roughness = 0.6, seed = null) {
    this.seed = seed || Math.random() * 10000;
    this.complexity = complexity;
    this.roughness = roughness;
    this.gaussians = [];
    this._generate();
  }

  _rng() {
    // simple seeded pseudo-random
    this.seed = (this.seed * 9301 + 49297) % 233280;
    return this.seed / 233280;
  }

  _generate() {
    this.gaussians = [];
    const n = this.complexity * 3 + 2;
    for (let i = 0; i < n; i++) {
      this.gaussians.push({
        cx: this._rng() * 10 - 5,
        cy: this._rng() * 10 - 5,
        amp: (this._rng() - 0.5) * 4,
        sx: 0.5 + this._rng() * 2.5,
        sy: 0.5 + this._rng() * 2.5,
      });
    }
    // Add some sine-based roughness
    this.sinParams = [];
    const m = Math.floor(this.roughness * 6);
    for (let i = 0; i < m; i++) {
      this.sinParams.push({
        fx: (this._rng() - 0.5) * 3,
        fy: (this._rng() - 0.5) * 3,
        amp: this._rng() * this.roughness * 0.8,
        phase: this._rng() * Math.PI * 2,
      });
    }
  }

  eval(x, y) {
    let z = 0;
    // base bowl
    z += 0.04 * (x * x + y * y);
    // gaussians
    for (const g of this.gaussians) {
      const dx = (x - g.cx) / g.sx;
      const dy = (y - g.cy) / g.sy;
      z += g.amp * Math.exp(-0.5 * (dx * dx + dy * dy));
    }
    // roughness
    for (const s of this.sinParams) {
      z += s.amp * Math.sin(s.fx * x + s.fy * y + s.phase);
    }
    return z;
  }

  gradient(x, y) {
    const h = 0.005;
    const dzdx = (this.eval(x + h, y) - this.eval(x - h, y)) / (2 * h);
    const dzdy = (this.eval(x, y + h) - this.eval(x, y - h)) / (2 * h);
    return [dzdx, dzdy];
  }
}

// ============================================================
//  RENDERER
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const W = () => canvas.width / devicePixelRatio;
const H = () => canvas.height / devicePixelRatio;

// Map world coords to screen
const VIEW = { xMin: -6, xMax: 6, yMin: -2, yMax: 5 };
// We'll render a side-view: x = world x, screen y = loss value
// But also show a top-down mini-map

function worldToScreen(x, z) {
  const sx = ((x - VIEW.xMin) / (VIEW.xMax - VIEW.xMin)) * W();
  const sy = H() - ((z - VIEW.yMin) / (VIEW.yMax - VIEW.yMin)) * H();
  return [sx, sy];
}

// We'll use a 1D slice through the landscape for the main view
// and a 2D top-down heatmap in a corner

let landscape = new Landscape(4, 0.6);
let sliceY = 0; // y-coordinate of the 1D slice

function drawLandscape1D() {
  const steps = Math.ceil(W() / 2);
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const x = VIEW.xMin + (i / steps) * (VIEW.xMax - VIEW.xMin);
    const z = landscape.eval(x, sliceY);
    const [sx, sy] = worldToScreen(x, z);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  // Fill below
  ctx.lineTo(W(), H() + 10);
  ctx.lineTo(0, H() + 10);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, 0, H());
  grad.addColorStop(0, 'rgba(30,80,160,0.7)');
  grad.addColorStop(0.5, 'rgba(20,60,120,0.5)');
  grad.addColorStop(1, 'rgba(10,30,60,0.3)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Outline
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const x = VIEW.xMin + (i / steps) * (VIEW.xMax - VIEW.xMin);
    const z = landscape.eval(x, sliceY);
    const [sx, sy] = worldToScreen(x, z);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(48,54,61,0.5)';
  ctx.lineWidth = 0.5;
  for (let v = Math.ceil(VIEW.yMin); v <= VIEW.yMax; v++) {
    const [, sy] = worldToScreen(0, v);
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W(), sy);
    ctx.stroke();
    ctx.fillStyle = '#484f58';
    ctx.font = '11px monospace';
    ctx.fillText(v.toFixed(0), 4, sy - 3);
  }
}

// ============================================================
//  BALL / OPTIMIZER STATE
// ============================================================
let ball = {
  x: -4.5,
  vx: 0,
  state: 'idle', // idle | running | exploring_jump | exploring_descent | paused
  bestLoss: Infinity,
  stepsWithoutImprovement: 0,
  step: 0,
  trail: [],
  checkpointX: null,
  checkpointVx: null,
  checkpointLoss: null,
  exploreStepsLeft: 0,
  descentStepsLeft: 0,
  jumpCount: 0,
  acceptCount: 0,
  rejectCount: 0,
};

function resetBall() {
  ball.x = -4.5 + Math.random() * 1.5;
  ball.vx = 0;
  ball.state = 'idle';
  ball.bestLoss = Infinity;
  ball.stepsWithoutImprovement = 0;
  ball.step = 0;
  ball.trail = [];
  ball.checkpointX = null;
  ball.checkpointVx = null;
  ball.checkpointLoss = null;
  ball.exploreStepsLeft = 0;
  ball.descentStepsLeft = 0;
  ball.jumpCount = 0;
  ball.acceptCount = 0;
  ball.rejectCount = 0;
  clearLog();
  logMsg('info', 'Ball reset. Press Start.');
}

// ============================================================
//  CONTROLS
// ============================================================
function getVal(id) { return parseFloat(document.getElementById(id).value); }
function isChecked(id) { return document.getElementById(id).checked; }

// Wire up slider displays
const sliders = ['lr','momentum','friction','patience','plateau-thresh','jump-mult',
                 'explore-steps','descent-steps','complexity','roughness','speed'];
sliders.forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + '-val');
  el.addEventListener('input', () => {
    let v = parseFloat(el.value);
    if (id === 'plateau-thresh') valEl.textContent = v.toFixed(3);
    else if (id === 'roughness') valEl.textContent = v.toFixed(2);
    else valEl.textContent = v;
  });
});

document.getElementById('btn-start').addEventListener('click', () => {
  if (ball.state === 'idle' || ball.state === 'paused') {
    ball.state = 'running';
    logMsg('info', 'Optimization started.');
  }
});
document.getElementById('btn-pause').addEventListener('click', () => {
  if (ball.state === 'running' || ball.state === 'exploring_jump' || ball.state === 'exploring_descent') {
    ball.state = 'paused';
    logMsg('info', 'Paused.');
  }
});
document.getElementById('btn-reset').addEventListener('click', () => { resetBall(); });
document.getElementById('btn-new-landscape').addEventListener('click', () => {
  landscape = new Landscape(getVal('complexity'), getVal('roughness'));
  sliceY = 0;
  resetBall();
  logMsg('info', 'New landscape generated.');
});

// ============================================================
//  LOGGING
// ============================================================
const logEl = document.getElementById('log');
function logMsg(cls, msg) {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${ball.step}] ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

// ============================================================
//  PHYSICS STEP
// ============================================================
function physicsStep() {
  if (ball.state === 'idle' || ball.state === 'paused') return;

  const lr = getVal('lr') * 0.002;
  const mom = getVal('momentum');
  const friction = getVal('friction');
  const hoppingEnabled = isChecked('hopping-enabled');
  const patience = getVal('patience');
  const plateauThresh = getVal('plateau-thresh');
  const jumpMult = getVal('jump-mult');
  const exploreSteps = getVal('explore-steps');
  const descentSteps = getVal('descent-steps');

  const [grad] = landscape.gradient(ball.x, sliceY);
  const currentLoss = landscape.eval(ball.x, sliceY);

  if (ball.state === 'running') {
    // Normal SGD with momentum
    ball.vx = mom * ball.vx - lr * grad;
    ball.vx *= friction;
    ball.x += ball.vx;

    // Clamp
    ball.x = Math.max(VIEW.xMin + 0.1, Math.min(VIEW.xMax - 0.1, ball.x));

    ball.step++;
    ball.trail.push({ x: ball.x, z: currentLoss, state: 'normal' });
    if (ball.trail.length > 2000) ball.trail.shift();

    // Plateau detection
    if (currentLoss < ball.bestLoss - plateauThresh) {
      ball.bestLoss = currentLoss;
      ball.stepsWithoutImprovement = 0;
    } else {
      ball.stepsWithoutImprovement++;
    }

    // Trigger exploration?
    if (hoppingEnabled && ball.stepsWithoutImprovement >= patience) {
      ball.jumpCount++;
      logMsg('jump', `Plateau detected! loss=${currentLoss.toFixed(4)}, stale=${ball.stepsWithoutImprovement}. Jumping... (#${ball.jumpCount})`);
      ball.checkpointX = ball.x;
      ball.checkpointVx = ball.vx;
      ball.checkpointLoss = currentLoss;
      ball.state = 'exploring_jump';
      ball.exploreStepsLeft = exploreSteps;
      ball.vx = 0;
    }
  }
  else if (ball.state === 'exploring_jump') {
    // Big LR steps
    const jumpLr = lr * jumpMult;
    ball.vx = mom * ball.vx - jumpLr * grad;
    ball.vx *= friction;
    // Add some random perturbation for diversity
    ball.vx += (Math.random() - 0.5) * jumpLr * 5;
    ball.x += ball.vx;
    ball.x = Math.max(VIEW.xMin + 0.1, Math.min(VIEW.xMax - 0.1, ball.x));

    ball.step++;
    ball.trail.push({ x: ball.x, z: landscape.eval(ball.x, sliceY), state: 'jump' });
    if (ball.trail.length > 2000) ball.trail.shift();

    ball.exploreStepsLeft--;
    if (ball.exploreStepsLeft <= 0) {
      ball.state = 'exploring_descent';
      ball.descentStepsLeft = getVal('descent-steps');
      ball.vx = 0;
      logMsg('info', `Jump phase done at x=${ball.x.toFixed(3)}. Rolling down...`);
    }
  }
  else if (ball.state === 'exploring_descent') {
    // Normal descent in new basin
    ball.vx = mom * ball.vx - lr * grad;
    ball.vx *= friction;
    ball.x += ball.vx;
    ball.x = Math.max(VIEW.xMin + 0.1, Math.min(VIEW.xMax - 0.1, ball.x));

    ball.step++;
    ball.trail.push({ x: ball.x, z: landscape.eval(ball.x, sliceY), state: 'descent' });
    if (ball.trail.length > 2000) ball.trail.shift();

    ball.descentStepsLeft--;
    if (ball.descentStepsLeft <= 0) {
      const newLoss = landscape.eval(ball.x, sliceY);
      if (newLoss < ball.checkpointLoss) {
        // Accept!
        ball.acceptCount++;
        logMsg('accept', `✓ Better basin found! ${ball.checkpointLoss.toFixed(4)} → ${newLoss.toFixed(4)}`);
        ball.bestLoss = newLoss;
        ball.stepsWithoutImprovement = 0;
        ball.state = 'running';
      } else {
        // Reject — roll back
        ball.rejectCount++;
        logMsg('reject', `✗ Worse basin (${newLoss.toFixed(4)} ≥ ${ball.checkpointLoss.toFixed(4)}). Rolling back.`);
        ball.x = ball.checkpointX;
        ball.vx = ball.checkpointVx;
        ball.stepsWithoutImprovement = 0;
        // Slightly increase best loss tolerance to avoid immediate re-trigger
        ball.bestLoss = ball.checkpointLoss + 0.05;
        ball.state = 'running';
        ball.trail.push({ x: ball.x, z: ball.checkpointLoss, state: 'rollback' });
      }
    }
  }
}

// ============================================================
//  DRAW BALL & TRAIL
// ============================================================
function drawBall() {
  const z = landscape.eval(ball.x, sliceY);
  const [sx, sy] = worldToScreen(ball.x, z);

  // Trail
  if (ball.trail.length > 1) {
    for (let i = 1; i < ball.trail.length; i++) {
      const p = ball.trail[i];
      const pp = ball.trail[i - 1];
      const [x1, y1] = worldToScreen(pp.x, pp.z);
      const [x2, y2] = worldToScreen(p.x, p.z);
      const alpha = 0.15 + 0.6 * (i / ball.trail.length);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      if (p.state === 'jump') ctx.strokeStyle = `rgba(210,153,34,${alpha})`;
      else if (p.state === 'descent') ctx.strokeStyle = `rgba(63,185,80,${alpha})`;
      else if (p.state === 'rollback') ctx.strokeStyle = `rgba(248,81,73,${alpha})`;
      else ctx.strokeStyle = `rgba(88,166,255,${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Checkpoint marker
  if (ball.checkpointX !== null && (ball.state === 'exploring_jump' || ball.state === 'exploring_descent')) {
    const cz = landscape.eval(ball.checkpointX, sliceY);
    const [cx, cy] = worldToScreen(ball.checkpointX, cz);
    ctx.beginPath();
    ctx.arc(cx, cy - 12, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(248,81,73,0.6)';
    ctx.fill();
    ctx.strokeStyle = '#f85149';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Flag
    ctx.beginPath();
    ctx.moveTo(cx, cy - 12);
    ctx.lineTo(cx, cy - 30);
    ctx.strokeStyle = '#f85149';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#f85149';
    ctx.font = '10px monospace';
    ctx.fillText('checkpoint', cx + 4, cy - 22);
  }

  // Ball glow
  const glowColor = ball.state === 'exploring_jump' ? 'rgba(210,153,34,0.3)' :
                     ball.state === 'exploring_descent' ? 'rgba(63,185,80,0.3)' :
                     'rgba(88,166,255,0.3)';
  const glowR = ball.state.startsWith('exploring') ? 20 : 14;
  const grd = ctx.createRadialGradient(sx, sy - 12, 2, sx, sy - 12, glowR);
  grd.addColorStop(0, glowColor);
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(sx - glowR, sy - 12 - glowR, glowR * 2, glowR * 2);

  // Ball
  ctx.beginPath();
  ctx.arc(sx, sy - 12, 8, 0, Math.PI * 2);
  const ballColor = ball.state === 'exploring_jump' ? '#d29922' :
                    ball.state === 'exploring_descent' ? '#3fb950' :
                    '#58a6ff';
  ctx.fillStyle = ballColor;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Velocity arrow
  if (Math.abs(ball.vx) > 0.001) {
    const arrowLen = Math.min(Math.abs(ball.vx) * 3000, 60) * Math.sign(ball.vx);
    ctx.beginPath();
    ctx.moveTo(sx, sy - 12);
    ctx.lineTo(sx + arrowLen, sy - 12);
    ctx.strokeStyle = ballColor;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Arrowhead
    const dir = Math.sign(arrowLen);
    ctx.beginPath();
    ctx.moveTo(sx + arrowLen, sy - 12);
    ctx.lineTo(sx + arrowLen - dir * 8, sy - 17);
    ctx.lineTo(sx + arrowLen - dir * 8, sy - 7);
    ctx.closePath();
    ctx.fillStyle = ballColor;
    ctx.fill();
  }
}

// ============================================================
//  HUD UPDATE
// ============================================================
function updateHUD() {
  const z = landscape.eval(ball.x, sliceY);
  document.getElementById('hud-step').textContent = ball.step;
  document.getElementById('hud-loss').textContent = z.toFixed(4);
  document.getElementById('hud-best').textContent = ball.bestLoss === Infinity ? '—' : ball.bestLoss.toFixed(4);
  document.getElementById('hud-stale').textContent = ball.stepsWithoutImprovement;

  let stateLabel = ball.state;
  if (ball.state === 'exploring_jump') stateLabel = '🚀 JUMPING';
  else if (ball.state === 'exploring_descent') stateLabel = '⛰️ DESCENDING';
  else if (ball.state === 'running') stateLabel = '🏃 Running';
  else if (ball.state === 'paused') stateLabel = '⏸ Paused';
  else if (ball.state === 'idle') stateLabel = '⏹ Idle';
  document.getElementById('hud-state').textContent = stateLabel;
}

// ============================================================
//  LOSS CHART (mini sparkline at bottom)
// ============================================================
const lossHistory = [];
const MAX_HISTORY = 500;

function drawLossChart() {
  if (lossHistory.length < 2) return;

  const chartH = 60;
  const chartW = W();
  const chartY = H() - chartH - 10;

  // Background
  ctx.fillStyle = 'rgba(13,17,23,0.75)';
  ctx.fillRect(0, chartY, chartW, chartH + 10);
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, chartY, chartW, chartH);

  // Label
  ctx.fillStyle = '#484f58';
  ctx.font = '10px monospace';
  ctx.fillText('Loss over time', 6, chartY + 12);

  // Find range
  let minL = Infinity, maxL = -Infinity;
  for (const l of lossHistory) {
    if (l.val < minL) minL = l.val;
    if (l.val > maxL) maxL = l.val;
  }
  const range = maxL - minL || 1;

  // Draw
  ctx.beginPath();
  for (let i = 0; i < lossHistory.length; i++) {
    const px = (i / MAX_HISTORY) * chartW;
    const py = chartY + chartH - ((lossHistory[i].val - minL) / range) * (chartH - 16) - 4;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Best line
  if (ball.bestLoss !== Infinity) {
    const by = chartY + chartH - ((ball.bestLoss - minL) / range) * (chartH - 16) - 4;
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.moveTo(0, by);
    ctx.lineTo(chartW, by);
    ctx.strokeStyle = '#3fb950';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ============================================================
//  LEGEND
// ============================================================
function drawLegend() {
  const lx = 12, ly = 14;
  const items = [
    { color: '#58a6ff', label: 'Normal descent' },
    { color: '#d29922', label: 'Jump (exploration)' },
    { color: '#3fb950', label: 'Descent (new basin)' },
    { color: '#f85149', label: 'Rollback' },
  ];
  ctx.font = '11px Segoe UI, sans-serif';
  items.forEach((item, i) => {
    const y = ly + i * 18;
    ctx.fillStyle = item.color;
    ctx.fillRect(lx, y, 12, 12);
    ctx.fillStyle = '#8b949e';
    ctx.fillText(item.label, lx + 18, y + 10);
  });

  // Stats
  const statsY = ly + items.length * 18 + 8;
  ctx.fillStyle = '#484f58';
  ctx.font = '11px monospace';
  ctx.fillText(`Jumps: ${ball.jumpCount}  Accepted: ${ball.acceptCount}  Rejected: ${ball.rejectCount}`, lx, statsY);
}

// ============================================================
//  CLICK TO PLACE BALL
// ============================================================
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Convert screen to world
  const wx = VIEW.xMin + (mx / (rect.width)) * (VIEW.xMax - VIEW.xMin);
  const wz = VIEW.yMax - (my / (rect.height)) * (VIEW.yMax - VIEW.yMin);

  // Place ball at this x, on the landscape surface
  ball.x = wx;
  ball.vx = 0;
  ball.bestLoss = landscape.eval(ball.x, sliceY);
  ball.stepsWithoutImprovement = 0;
  ball.trail = [];
  lossHistory.length = 0;
  logMsg('info', `Ball placed at x=${wx.toFixed(3)}, loss=${ball.bestLoss.toFixed(4)}`);
});

// ============================================================
//  MAIN LOOP
// ============================================================
let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60; // 60 Hz physics

function frame(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  const speed = getVal('speed');
  accumulator += dt * speed;

  // Run physics steps
  const maxStepsPerFrame = 20;
  let stepsThisFrame = 0;
  while (accumulator >= FIXED_DT && stepsThisFrame < maxStepsPerFrame) {
    physicsStep();
    accumulator -= FIXED_DT;
    stepsThisFrame++;

    // Record loss
    if (ball.state !== 'idle' && ball.state !== 'paused') {
      const z = landscape.eval(ball.x, sliceY);
      lossHistory.push({ val: z, state: ball.state });
      if (lossHistory.length > MAX_HISTORY) lossHistory.shift();
    }
  }
  if (accumulator > FIXED_DT * maxStepsPerFrame) accumulator = 0;

  // === RENDER ===
  ctx.clearRect(0, 0, W(), H());

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W(), H());

  drawGrid();
  drawLandscape1D();
  drawBall();
  drawLossChart();
  drawLegend();
  updateHUD();

  requestAnimationFrame(frame);
}

// ============================================================
//  INIT
// ============================================================
resetBall();
logMsg('info', 'Welcome to BasinHopper! Click on the landscape to place the ball, then press Start.');
logMsg('info', 'Toggle Basin Hopping on/off to see the difference.');
requestAnimationFrame(frame);

</script>
