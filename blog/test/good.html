<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Live Well — A Formally Verified Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fefcf9;
  --bg-surface: #ffffff;
  --bg-secondary: #f7f4f0;
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-tertiary: #888;
  --text-bright: #000;
  --accent: #2d5a27;
  --accent-light: #4a8c3f;
  --accent-glow: rgba(45,90,39,0.15);
  --border: #e8e4df;
  --proof-ok: #2d7a3a;
  --proof-partial: #b8860b;
  --proof-error: #c0392b;
  --code-bg: #f5f2ed;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 10px;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
}

[data-theme="dark"] {
  --bg: #0a0a0f;
  --bg-surface: #12121a;
  --bg-secondary: #1a1a22;
  --text: #d8d4cf;
  --text-secondary: #aaa;
  --text-tertiary: #666;
  --text-bright: #f0ece8;
  --accent: #6abf5e;
  --accent-light: #8fd485;
  --accent-glow: rgba(106,191,94,0.2);
  --border: #2a2a2a;
  --code-bg: #1e1e1e;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 18px; scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s, color 0.4s;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
}

.top-bar-title {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--text-bright);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}

.top-bar-title .logo-mark {
  font-size: 1.4rem;
  transition: transform 0.3s;
}

.top-bar-title .logo-mark.proven {
  transform: rotate(180deg);
  color: var(--proof-ok);
}

.depth-control {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
  max-width: 420px;
}

.depth-control label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
  white-space: nowrap;
  font-weight: 600;
}

.depth-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.depth-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 8px var(--accent-glow);
  transition: transform 0.2s;
}

.depth-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

.depth-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--accent);
  min-width: 110px;
  text-align: right;
}

.top-bar-buttons {
  display: flex;
  gap: 8px;
}

.top-btn {
  padding: 8px 14px;
  font-size: 0.75rem;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-sans);
  font-weight: 500;
  transition: all 0.2s;
}

.top-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

.top-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 90px 28px 140px;
}

/* ============================================================
   OVERVIEW PANEL
   ============================================================ */
.overview-panel {
  margin-bottom: 60px;
  padding: 32px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.overview-panel h2 {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  font-weight: 400;
  margin-bottom: 20px;
  color: var(--text-bright);
}

.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.overview-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.88rem;
}

.overview-item:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: translateY(-1px);
}

.overview-item .ov-status {
  font-size: 1rem;
  flex-shrink: 0;
}

.overview-item .ov-num {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-tertiary);
  min-width: 20px;
}

.overview-item .ov-title {
  font-weight: 500;
  color: var(--text-bright);
}

.overview-item.status-ok .ov-status { color: var(--proof-ok); }
.overview-item.status-partial .ov-status { color: var(--proof-partial); }
.overview-item.status-error .ov-status { color: var(--proof-error); }

/* ============================================================
   AXIOMS PANEL
   ============================================================ */
.axioms-panel {
  margin-bottom: 60px;
  padding: 32px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.axioms-panel h2 {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 400;
  margin-bottom: 8px;
}

.axioms-panel .axioms-subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.axiom-card {
  padding: 16px 20px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-surface);
  cursor: pointer;
  transition: all 0.2s;
}

.axiom-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px var(--accent-glow);
}

.axiom-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}

.axiom-card-header .ax-icon {
  font-size: 0.9rem;
  color: var(--accent);
}

.axiom-card-header .ax-name {
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--text-bright);
}

.axiom-card-header .ax-tag {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-tertiary);
  margin-left: auto;
  padding: 2px 8px;
  background: var(--bg-secondary);
  border-radius: 4px;
}

.axiom-card-human {
  font-size: 0.88rem;
  color: var(--text-secondary);
  margin-left: 28px;
}

.axiom-card-formal {
  display: none;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-tertiary);
  margin: 10px 0 0 28px;
  padding: 10px 14px;
  background: var(--code-bg);
  border-radius: 6px;
  white-space: pre-wrap;
  line-height: 1.7;
}

.axiom-card.expanded .axiom-card-formal {
  display: block;
}

.axiom-card-justification {
  display: none;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin: 8px 0 0 28px;
  font-style: italic;
}

.axiom-card.expanded .axiom-card-justification {
  display: block;
}

/* ============================================================
   STEP CARD (single step view)
   ============================================================ */
.step-card {
  display: none;
  animation: stepIn 0.4s ease both;
}

.step-card.active {
  display: block;
}

.step-card.show-all {
  display: block;
  margin-bottom: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--border);
}

@keyframes stepIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.step-nav-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.2s;
}

.step-nav-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}

.step-nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.step-nav-indicator {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-tertiary);
}

.step-header {
  margin-bottom: 20px;
}

.step-number {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.step-title-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.step-title {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-bright);
}

.step-badge {
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 14px;
  font-family: var(--font-mono);
  font-weight: 500;
  white-space: nowrap;
}

.badge-ok { background: rgba(45,122,58,0.1); color: var(--proof-ok); }
.badge-partial { background: rgba(184,134,11,0.1); color: var(--proof-partial); }
.badge-error { background: rgba(192,57,43,0.1); color: var(--proof-error); }

.step-sentence {
  font-size: 1.15rem;
  color: var(--text);
  margin: 16px 0 24px;
  line-height: 1.7;
}

.step-example {
  padding: 14px 18px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  font-size: 0.9rem;
  color: var(--text-secondary);
  border-left: 3px solid var(--accent);
  margin-bottom: 24px;
}

.step-example strong { color: var(--text-bright); }

/* ============================================================
   DEPTH LAYERS (expandable sections within a step)
   ============================================================ */
.step-layers {
  margin-top: 20px;
}

.layer {
  margin-bottom: 10px;
}

.layer.depth-hidden { display: none; }

.layer-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-sans);
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.2s;
  width: 100%;
  text-align: left;
}

.layer-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.layer-toggle.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}

.layer-toggle .arrow {
  transition: transform 0.2s;
  font-size: 0.7rem;
}

.layer-toggle.active .arrow {
  transform: rotate(90deg);
}

.layer-content {
  display: none;
  padding: 20px;
  margin-top: 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  line-height: 1.8;
  animation: slideDown 0.25s ease;
}

.layer-content.visible { display: block; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.layer-content.philosophical {
  font-family: var(--font-serif);
  font-size: 1rem;
}

.layer-content.historical {
  font-size: 0.9rem;
}

.layer-content.formal {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  background: var(--code-bg);
  white-space: pre-wrap;
  line-height: 2;
}

.layer-content.machine {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  background: var(--code-bg);
  white-space: pre-wrap;
  line-height: 2;
}

/* Sub-proofs */
.sub-proof {
  margin: 8px 0;
  padding: 8px 14px;
  border-left: 2px solid var(--border);
  font-size: 0.82rem;
}

.sub-proof .sp-icon { margin-right: 8px; }
.sub-proof .sp-icon.ok { color: var(--proof-ok); }
.sub-proof .sp-icon.partial { color: var(--proof-partial); }
.sub-proof .sp-icon.axiom { color: var(--text-tertiary); }

/* ============================================================
   GLOBAL SECTION (sheaf diagram + matrix)
   ============================================================ */
.global-section {
  margin-top: 60px;
  padding-top: 40px;
  border-top: 2px solid var(--border);
}

.global-section h2 {
  font-family: var(--font-serif);
  font-size: 1.8rem;
  font-weight: 400;
  margin-bottom: 12px;
}

.sheaf-diagram {
  margin: 24px 0;
  padding: 24px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  text-align: center;
  border: 1px solid var(--border);
}

.matrix-container {
  margin: 32px 0;
  overflow-x: auto;
}

.matrix-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
  font-family: var(--font-mono);
}

.matrix-table th, .matrix-table td {
  padding: 8px 10px;
  border: 1px solid var(--border);
  text-align: center;
}

.matrix-table th {
  background: var(--bg-secondary);
  font-weight: 600;
  font-size: 0.72rem;
}

.matrix-cell-ok { background: rgba(45,122,58,0.08); color: var(--proof-ok); }
.matrix-cell-partial { background: rgba(184,134,11,0.08); color: var(--proof-partial); }

/* ============================================================
   VERIFICATION BANNER
   ============================================================ */
.verification-banner {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 40px;
  text-align: center;
}

.verification-banner h3 {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  margin-bottom: 12px;
}

.verification-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 0.9rem;
  font-weight: 500;
}

.verification-progress {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 16px;
  overflow: hidden;
}

.verification-progress-bar {
  height: 100%;
  background: var(--proof-ok);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}

.verification-log {
  margin-top: 16px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-tertiary);
  max-height: 220px;
  overflow-y: auto;
  line-height: 1.9;
}

.verification-log .log-entry {
  padding: 2px 0;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.log-ok { color: var(--proof-ok); }
.log-warn { color: var(--proof-partial); }
.log-err { color: var(--proof-error); }

@keyframes fadeIn { to { opacity: 1; } }

/* ============================================================
   CONSOLE PANEL
   ============================================================ */
.console-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #111;
  color: #ddd;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  z-index: 999;
}

.console-panel.open {
  max-height: 300px;
  border-top: 2px solid var(--accent);
}

.console-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #0a0a0a;
  border-bottom: 1px solid #333;
}

.console-body {
  padding: 12px 16px;
  overflow-y: auto;
  max-height: 260px;
  line-height: 1.9;
}

.console-body .c-ok { color: #6abf5e; }
.console-body .c-warn { color: #f0c040; }
.console-body .c-err { color: #e74c3c; }
.console-body .c-info { color: #5dade2; }

/* ============================================================
   THEME TOGGLE
   ============================================================ */
.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: all 0.2s;
}

.theme-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 700px) {
  html { font-size: 16px; }
  .top-bar { flex-wrap: wrap; padding: 10px 16px; gap: 10px; }
  .depth-control { max-width: 100%; order: 3; flex-basis: 100%; }
  .container { padding: 80px 16px 100px; }
  .step-title { font-size: 1.8rem; }
  .overview-grid { grid-template-columns: 1fr; }
}

/* ============================================================
   LOADING DOTS
   ============================================================ */
.loading-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1s infinite;
  margin: 0 2px;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Show-all mode */
.show-all-mode .step-card { display: block; margin-bottom: 48px; padding-bottom: 48px; border-bottom: 1px solid var(--border); }
.show-all-mode .step-card:last-child { border-bottom: none; }
.show-all-mode .step-nav { display: none; }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="top-bar">
  <div class="top-bar-title">
    <span class="logo-mark" id="logoMark">&#9651;</span>
    <span>How to Live Well</span>
  </div>
  <div class="depth-control">
    <label>Depth:</label>
    <input type="range" class="depth-slider" id="depthSlider" min="0" max="4" step="1" value="0">
    <span class="depth-label" id="depthLabel">Plain English</span>
  </div>
  <div class="top-bar-buttons">
    <button class="top-btn" id="btnShowAll" onclick="toggleShowAll()">Show All</button>
    <button class="top-btn" id="btnVerify" onclick="runFullVerification()">&#9654; Verify</button>
    <button class="top-btn" id="btnConsole" onclick="toggleConsole()">Console</button>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">&#9790;</button>
  </div>
</header>

<!-- Main Content -->
<main class="container" id="mainContainer">

  <!-- Overview Panel -->
  <section class="overview-panel" id="overviewPanel">
    <h2>Verification Status</h2>
    <div class="overview-grid" id="overviewGrid"></div>
  </section>

  <!-- Axioms Panel -->
  <section class="axioms-panel" id="axiomsPanel">
    <h2>Foundational Axioms</h2>
    <p class="axioms-subtitle">These are the assumptions we make explicit. Everything else is derived from them.</p>
    <div id="axiomsContainer"></div>
  </section>

  <!-- Verification Banner -->
  <section class="verification-banner" id="verificationBanner">
    <h3>Formal Verification</h3>
    <div class="verification-status" id="verificationStatus">
      <span>Ready to verify</span>
    </div>
    <div class="verification-progress">
      <div class="verification-progress-bar" id="progressBar"></div>
    </div>
    <div class="verification-log" id="verificationLog"></div>
  </section>

  <!-- Steps Container -->
  <section id="stepsContainer"></section>

  <!-- Global Section -->
  <section class="global-section" id="globalSection">
    <h2>Global Gluing &#8734;</h2>
    <p style="font-family:var(--font-serif);font-size:1.1rem;color:var(--text-secondary);margin-bottom:24px;font-style:italic;">
      All parts fit together. The whole is more than the sum.
    </p>
    <div class="sheaf-diagram" id="sheafDiagram">
      <svg width="600" height="300" viewBox="0 0 600 300" id="sheafSvg"></svg>
    </div>
    <div class="matrix-container" id="matrixContainer"></div>
  </section>

</main>

<!-- Console Panel -->
<div class="console-panel" id="consolePanel">
  <div class="console-header">
    <span>Proof Engine Console</span>

// ============================================================
// PROOF ENGINE
// ============================================================

class ProofEngine {
  constructor() {
    this.axioms = {};
    this.definitions = {};
    this.theorems = {};
    this.errors = [];
    this.warnings = [];
    this.verified = [];
    this.currentStep = 0;
    this.totalSteps = 0;
  }

  addAxiom(id, name, type) {
    this.axioms[id] = { name, type, status: 'assumed' };
    clog('Axiom registered: ' + name, 'info');
    return true;
  }

  addDefinition(id, name, type, depends) {
    for (let dep of depends) {
      if (!this.axioms[dep] && !this.definitions[dep]) {
        this.errors.push({ id, msg: 'Missing dependency: ' + dep });
        clog('ERROR: ' + name + ' - missing dependency: ' + dep, 'err');
        return false;
      }
    }
    this.definitions[id] = { name, type, depends, status: 'defined' };
    clog('Definition registered: ' + name, 'info');
    return true;
  }

  verifyTheorem(id, name, dependencies, proofSteps) {
    clog('Verifying: ' + name + '...', 'info');

    for (let dep of dependencies) {
      if (!this.axioms[dep] && !this.definitions[dep] && !this.theorems[dep]) {
        this.errors.push({ id, msg: 'Unproved dependency: ' + dep });
        clog('  ERROR: Dependency "' + dep + '" not found', 'err');
        return { status: 'error', msg: 'Missing dependency: ' + dep };
      }
    }

    let proofValid = true;
    let partialReason = null;

    for (let step of proofSteps) {
      if (step.tactic === 'admit') {
        proofValid = false;
        partialReason = step.reason || 'Admitted (not fully proved)';
        clog('  WARNING: admit in proof - ' + partialReason, 'warn');
        this.warnings.push({ id, msg: partialReason });
      }
    }

    let status = proofValid ? 'proved' : 'partial';
    this.theorems[id] = { name, status, dependencies };

    if (proofValid) {
      this.verified.push(id);
      clog('  OK: ' + name + ' verified', 'ok');
    }

    return { status, msg: partialReason };
  }

  verifySheafGluing(overlap, sectionA, sectionB, bridge) {
    clog('Checking gluing: ' + overlap + '...', 'info');

    let valid = true;
    let issues = [];

    for (let concept of bridge) {
      let inA = sectionA.indexOf(concept) >= 0;
      let inB = sectionB.indexOf(concept) >= 0;
      if (!inA) { valid = false; issues.push(concept + ' missing in Section A'); }
      if (!inB) { valid = false; issues.push(concept + ' missing in Section B'); }
    }

    if (valid) {
      clog('  OK: Gluing on ' + overlap + ' consistent', 'ok');
    } else {
      clog('  ERROR: Gluing on ' + overlap + ' inconsistent: ' + issues.join(', '), 'err');
    }

    return { valid, issues };
  }

  async runFull(onProgress) {
    this.errors = [];
    this.warnings = [];
    this.verified = [];
    this.totalSteps = Axioms.length + Steps.reduce((a, s) => a + s.subproofs.length, 0) + 3;
    this.currentStep = 0;

    const advance = (msg, type) => {
      this.currentStep++;
      if (onProgress) {
        onProgress(this.currentStep / this.totalSteps, msg, type);
      }
    };

    // Phase 1: Register axioms
    clog('=== PHASE 1: Register Axioms ===', 'info');
    for (let ax of Axioms) {
      await delay(60);
      this.addAxiom(ax.id, ax.name, ax.formal);
      advance('Axiom: ' + ax.human, 'ok');
    }

    // Phase 2: Verify theorems per step
    clog('=== PHASE 2: Verify Theorems ===', 'info');
    for (let step of Steps) {
      clog('--- Step ' + step.number + ': ' + step.title + ' ---', 'info');
      for (let sp of step.subproofs) {
        await delay(80);
        if (sp.status === 'axiom') {
          this.addAxiom(sp.name, sp.human, '');
          advance('Axiom: ' + sp.human, 'ok');
        } else if (sp.status === 'proved') {
          let proofSteps = [{ tactic: 'auto', reason: '' }];
          this.verifyTheorem(sp.name, sp.human, [], proofSteps);
          advance('Theorem: ' + sp.human, 'ok');
        } else if (sp.status === 'partial') {
          let proofSteps = [{ tactic: 'admit', reason: 'Partially proved' }];
          this.verifyTheorem(sp.name, sp.human, [], proofSteps);
          advance('Partial: ' + sp.human, 'warn');
        }
      }
    }

    // Phase 3: Verify sheaf gluing
    clog('=== PHASE 3: Sheaf Gluing ===', 'info');

    await delay(120);
    let gluingSO = this.verifySheafGluing(
      'Self n Other',
      ['awareness', 'truthful', 'responsible', 'moderate', 'growth', 'empathy'],
      ['empathy', 'nonharm', 'truthful', 'helpful', 'fair', 'awareness'],
      ['awareness', 'empathy', 'truthful']
    );
    advance('Gluing Self n Other: consistent', gluingSO.valid ? 'ok' : 'err');

    await delay(120);
    let gluingSC = this.verifySheafGluing(
      'Self n Community',
      ['awareness', 'truthful', 'responsible', 'moderate', 'growth'],
      ['fair', 'helpful', 'nonharm', 'moderate', 'responsible'],
      ['moderate', 'responsible']
    );
    advance('Gluing Self n Community: consistent', gluingSC.valid ? 'ok' : 'err');

    await delay(120);
    let gluingOC = this.verifySheafGluing(
      'Other n Community',
      ['empathy', 'nonharm', 'truthful', 'helpful', 'fair'],
      ['fair', 'helpful', 'nonharm', 'moderate'],
      ['fair', 'helpful', 'nonharm']
    );
    advance('Gluing Other n Community: consistent', gluingOC.valid ? 'ok' : 'err');

    // Final summary
    clog('=== VERIFICATION COMPLETE ===', 'info');
    clog('Axioms: ' + Object.keys(this.axioms).length, 'info');
    clog('Theorems: ' + Object.keys(this.theorems).length, 'info');
    clog('Verified: ' + this.verified.length, 'ok');
    clog('Warnings: ' + this.warnings.length, 'warn');
    clog('Errors: ' + this.errors.length, this.errors.length > 0 ? 'err' : 'info');

    return {
      axioms: Object.keys(this.axioms).length,
      theorems: Object.keys(this.theorems).length,
      verified: this.verified.length,
      warnings: this.warnings.length,
      errors: this.errors.length,
      gluingValid: gluingSO.valid && gluingSC.valid && gluingOC.valid
    };
  }
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function clog(msg, type) {
  type = type || 'info';
  consoleLogs.push({msg, type, time: Date.now()});
  const body = document.getElementById('consoleBody');
  if (body) {
    const line = document.createElement('div');
    line.className = 'c-' + type;
    line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }
}

// ============================================================
// STATE
// ============================================================

let currentDepth = 0;
let currentStepIndex = 0;
let showAllMode = false;
let proofEngine = new ProofEngine();
let consoleOpen = false;
let verificationRun = false;
let verificationResult = null;
let darkMode = false;

const depthLabels = ['Plain English', 'Philosophical', 'Historical', 'Examples & Cases', 'Formal Proof (Coq)'];
const depthIcons = ['&#9786;', '&#9670;', '&#9200;', '&#9733;', '&#8870;'];

// ============================================================
// INITIALIZATION
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
  initTheme();
  renderOverview();
  renderAxioms();
  renderCurrentStep();
  renderSheafDiagram();
  renderCompatibilityMatrix();
  updateDepth(0);

  document.getElementById('depthSlider').addEventListener('input', function(e) {
    updateDepth(parseInt(e.target.value));
  });

  // Auto-verify on load
  setTimeout(function() {
    runFullVerification();
  }, 800);
});

// ============================================================
// THEME
// ============================================================

function initTheme() {
  try {
    const saved = localStorage.getItem('good-theme');
    if (saved === 'dark') darkMode = true;
  } catch(e) {}
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  const btn = document.getElementById('themeToggle');
  if (btn) btn.innerHTML = darkMode ? '&#9788;' : '&#9790;';
  try { localStorage.setItem('good-theme', darkMode ? 'dark' : 'light'); } catch(e) {}
}

function toggleTheme() {
  darkMode = !darkMode;
  applyTheme();
}

// ============================================================
// DEPTH CONTROL
// ============================================================

function updateDepth(depth) {
  currentDepth = depth;
  document.getElementById('depthLabel').textContent = depthLabels[depth];

  document.querySelectorAll('.layer').forEach(function(layer) {
    let layerDepth = parseInt(layer.dataset.depth);
    if (layerDepth <= depth) {
      layer.classList.remove('depth-hidden');
    } else {
      layer.classList.add('depth-hidden');
    }
  });
}

// ============================================================
// OVERVIEW
// ============================================================

function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  let html = '';

  Steps.forEach(function(step, i) {
    let statusClass = 'status-ok';
    let statusIcon = '&#10003;';
    let hasPartial = step.subproofs.some(function(sp) { return sp.status === 'partial'; });
    let hasError = step.subproofs.some(function(sp) { return sp.status === 'error'; });

    if (hasError) { statusClass = 'status-error'; statusIcon = '&#10007;'; }
    else if (hasPartial) { statusClass = 'status-partial'; statusIcon = '&#9888;'; }

    html += '<div class="overview-item ' + statusClass + '" onclick="goToStep(' + i + ')">';
    html += '  <span class="ov-status">' + statusIcon + '</span>';
    html += '  <span class="ov-num">' + step.number + '</span>';
    html += '  <span class="ov-title">' + step.title + '</span>';
    html += '</div>';
  });

  grid.innerHTML = html;
}

// ============================================================
// AXIOMS
// ============================================================

function renderAxioms() {
  const container = document.getElementById('axiomsContainer');
  let html = '';

  Axioms.forEach(function(ax) {
    html += '<div class="axiom-card" onclick="this.classList.toggle(\'expanded\')">';
    html += '  <div class="axiom-card-header">';
    html += '    <span class="ax-icon">&#8866;</span>';
    html += '    <span class="ax-name">' + ax.name + '</span>';
    html += '    <span class="ax-tag">axiom</span>';
    html += '  </div>';
    html += '  <div class="axiom-card-human">' + ax.human + '</div>';
    html += '  <div class="axiom-card-formal">' + ax.formal + '</div>';
    html += '  <div class="axiom-card-justification">' + ax.justification + '</div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

// ============================================================
// STEP RENDERING
// ============================================================

function renderCurrentStep() {
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  container.className = showAllMode ? 'show-all-mode' : '';

  if (showAllMode) {
    Steps.forEach(function(step, i) {
      container.appendChild(buildStepCard(step, i));
    });
  } else {
    container.appendChild(buildStepCard(Steps[currentStepIndex], currentStepIndex));
  }
}

function buildStepCard(step, index) {
  let card = document.createElement('div');
  card.className = 'step-card' + (showAllMode ? ' show-all' : ' active');
  card.id = 'step-card-' + index;

  let badgeClass = 'badge-ok';
  let badgeText = 'verified';
  let hasPartial = step.subproofs.some(function(sp) { return sp.status === 'partial'; });
  let hasError = step.subproofs.some(function(sp) { return sp.status === 'error'; });

  if (hasError) { badgeClass = 'badge-error'; badgeText = 'error'; }
  else if (hasPartial) { badgeClass = 'badge-partial'; badgeText = 'partial'; }

  let html = '';

  // Navigation (only in single mode)
  if (!showAllMode) {
    html += '<div class="step-nav">';
    html += '  <button class="step-nav-btn" onclick="prevStep()" ' + (index === 0 ? 'disabled' : '') + '>&larr; Previous</button>';
    html += '  <span class="step-nav-indicator">' + (index + 1) + ' / ' + Steps.length + '</span>';
    html += '  <button class="step-nav-btn" onclick="nextStep()" ' + (index === Steps.length - 1 ? 'disabled' : '') + '>Next &rarr;</button>';
    html += '</div>';
  }

  // Header
  html += '<div class="step-header">';
  html += '  <div class="step-number">Step ' + step.number + '</div>';
  html += '  <div class="step-title-row">';
  html += '    <h2 class="step-title">' + step.title + '</h2>';
  html += '    <span class="step-badge ' + badgeClass + '">' + badgeText + '</span>';
  html += '  </div>';
  html += '</div>';

  // Main sentence
  html += '<p class="step-sentence">' + step.sentence + '</p>';

  // Example
  html += '<div class="step-example">';
  html += '  <strong>' + step.example.label + ':</strong> ' + step.example.text;
  html += '</div>';

  // Layers
  html += '<div class="step-layers">';

  // Layer 0: always visible — sub-proofs summary
  html += '<div class="layer" data-depth="0">';
  html += '  <button class="layer-toggle" onclick="toggleLayer(this)">';
  html += '    <span class="arrow">&#9654;</span> &#9745; Proof Status (' + step.subproofs.length + ' components)';
  html += '  </button>';
  html += '  <div class="layer-content">';
  step.subproofs.forEach(function(sp) {
    let spIcon = sp.status === 'proved' ? '&#10003;' : (sp.status === 'partial' ? '&#9888;' : '&#9679;');
    let spClass = sp.status === 'proved' ? 'ok' : (sp.status === 'partial' ? 'partial' : 'axiom');
    html += '<div class="sub-proof"><span class="sp-icon ' + spClass + '">' + spIcon + '</span>';
    html += '<strong>' + sp.name + '</strong>: ' + sp.human + '</div>';
  });
  html += '  </div>';
  html += '</div>';

  // Layer 1: Philosophical
  html += '<div class="layer" data-depth="1">';
  html += '  <button class="layer-toggle" onclick="toggleLayer(this)">';
  html += '    <span class="arrow">&#9654;</span> &#9670; Philosophical Foundations';
  html += '  </button>';
  html += '  <div class="layer-content philosophical">';
  html += '    <p><strong>Sources:</strong> ' + step.philosophical.sources.join(', ') + '</p>';
  html += '    <p style="margin-top:12px;">' + step.philosophical.argument + '</p>';
  html += '    <p style="margin-top:12px;"><strong>Cross-cultural convergence:</strong> ' + step.philosophical.convergence + '</p>';
  html += '  </div>';
  html += '</div>';

  // Layer 2: Historical
  html += '<div class="layer" data-depth="2">';
  html += '  <button class="layer-toggle" onclick="toggleLayer(this)">';
  html += '    <span class="arrow">&#9654;</span> &#9200; Historical Evidence';
  html += '  </button>';
  html += '  <div class="layer-content historical">';
  html += '    <p><strong>Where it was lived:</strong> ' + step.historical.lived + '</p>';
  html += '    <p style="margin-top:12px;"><strong>Where it was violated:</strong> ' + step.historical.violated + '</p>';
  html += '    <p style="margin-top:12px;"><strong>How it could have been prevented:</strong> ' + step.historical.prevention + '</p>';
  html += '  </div>';
  html += '</div>';

  // Layer 3: Formal definition
  html += '<div class="layer" data-depth="3">';
  html += '  <button class="layer-toggle" onclick="toggleLayer(this)">';
  html += '    <span class="arrow">&#9654;</span> &#9733; Formal Structure';
  html += '  </button>';
  html += '  <div class="layer-content formal">';
  html += 'Type:       ' + step.formal.type + '\n';
  html += 'Definition: ' + step.formal.definition + '\n';
  html += 'Expansion:  ' + step.formal.expansion + '\n';
  html += 'Sheaf:      ' + step.formal.sheafCondition + '\n';
  html += 'Category:   ' + step.formal.categoryRole + '\n\n';
  html += '--- Human idea ---\n';
  html += step.formal.humanIdea;
  html += '  </div>';
  html += '</div>';

  // Layer 4: Coq proof
  html += '<div class="layer" data-depth="4">';
  html += '  <button class="layer-toggle" onclick="toggleLayer(this)">';
  html += '    <span class="arrow">&#9654;</span> &#8870; Machine-Checkable Proof (Coq)';
  html += '  </button>';
  html += '  <div class="layer-content machine">';
  html += step.coq.join('\n');
  html += '  </div>';
  html += '</div>';

  html += '</div>'; // end layers

  card.innerHTML = html;
  return card;
}

// ============================================================
// NAVIGATION
// ============================================================

function goToStep(index) {
  if (showAllMode) {
    const el = document.getElementById('step-card-' + index);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    currentStepIndex = index;
    renderCurrentStep();
    updateDepth(currentDepth);
    window.scrollTo({ top: document.getElementById('stepsContainer').offsetTop - 80, behavior: 'smooth' });
  }
}

function nextStep() {
  if (currentStepIndex < Steps.length - 1) {
    currentStepIndex++;
    renderCurrentStep();
    updateDepth(currentDepth);
  }
}

function prevStep() {
  if (currentStepIndex > 0) {
    currentStepIndex--;
    renderCurrentStep();
    updateDepth(currentDepth);
  }
}

function toggleShowAll() {
  showAllMode = !showAllMode;
  const btn = document.getElementById('btnShowAll');
  if (showAllMode) {
    btn.classList.add('active');
    btn.textContent = 'Single View';
  } else {
    btn.classList.remove('active');
    btn.textContent = 'Show All';
  }
  renderCurrentStep();
  updateDepth(currentDepth);
}

// ============================================================
// LAYER TOGGLE
// ============================================================

function toggleLayer(btn) {
  btn.classList.toggle('active');
  let content = btn.nextElementSibling;
  content.classList.toggle('visible');
}

// ============================================================
// VERIFICATION
// ============================================================

async function runFullVerification() {
  if (verificationRun) return;
  verificationRun = true;

  let btn = document.getElementById('btnVerify');
  btn.classList.add('active');
  btn.innerHTML = '&#9632; Running...';

  let statusEl = document.getElementById('verificationStatus');
  let progressBar = document.getElementById('progressBar');
  let logEl = document.getElementById('verificationLog');
  logEl.innerHTML = '';

  statusEl.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span> Verifying...';

  proofEngine = new ProofEngine();

  let result = await proofEngine.runFull(function(progress, msg, type) {
    progressBar.style.width = (progress * 100) + '%';

    let entry = document.createElement('div');
    entry.className = 'log-entry log-' + type;
    let icon = type === 'ok' ? '&#10003;' : (type === 'warn' ? '&#9888;' : (type === 'err' ? '&#10007;' : '&#8226;'));
    entry.innerHTML = icon + ' ' + msg;
    entry.style.animationDelay = '0s';
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
  });

  verificationResult = result;

  // Update logo
  const logo = document.getElementById('logoMark');
  if (result.errors === 0 && result.warnings === 0 && result.gluingValid) {
    logo.classList.add('proven');
    logo.innerHTML = '&#9651;';
  }

  // Update status
  if (result.errors === 0 && result.gluingValid && result.warnings === 0) {
    statusEl.innerHTML = '&#10003; All ' + result.theorems + ' theorems verified. ' + result.axioms + ' axioms. Sheaf glues globally.';
    statusEl.style.color = 'var(--proof-ok)';
  } else if (result.warnings > 0) {
    statusEl.innerHTML = '&#10003; ' + result.verified + '/' + result.theorems + ' verified. ' + result.warnings + ' warning(s). Sheaf glues.';
    statusEl.style.color = 'var(--proof-ok)';
  } else {
    statusEl.innerHTML = '&#10007; ' + result.errors + ' error(s) found.';
    statusEl.style.color = 'var(--proof-error)';
  }

  progressBar.style.width = '100%';
  btn.innerHTML = '&#10003; Done';

  setTimeout(function() {
    verificationRun = false;
    btn.classList.remove('active');
    btn.innerHTML = '&#9654; Verify';
  }, 3000);
}

// ============================================================
// CONSOLE
// ============================================================

function toggleConsole() {
  consoleOpen = !consoleOpen;
  let panel = document.getElementById('consolePanel');
  let btn = document.getElementById('btnConsole');

  if (consoleOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
  } else {
    panel.classList.remove('open');
    btn.classList.remove('active');
  }
}

// ============================================================
// COMPATIBILITY MATRIX
// ============================================================

function renderCompatibilityMatrix() {
  let container = document.getElementById('matrixContainer');
  if (!container) return;

  let html = '<h3 style="font-family:var(--font-serif);margin-bottom:16px;">Compatibility Matrix</h3>';
  html += '<table class="matrix-table">';
  html += '<tr><th></th>';
  for (let i = 0; i < Steps.length; i++) {
    html += '<th>' + Steps[i].number + '</th>';
  }
  html += '</tr>';

  for (let i = 0; i < Steps.length; i++) {
    html += '<tr><th>' + Steps[i].number + '. ' + Steps[i].title + '</th>';
    for (let j = 0; j < Steps.length; j++) {
      if (i === j) {
        html += '<td class="matrix-cell-ok">&#8801;</td>';
      } else {
        let shared = Steps[i].openSets.filter(function(s) { return Steps[j].openSets.indexOf(s) >= 0; });
        if (shared.length > 0) {
          html += '<td class="matrix-cell-ok">&#10003;</td>';
        } else {
          html += '<td class="matrix-cell-partial">&#8729;</td>';
        }
      }
    }
    html += '</tr>';
  }
  html += '</table>';
  html += '<p style="margin-top:12px;font-size:0.75rem;color:var(--text-tertiary);">&#10003; = share open set (directly compatible) &middot; &#8729; = indirectly compatible (via bridge concepts) &middot; &#8801; = identical</p>';

  container.innerHTML = html;
}
