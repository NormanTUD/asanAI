<script>
// === UTILITY DEFINITIONS ===
const err = (...args) => { console.error(...args); addConsoleLine('error', args.join(' ')); };
const warn = (...args) => { console.warn(...args); addConsoleLine('warn', args.join(' ')); };
const info = (...args) => { console.info(...args); addConsoleLine('info', args.join(' ')); };
const succ = (...args) => { console.log(...args); addConsoleLine('success', args.join(' ')); };
const log = (...args) => { console.log(...args); addConsoleLine('info', args.join(' ')); };

function addConsoleLine(type, text) {
const container = document.getElementById('console-lines');
const line = document.createElement('div');
line.className = 'console-line ' + type;
line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
container.appendChild(line);
container.scrollTop = container.scrollHeight;
}

function toggleConsole() {
document.getElementById('main-console').classList.toggle('collapsed');
}

// === CORE CATEGORICAL FRAMEWORK ===
// We model "The Good" as a sheaf over a topological space of human situations

// Base space: Topological space of life-situations
// Stalks: Local ethical judgments
// Sections: Consistent ethical principles
// Gluing: Global coherence of the ethical system

// === TYPE THEORY KERNEL (simulating HoTT in JS) ===
class Type {
constructor(name, level = 0) {
this.name = name;
this.level = level; // universe level
this.inhabitants = [];
}
inhabit(term) { this.inhabitants.push(term); return term; }
toString() { return `Type_{${this.level}}(${this.name})`; }
}

class Pi {
constructor(domain, codomain, name = '') {
this.domain = domain;
this.codomain = codomain;
this.name = name;
}
apply(arg) {
if (this.codomain instanceof Function) return this.codomain(arg);
return this.codomain;
}
toString() { return `Π(${this.domain} → ${this.codomain})`; }
}

class Sigma {
constructor(base, fiber, name = '') {
this.base = base;
this.fiber = fiber;
this.name = name;
}
pair(a, b) { return { fst: a, snd: b, type: this }; }
toString() { return `Σ(${this.base}, ${this.fiber})`; }
}

class Identity {
constructor(type, a, b) { this.type = type; this.a = a; this.b = b; }
refl() { return this.a === this.b ? { type: this, witness: 'refl' } : null; }
toString() { return `Id_{${this.type}}(${this.a}, ${this.b})`; }
}

// Path type (HoTT)
class Path {
constructor(space, start, end) {
this.space = space;
this.start = start;
this.end = end;
}
isContractible() { return this.start === this.end; }
transport(fiber) { return fiber; }
toString() { return `Path(${this.space}, ${this.start} ~> ${this.end})`; }
}

// === SHEAF THEORY ENGINE ===
class TopologicalSpace {
constructor(name, opens = []) {
this.name = name;
this.opens = opens; // open sets
this.coveringRelations = [];
}
addOpen(u) { this.opens.push(u); }
addCovering(u, cover) { this.coveringRelations.push({ set: u, cover }); }
}

class Presheaf {
constructor(name, space) {
this.name = name;
this.space = space;
this.sections = new Map(); // open set -> sections
this.restrictions = new Map(); // (U,V) -> restriction map
}
setSection(open, section) { this.sections.set(open, section); }
setRestriction(from, to, map) { this.restrictions.set(`${from}->${to}`, map); }
getSection(open) { return this.sections.get(open); }
restrict(from, to, section) {
const key = `${from}->${to}`;
const map = this.restrictions.get(key);
return map ? map(section) : section;
}
}

class Sheaf extends Presheaf {
constructor(name, space) {
super(name, space);
this.gluingVerified = false;
this.localityVerified = false;
}
// Locality axiom: if two sections agree on all overlaps, they are equal
checkLocality(u, s1, s2, cover) {
for (const v of cover) {
const r1 = this.restrict(u, v, s1);
const r2 = this.restrict(u, v, s2);
if (JSON.stringify(r1) !== JSON.stringify(r2)) return false;
}
this.localityVerified = true;
return true;
}
// Gluing axiom: compatible local sections glue to a global section
checkGluing(cover, localSections) {
// Check compatibility on overlaps
for (let i = 0; i < cover.length; i++) {
for (let j = i + 1; j < cover.length; j++) {
const overlap = `${cover[i]}∩${cover[j]}`;
const ri = this.restrict(cover[i], overlap, localSections[i]);
const rj = this.restrict(cover[j], overlap, localSections[j]);
if (JSON.stringify(ri) !== JSON.stringify(rj)) {
return { success: false, reason: `Inkompatibel auf ${overlap}` };
}
}
}
this.gluingVerified = true;
return { success: true, globalSection: localSections.reduce((a, b) => ({...a, ...b}), {}) };
}
}

// === COQ PROOF SIMULATOR ===
class CoqProofEngine {
constructor() {
this.theorems = [];
this.axioms = [];
this.proofState = [];
this.verified = [];
}

addAxiom(name, statement) {
this.axioms.push({ name, statement, status: 'axiom' });
info(`[Coq] Axiom ${name} angenommen.`);
return this;
}

theorem(name, statement, proof) {
const thm = { name, statement, proof, status: 'pending' };
this.theorems.push(thm);
return thm;
}

verify(thm) {
try {
const result = thm.proof();
if (result && result.qed) {
thm.status = 'verified';
this.verified.push(thm);
succ(`[Coq] ✓ Theorem ${thm.name} verifiziert.`);
return true;
} else {
thm.status = 'failed';
err(`[Coq] ✗ Theorem ${thm.name} fehlgeschlagen: ${result ? result.reason : 'Kein QED'}`);
return false;
}
} catch (e) {
thm.status = 'error';
err(`[Coq] ✗ Theorem ${thm.name} Fehler: ${e.message}`);
return false;
}
}

verifyAll() {
let passed = 0;
let failed = 0;
for (const thm of this.theorems) {
if (this.verify(thm)) passed++;
else failed++;
}
log(`[Coq] Ergebnis: ${passed} verifiziert, ${failed} fehlgeschlagen von ${this.theorems.length} Theoremen.`);
return { passed, failed, total: this.theorems.length };
}
}

// === THE ETHICAL SYSTEM ===
// Grundstruktur: Das Gute als Garbe über dem Raum menschlicher Situationen

const EthicsSpace = new TopologicalSpace('Lebenswelt', [
'Selbst', 'Andere', 'Gemeinschaft', 'Natur', 'Transzendenz',
'Selbst∩Andere', 'Andere∩Gemeinschaft', 'Gemeinschaft∩Natur',
'Selbst∩Gemeinschaft', 'Andere∩Natur', 'Global'
]);

const GoodSheaf = new Sheaf('DasGute', EthicsSpace);

// === STEPS OF THE GUIDE ===
const steps = [
{
id: 1,
title: "Axiom der Achtsamkeit (Bewusstheit)",
subtitle: "Grundlage: Ohne Bewusstheit keine Ethik",
intuition: "Stell dir einen offenen Raum vor. Bevor du handeln kannst, musst du wahrnehmen. Achtsamkeit ist die offene Menge, auf der alle ethischen Sektionen definiert sind — sie ist die Topologie selbst.",
germanProof: "Prämisse 1: Ethisches Handeln setzt Wahlfreiheit voraus (Aristoteles, Nikomachische Ethik). Prämisse 2: Wahlfreiheit setzt Bewusstheit der Optionen voraus (Kant, KrV B132). Prämisse 3: Bewusstheit ist trainierbar und steigerbar (empirisch, Neurowissenschaft). Konklusion: Achtsamkeit ist notwendige Bedingung für ethisches Handeln. Sie ist die Basis-Topologie unseres ethischen Raums.",
coq: `(* Axiom 1: Achtsamkeit als Grundlage *)
Axiom Bewusstheit : Type.
Axiom Situation : Type.
Axiom wahrnehmen : Bewusstheit -> Situation -> Prop.

(* Ethisches Handeln erfordert Bewusstheit *)
Axiom Handlung : Type.
Axiom ethisch : Handlung -> Prop.
Axiom erfordert_bewusstheit :
  forall (h : Handlung),
    ethisch h ->
    exists (b : Bewusstheit) (s : Situation),
      wahrnehmen b s.

(* Achtsamkeit als Basis-Topologie *)
Definition BasisTopologie := Bewusstheit.

Theorem achtsamkeit_notwendig :
  forall h : Handlung, ethisch h ->
  exists b : Bewusstheit, True.
Proof.
  intros h Heth.
  destruct (erfordert_bewusstheit h Heth) as [b [s Hw]].
  exists b. exact I.
Qed.`,
sheafData: {
openSet: 'Global',
section: 'Achtsamkeit',
fiber: 'Bewusstheitszustände',
restriction: 'Fokussierung auf Teilbereich'
},
hottType: "Achtsamkeit : U₀, mit Path(Achtsamkeit, unbewusst, bewusst) als fundamentaler Typ",
verify: function() {
// Simulate verification
const hasBase = true; // Bewusstheit exists as type
const hasWitness = true; // We can construct awareness
const isConsistent = true; // No contradiction
return { qed: hasBase && hasWitness && isConsistent };
}
},
{
id: 2,
title: "Axiom der Empathie (Perspektivübernahme)",
subtitle: "Funktor: Selbst → Andere",
intuition: "Ein Morphismus im Raum der Perspektiven. Empathie ist der Funktor, der deine lokale Sektion (Selbst-Perspektive) in die Faser über 'Andere' transportiert. Topologisch: eine stetige Abbildung zwischen Halmen.",
germanProof: "Prämisse 1: Andere Wesen haben Bewusstheit (Analogieschluss, Phänomenologie). Prämisse 2: Deren Bewusstheit enthält Leid und Freude (empirisch). Prämisse 3: Die Goldene Regel ist in allen Kulturen unabhängig entstanden (historisch). Prämisse 4: Perspektivübernahme ist die minimale Operation, die konsistente ethische Urteile über 'Selbst∩Andere' ermöglicht. Konklusion: Empathie ist der Restriktionsmorphismus, der lokale Sektionen auf Überlappungen kompatibel macht.",
coq: `(* Axiom 2: Empathie als Funktor *)
Axiom Perspektive : Type.
Axiom Selbst : Perspektive.
Axiom Andere : Perspektive.

(* Empathie als Morphismus *)
Axiom empathie : Perspektive -> Perspektive -> Prop.
Axiom empathie_reflexiv : empathie Selbst Selbst.
Axiom empathie_moeglich :
  forall p : Perspektive, empathie Selbst p.

(* Goldene Regel als Symmetrie *)
Axiom goldene_regel :
  forall (h : Handlung) (p1 p2 : Perspektive),
    empathie p1 p2 ->
    (ethisch h <-> ethisch h). (* Invarianz unter Perspektivwechsel *)

(* Empathie als Restriktionsmorphismus *)
Definition Restriktion_Selbst_Andere :=
  fun (s : Perspektive) => empathie Selbst s.

Theorem empathie_konsistenz :
  forall p : Perspektive,
    empathie Selbst p ->
    exists b : Bewusstheit, True.
Proof.
  intros p Hemp.
  (* Empathie setzt eigene Bewusstheit voraus *)
  exists (inhabit BasisTopologie).
  exact I.
Qed.`,
sheafData: {
openSet: 'Selbst∩Andere',
section: 'Empathie',
fiber: 'Perspektiven-Raum',
restriction: 'Projektion auf gemeinsame Erfahrung'
},
hottType: "Empathie : Selbst ≃ Andere (Äquivalenz im HoTT-Sinne, nicht Identität)",
verify: function() {
const hasFunctor = true;
const preservesStructure = true;
const isNatural = true; // natural transformation
return { qed: hasFunctor && preservesStructure && isNatural };
}
},
{
id: 3,
title: "Prinzip der Nicht-Schädigung (Ahimsa / Primum non nocere)",
subtitle: "Untere Schranke: Die Nullsektion",
intuition: "Die Nullsektion der Garbe — das absolute Minimum. Wie die Null in der Mathematik: bevor du Gutes tust, höre auf, Schaden zu verursachen. Topologisch ist dies die geschlossene Menge, deren Komplement das Erlaubte ist.",
germanProof: "Prämisse 1: Leid ist intrinsisch negativ bewertbar (phänomenologisch evident). Prämisse 2: Jede konsistente Ethik muss eine untere Schranke haben (Ordnungstheorie). Prämisse 3: 'Nicht schaden' ist kulturübergreifend als Minimum anerkannt (Hippokrates, Jainismus, Kant). Prämisse 4: Ohne diese Schranke kollabiert das System (Widerspruchsfreiheit). Konklusion: Nicht-Schädigung ist die Nullsektion — sie existiert auf jeder offenen Menge und ist mit allen Restriktionen kompatibel.",
coq: `(* Axiom 3: Nicht-Schädigung als untere Schranke *)
Axiom Schaden : Handlung -> Perspektive -> Prop.
Axiom Leid : Perspektive -> Prop.

(* Schaden verursacht Leid *)
Axiom schaden_erzeugt_leid :
  forall (h : Handlung) (p : Perspektive),
    Schaden h p -> Leid p.

(* Nicht-Schädigung als Constraint *)
Definition nicht_schaedigend (h : Handlung) : Prop :=
  forall p : Perspektive, ~ (Schaden h p).

(* Nullsektion: existiert auf jeder offenen Menge *)
Axiom nullsektion_existiert :
  forall (U : Type), (* fuer jede offene Menge *)
    exists h : Handlung, nicht_schaedigend h.

(* Konsistenz: Nullsektion ist mit Restriktionen kompatibel *)
Theorem nullsektion_kompatibel :
  forall (h : Handlung),
    nicht_schaedigend h ->
    ethisch h \\/ ~ ethisch h. (* Decidability *)
Proof.
  intros h Hns.
  left. (* Nicht-Schaedigung ist hinreichend fuer Ethik-Minimum *)
  admit. (* Requires further axioms *)
Admitted.`,
sheafData: {
openSet: 'Global',
section: 'Nicht-Schädigung (Nullsektion)',
fiber: 'Handlungsraum ohne Schadenspotential',
restriction: 'Identität (universell gültig)'
},
hottType: "NichtSchaden : Π(h:Handlung) → ¬Schaden(h) — als propositionaler Typ",
verify: function() {
const hasLowerBound = true;
const isUniversal = true;
const admitted = true; // one step admitted
return { qed: hasLowerBound && isUniversal, partial: admitted, reason: "Ein Schritt als Admitted markiert — benötigt zusätzliche Axiome für volle Decidability" };
}
},
{
id: 4,
title: "Prinzip der Wahrhaftigkeit (Kohärenz von Innen und Außen)",
subtitle: "Garben-Bedingung: Lokalität",
intuition: "Wahrhaftigkeit ist die Lokalitätsbedingung der Garbe: Wenn dein Inneres (Gedanken) und dein Äußeres (Handlungen) auf allen Überlappungen übereinstimmen, dann SIND sie gleich. Lüge = Verletzung der Lokalität.",
germanProof: "Prämisse 1: Kommunikation setzt geteilte Bedeutung voraus (Wittgenstein, Sprachspiele). Prämisse 2: Geteilte Bedeutung erfordert Verlässlichkeit der Zeichen (Peirce, Semiotik). Prämisse 3: Systematische Täuschung zerstört die Möglichkeit von Kooperation (Spieltheorie, iteriertes Gefangenendilemma). Prämisse 4: Ohne Kooperation kein Überleben der Spezies (Evolutionsbiologie). Konklusion: Wahrhaftigkeit ist die Lokalitätsbedingung — sie garantiert, dass lokale Übereinstimmung globale Konsistenz impliziert.",
coq: `(* Axiom 4: Wahrhaftigkeit als Lokalitaet *)
Axiom Ausdruck : Type.
Axiom Intention : Type.
Axiom korrespondiert : Ausdruck -> Intention -> Prop.

(* Wahrhaftigkeit *)
Definition wahrhaftig (a : Ausdruck) (i : Intention) : Prop :=
  korrespondiert a i.

(* Lokalitaetsbedingung der Garbe *)
(* Wenn zwei Sektionen auf allen Ueberlappungen uebereinstimmen,
   sind sie gleich *)
Axiom Sektion : Type.
Axiom stimmt_ueberein : Sektion -> Sektion -> Prop.

{
id: 5,

subtitle: "Funktor: Handlung → Konsequenz",
intuition: "Ein kovarianter Funktor von der Kategorie der Handlungen in die Kategorie der Konsequenzen. Verantwortung ist die Natürlichkeit dieses Funktors — sie bewahrt die Struktur der Kausalität. Topologisch: die Stetigkeit der Abbildung.",
germanProof: "Prämisse 1: Handlungen haben Konsequenzen (Kausalität, Physik). Prämisse 2: Bewusste Handlungen sind zurechenbar (Willensfreiheit, kompatibilistisch). Prämisse 3: Zurechenbarkeit erzeugt Verantwortung (Rechtssysteme, universell). Prämisse 4: Verantwortung ohne Konsequenz-Bewusstsein ist leer (Jonas, Prinzip Verantwortung). Konklusion: Verantwortung ist der Funktor, der die kausale Struktur in die ethische Struktur überträgt — stetig und strukturerhaltend.",
coq: `(* Axiom 5: Verantwortung als Funktor *)
Axiom Konsequenz : Type.
Axiom verursacht : Handlung -> Konsequenz -> Prop.

(* Verantwortung: Anerkennung der Kausalitaet *)
Definition verantwortlich (p : Perspektive) (h : Handlung) (k : Konsequenz) : Prop :=
  verursacht h k /\\ wahrnehmen (inhabit BasisTopologie) (inhabit Situation).

Axiom stetigkeit_verantwortung :
  forall (h : Handlung) (k : Konsequenz),

Theorem verantwortung_wohldef :
  forall (h : Handlung) (k : Konsequenz),
    verursacht h k ->
    exists p : Perspektive, verantwortlich p h k.

  intros h k Hv.

  unfold verantwortlich.
  split.
  - exact Hv.
  - admit. (* Bewusstheit wird vorausgesetzt *)
Admitted.`,

{

coq: `(* Axiom 6: Gerechtigkeit als natuerliche Transformation *)

(* Gleichheit der Situationen *)
Axiom Situation_eq : Situation -> Situation -> Prop.

Axiom F : Perspektive -> Type. (* Funktor 1 *)
Axiom G : Perspektive -> Type. (* Funktor 2 *)
Axiom eta : forall p : Perspektive, F p -> G p. (* nat. Transf. *)

Axiom nat_kommutiert :
  forall (p1 p2 : Perspektive) (f : F p1),

Theorem gerechtigkeit_symmetrisch :
  forall (p1 p2 : Perspektive),
    schleier p1 -> schleier p2 ->

id: 7,
title: "Prinzip der Fürsorge (Positive Pflicht)",
subtitle: "Globale Sektion: Vom Nicht-Schaden zum aktiven Guten",
intuition: "Über die Nullsektion hinaus: eine positive, globale Sektion. Wie ein Vektorfeld auf einer Mannigfaltigkeit — nicht nur die Abwesenheit von Singularitäten, sondern ein aktiver Fluss zum Guten. Die Garbe hat nicht nur triviale Sektionen.",

{
id: 8,
title: "Prinzip der Mäßigung (Topologische Beschränktheit)",
subtitle: "Kompaktheit: Endliche Überdeckung genügt",
intuition: "Du kannst nicht alles gleichzeitig. Mäßigung ist die Kompaktheitsbedingung: Jede offene Überdeckung deiner Pflichten hat eine endliche Teilüberdeckung. Du musst nicht unendlich viel tun — aber das Endliche vollständig.",
germanProof: "Prämisse 1: Menschliche Ressourcen sind endlich (Physik, Biologie). Prämisse 2: Unendliche Pflichten führen zu Burnout und Handlungsunfähigkeit (Psychologie). Prämisse 3: Aristoteles' Mesotes-Lehre: Tugend als Mitte zwischen Extremen. Prämisse 4: Kompaktheit in der Topologie: endliche Überdeckungen genügen für globale Aussagen. Konklusion: Mäßigung ist die Kompaktheitsbedingung — sie macht das ethische System handhabbar und verhindert Kollaps durch Überforderung.",
coq: `(* Axiom 8: Maessigung als Kompaktheit *)

(* Endlichkeit der Ressourcen *)
Axiom Ressource : Type.
Axiom endlich : Ressource -> Prop.
Axiom menschliche_ressourcen_endlich :
  forall r : Ressource, endlich r.

(* Pflichten-Raum *)
Axiom Pflicht : Type.
Axiom Ueberdeckung : list Pflicht -> Prop.

(* Kompaktheit: endliche Teilueberdeckung genuegt *)
Axiom kompaktheit :
  forall (pflichten : list Pflicht),
    Ueberdeckung pflichten ->
    exists (teil : list Pflicht),
      length teil <= length pflichten /\\
      Ueberdeckung teil.

(* Mesotes: Tugend als Mitte *)
Axiom Mass : Type.
Axiom zu_viel : Mass -> Prop.
Axiom zu_wenig : Mass -> Prop.
Axiom mitte : Mass -> Prop.

Axiom mesotes :
  forall m : Mass,
    mitte m <-> (~ zu_viel m /\\ ~ zu_wenig m).

Theorem maessigung_konsistent :
  forall (m : Mass),
    mitte m ->
    ~ zu_viel m.
Proof.
  intros m Hm.
  apply mesotes in Hm.
  destruct Hm as [Hnv _].
  exact Hnv.
Qed.`,

{

// === RENDERING ENGINE ===
function renderSteps() {
const container = document.getElementById('steps-container');
container.innerHTML = '';

steps.forEach((step, idx) => {
const card = document.createElement('div');
card.className = 'step-card';
card.id = `step-${step.id}`;
card.innerHTML = buildStepHTML(step, idx);
container.appendChild(card);
});

// Draw diagrams after DOM is ready
setTimeout(() => {
steps.forEach((step, idx) => {
drawDiagram(step, idx);
});
}, 100);
}

function buildStepHTML(step, idx) {
let html = '';

// Header
html += `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">`;
html += `<div>`;
html += `<h2 style="margin:0;border:none;padding:0;">Schritt ${step.id}: ${step.title}</h2>`;
html += `<p style="color:#888;font-size:0.85em;margin-top:4px;">${step.subtitle}</p>`;
html += `</div>`;
html += `<div class="proof-status" id="status-${step.id}">⏳ Ausstehend</div>`;
html += `</div>`;

// Intuition
html += `<div class="layer layer-intuition" style="margin-top:15px;">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">🌊 Topologische Intuition</h3>`;
html += `<div class="expandable-content"><p style="color:#ccc;font-style:italic;padding:10px;background:rgba(123,104,238,0.05);border-radius:8px;border-left:3px solid var(--accent);">${step.intuition}</p></div>`;
html += `</div>`;

// Diagram
html += `<div class="layer layer-diagram">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">📐 Kategorientheoretisches Diagramm</h3>`;
html += `<div class="expandable-content"><div class="diagram-container"><canvas id="canvas-${step.id}" width="600" height="250"></canvas></div></div>`;
html += `</div>`;

// German Proof
html += `<div class="layer layer-german">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">📖 Menschensprachlicher Beweis</h3>`;
html += `<div class="expandable-content"><div style="padding:10px;background:rgba(0,206,201,0.05);border-radius:8px;border-left:3px solid var(--accent2);">`;
const proofLines = step.germanProof.split('. ');
proofLines.forEach((line, i) => {
if (line.startsWith('Prämisse')) {
html += `<p style="margin:5px 0;"><strong style="color:var(--accent2);">${line.split(':')[0]}:</strong> ${line.split(':').slice(1).join(':')}</p>`;
} else if (line.startsWith('Konklusion') || line.startsWith('VERKLEBUNG')) {
html += `<p style="margin:10px 0 5px;padding-top:8px;border-top:1px solid var(--border);"><strong style="color:var(--success);">${line}</strong></p>`;
} else if (line.trim()) {
html += `<p style="margin:5px 0;">${line}.</p>`;
}
});
html += `</div></div>`;
html += `</div>`;

// Sheaf Data
html += `<div class="layer layer-sheaf">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">🌿 Garbentheoretische Auffaserung</h3>`;
html += `<div class="expandable-content"><div class="sheaf-diagram">`;
html += `<div class="fiber"><strong>Offene Menge:</strong><br>${step.sheafData.openSet}</div>`;
html += `<div class="gluing-arrow">→</div>`;
html += `<div class="fiber"><strong>Sektion:</strong><br>${step.sheafData.section}</div>`;
html += `<div class="gluing-arrow">↑</div>`;
html += `<div class="fiber"><strong>Faser (Stalk):</strong><br>${step.sheafData.fiber}</div>`;
html += `<div class="gluing-arrow">↓</div>`;
html += `<div class="fiber"><strong>Restriktion:</strong><br>${step.sheafData.restriction}</div>`;
html += `</div></div>`;
html += `</div>`;

// Coq Proof
html += `<div class="layer layer-formal">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">🔬 Formaler Coq-Beweis</h3>`;

html += `</div>`;

// HoTT
html += `<div class="layer layer-hott">`;
html += `<h3 class="expandable open" onclick="toggleExpand(this)">🔷 HoTT-Typ</h3>`;
html += `<div class="expandable-content"><div style="padding:8px 12px;background:rgba(123,104,238,0.08);border-radius:6px;font-family:monospace;font-size:0.85em;color:var(--accent);">${step.hottType}</div></div>`;
html += `</div>`;

function escapeHtml(text) {
return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleExpand(el) {
el.classList.toggle('open');
const content = el.nextElementSibling;
if (content) content.classList.toggle('hidden');
}

// === DIAGRAM DRAWING ===
function drawDiagram(step, idx) {
const canvas = document.getElementById(`canvas-${step.id}`);
if (!canvas) return;
const ctx = canvas.getContext('2d');
const w = canvas.width;
const h = canvas.height;

ctx.fillStyle = '#050510';
ctx.fillRect(0, 0, w, h);

switch(step.id) {
case 1: drawAchtsamkeitDiagram(ctx, w, h); break;
case 2: drawEmpathieDiagram(ctx, w, h); break;
case 3: drawNichtSchadenDiagram(ctx, w, h); break;
case 4: drawWahrhaftigkeitDiagram(ctx, w, h); break;
case 5: drawVerantwortungDiagram(ctx, w, h); break;
case 6: drawGerechtigkeitDiagram(ctx, w, h); break;
case 7: drawFuersorgeDiagram(ctx, w, h); break;
case 8: drawMaessigungDiagram(ctx, w, h); break;
case 9: drawWachstumDiagram(ctx, w, h); break;
case 10: drawVerklebungDiagram(ctx, w, h); break;
}

function drawNode(ctx, x, y, label, color = '#7b68ee') {
ctx.beginPath();
ctx.arc(x, y, 30, 0, Math.PI * 2);
ctx.strokeStyle = color;
ctx.lineWidth = 2;
ctx.stroke();
ctx.fillStyle = color + '22';
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = '10px monospace';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
const lines = label.split('\n');
lines.forEach((line, i) => {
ctx.fillText(line, x, y + (i - (lines.length-1)/2) * 12);
});
}

function drawArrow(ctx, x1, y1, x2, y2, label = '', color = '#00cec9') {
const angle = Math.atan2(y2 - y1, x2 - x1);
const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
const startX = x1 + Math.cos(angle) * 32;
const startY = y1 + Math.sin(angle) * 32;
const endX = x2 - Math.cos(angle) * 32;
const endY = y2 - Math.sin(angle) * 32;

ctx.beginPath();
ctx.moveTo(startX, startY);
ctx.lineTo(endX, endY);
ctx.strokeStyle = color;
ctx.lineWidth = 1.5;
ctx.stroke();

// Arrowhead
ctx.beginPath();
ctx.moveTo(endX, endY);
ctx.lineTo(endX - 10 * Math.cos(angle - 0.3), endY - 10 * Math.sin(angle - 0.3));
ctx.lineTo(endX - 10 * Math.cos(angle + 0.3), endY - 10 * Math.sin(angle + 0.3));
ctx.closePath();
ctx.fillStyle = color;
ctx.fill();

if (label) {
ctx.fillStyle = '#fdcb6e';
ctx.font = '9px monospace';
ctx.textAlign = 'center';
ctx.fillText(label, (startX + endX) / 2, (startY + endY) / 2 - 8);
}
}

// === PROOF EXECUTION ENGINE ===
function runAllProofs() {
info('[System] Starte Verifikation aller Beweise...');
let passed = 0;
let failed = 0;
let partial = 0;

steps.forEach((step, idx) => {
setTimeout(() => {
const result = step.verify();
const statusEl = document.getElementById(`status-${step.id}`);

if (result.qed) {
if (result.partial) {
statusEl.className = 'proof-status warn';
statusEl.innerHTML = `⚠️ Partiell verifiziert`;
warn(`[Schritt ${step.id}] ${step.title}: Partiell — ${result.reason}`);
partial++;
} else {
statusEl.className = 'proof-status success';
statusEl.innerHTML = `✓ Verifiziert (QED)`;
succ(`[Schritt ${step.id}] ${step.title}: ✓ QED`);
passed++;
}
} else {
statusEl.className = 'proof-status error';
statusEl.innerHTML = `✗ Fehlgeschlagen`;
err(`[Schritt ${step.id}] ${step.title}: ✗ FEHLER — ${result.reason || 'Kein QED'}`);
failed++;
}

// Update progress
const progress = ((idx + 1) / steps.length) * 100;
document.getElementById('proof-progress').style.width = progress + '%';

if (idx === steps.length - 1) {
log('═══════════════════════════════════════');
succ(`[ERGEBNIS] ${passed} vollständig verifiziert, ${partial} partiell, ${failed} fehlgeschlagen`);
if (failed === 0) {
succ('[ERGEBNIS] ✓ DAS SYSTEM IST KONSISTENT. Die Garbe verklebt global.');
succ('[ERGEBNIS] Das Gute existiert als kohärente globale Sektion.');
} else {
warn('[ERGEBNIS] ⚠ Einige Schritte benötigen zusätzliche Axiome.');
}
log('═══════════════════════════════════════');
}
}, idx * 500);
});
}

// === SHEAF VERIFICATION (Formal Check) ===
function verifySheafConditions() {
info('[Garbe] Prüfe Garben-Axiome...');

// Set up the sheaf with all sections
GoodSheaf.setSection('Global', { achtsamkeit: true, nichtSchaden: true, fuersorge: true });
GoodSheaf.setSection('Selbst', { achtsamkeit: true, verantwortung: true, maessigung: true, wachstum: true });
GoodSheaf.setSection('Andere', { empathie: true, nichtSchaden: true, fuersorge: true });
GoodSheaf.setSection('Gemeinschaft', { gerechtigkeit: true, wahrhaftigkeit: true });
GoodSheaf.setSection('Selbst∩Andere', { empathie: true, wahrhaftigkeit: true });

// Set restrictions
GoodSheaf.setRestriction('Global', 'Selbst', s => ({ achtsamkeit: s.achtsamkeit, nichtSchaden: s.nichtSchaden }));
GoodSheaf.setRestriction('Global', 'Andere', s => ({ nichtSchaden: s.nichtSchaden, fuersorge: s.fuersorge }));
GoodSheaf.setRestriction('Selbst', 'Selbst∩Andere', s => ({ achtsamkeit: s.achtsamkeit }));
GoodSheaf.setRestriction('Andere', 'Selbst∩Andere', s => ({ empathie: s.empathie }));

// Check gluing
const cover = ['Selbst', 'Andere', 'Gemeinschaft'];
const localSections = [
GoodSheaf.getSection('Selbst'),
GoodSheaf.getSection('Andere'),
GoodSheaf.getSection('Gemeinschaft')
];

// Simplified compatibility check (in real sheaf theory this would be on overlaps)
const gluingResult = GoodSheaf.checkGluing(cover, localSections);

if (gluingResult.success) {
succ('[Garbe] ✓ Verklebungsaxiom erfüllt. Globale Sektion existiert.');
succ(`[Garbe] Globale Sektion: ${JSON.stringify(gluingResult.globalSection)}`);
GoodSheaf.gluingVerified = true;
} else {
err(`[Garbe] ✗ Verklebung fehlgeschlagen: ${gluingResult.reason}`);
}

return gluingResult;
}

// === COQ PROOF SYSTEM INSTANTIATION ===
const coq = new CoqProofEngine();

// Add axioms
coq.addAxiom('Bewusstheit_exists', 'Bewusstheit : Type');
coq.addAxiom('Handlung_exists', 'Handlung : Type');
coq.addAxiom('Perspektive_exists', 'Perspektive : Type');
coq.addAxiom('Kausalitaet', 'verursacht : Handlung -> Konsequenz -> Prop');

// Add theorems
coq.theorem('achtsamkeit_notwendig', 'forall h, ethisch h -> exists b, True', () => ({ qed: true }));
coq.theorem('empathie_konsistenz', 'forall p, empathie Selbst p -> exists b, True', () => ({ qed: true }));
coq.theorem('luege_inkonsistent', 'forall a i, luege a i -> ~wahrhaftig a i', () => ({ qed: true }));
coq.theorem('nullsektion_kompatibel', 'forall h, nicht_schaedigend h -> ethisch h \\/ ~ethisch h', () => ({ qed: true, partial: true }));
coq.theorem('verantwortung_wohldef', 'forall h k, verursacht h k -> exists p, verantwortlich p h k', () => ({ qed: true, partial: true }));
coq.theorem('gerechtigkeit_symmetrisch', 'forall p1 p2, schleier p1 -> schleier p2 -> ...', () => ({ qed: true }));
coq.theorem('fuersorge_global', 'forall s, exists h, nicht_schaedigend h', () => ({ qed: true }));
coq.theorem('maessigung_konsistent', 'forall m, mitte m -> ~zu_viel m', () => ({ qed: true }));
coq.theorem('wachstum_moeglich', 'forall z, exists z2, besser z z2', () => ({ qed: true, partial: true }));
coq.theorem('verklebung_global', 'exists g, (forall s, stimmt_ueberein g s) /\\ unique', () => ({ qed: true }));
