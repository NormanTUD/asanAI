<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Wie lernt eine KI?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #00d4ff; margin-bottom: 5px; font-size: 1.6em; }
        .subtitle { color: #aaa; margin-bottom: 20px; font-size: 0.9em; }
        
        canvas {
            border-radius: 16px;
            background: #16213e;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        .message {
            background: #0f3460;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 16px;
            font-size: 1.1em;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        button {
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            cursor: pointer;
            font-weight: bold;
            background: #00d4ff;
            color: #1a1a2e;
            transition: all 0.2s;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,212,255,0.3);
        }
        #btnReset {
            background: #555;
            color: #fff;
            font-size: 0.9em;
            padding: 10px 20px;
        }
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .epoch { color: #51cf66; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🧠 Wie lernt eine KI?</h1>
    <p class="subtitle">Klicke "Nächster Schritt" und schau zu!</p>
    
    <canvas id="canvas" width="600" height="400"></canvas>
    
    <div class="message" id="message">
        👋 Die KI soll lernen, die richtige Zahl zu erraten. Klicke auf den Knopf!
    </div>
    
    <div class="buttons">
        <button id="btnNext">▶️ Nächster Schritt</button>
        <button id="btnReset">🔄 Neu starten</button>
    </div>
    <p class="epoch" id="epoch"></p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgEl = document.getElementById('message');
        const epochEl = document.getElementById('epoch');
        
        // Super simple: one neuron, one weight, one bias
        const TARGET = 0.8;
        let weight = 0.3;  // starts wrong on purpose
        let input = 1.0;
        let output = 0;
        let gradient = 0;
        let loss = 0;
        let step = 0; // 0=predict, 1=show error, 2=show gradient, 3=update
        let round = 0;
        const LR = 0.3;
        
        // History for mini chart
        let lossHistory = [];
        
        function predict() {
            output = weight * input; // simple linear neuron
            loss = TARGET - output;  // signed error
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerY = 200;
            
            // --- Draw Target Zone ---
            const targetX = 400;
            const barTop = 60;
            const barBottom = 340;
            const barHeight = barBottom - barTop;
            
            // Vertical scale bar
            ctx.fillStyle = '#222';
            ctx.fillRect(targetX - 30, barTop, 60, barHeight);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.strokeRect(targetX - 30, barTop, 60, barHeight);
            
            // Scale labels
            ctx.fillStyle = '#888';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('1.0', targetX, barTop - 5);
            ctx.fillText('0.0', targetX, barBottom + 15);
            ctx.fillText('0.5', targetX + 35, barTop + barHeight/2 + 4);
            
            // Target line (where it SHOULD be)
            const targetY = barBottom - (TARGET * barHeight);
            ctx.beginPath();
            ctx.moveTo(targetX - 40, targetY);
            ctx.lineTo(targetX + 40, targetY);
            ctx.strokeStyle = '#ffd43b';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Target label
            ctx.fillStyle = '#ffd43b';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`🎯 Ziel: ${TARGET}`, targetX + 50, targetY + 5);
            
            // Output dot (where the KI guessed)
            if (step >= 0 && round > 0 || step >= 1) {
                // Only show output after first prediction
            }
            if (step >= 1 || round > 0) {
                const outputY = barBottom - (output * barHeight);
                
                // Draw the output ball
                ctx.beginPath();
                ctx.arc(targetX, outputY, 18, 0, Math.PI * 2);
                const ballColor = Math.abs(loss) < 0.02 ? '#51cf66' : '#ff6b6b';
                ctx.fillStyle = ballColor;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Output value
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(output.toFixed(2), targetX, outputY + 5);
                
                // Label
                ctx.fillStyle = ballColor;
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`KI sagt: ${output.toFixed(2)}`, targetX - 50, outputY + 5);
                
                // --- Show Error Arrow (step 2+) ---
                if (step >= 2) {
                    // Arrow from output to target
                    ctx.beginPath();
                    ctx.moveTo(targetX + 45, outputY);
                    ctx.lineTo(targetX + 45, targetY);
                    ctx.strokeStyle = '#ff6b6b';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // Arrowhead
                    const arrowDir = targetY < outputY ? -1 : 1;
                    ctx.beginPath();
                    ctx.moveTo(targetX + 45, targetY);
                    ctx.lineTo(targetX + 40, targetY - arrowDir * 10);
                    ctx.lineTo(targetX + 50, targetY - arrowDir * 10);
                    ctx.closePath();
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fill();
                    
                    // Error label
                    const midErrorY = (outputY + targetY) / 2;
                    ctx.fillStyle = '#ff6b6b';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'left';
                    const errorText = loss > 0 ? `↑ Zu niedrig! (+${loss.toFixed(2)})` : `↓ Zu hoch! (${loss.toFixed(2)})`;
                    ctx.fillText(errorText, targetX + 55, midErrorY + 5);
                }
                
                // --- Show Gradient (step 3) ---
                if (step >= 3) {
                    // Gradient visualization on the left
                    ctx.fillStyle = '#0f3460';
                    ctx.fillRect(30, 280, 250, 100);
                    ctx.strokeStyle = gradient > 0 ? '#51cf66' : '#ff6b6b';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(30, 280, 250, 100);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText('📐 Gradient (Wegweiser):', 40, 305);
                    
                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#ccc';
                    if (gradient > 0) {
                        ctx.fillText('→ Gewicht muss GRÖSSER werden!', 40, 330);
                        ctx.fillStyle = '#51cf66';
                        ctx.font = 'bold 20px sans-serif';
                        ctx.fillText('⬆️ Gewicht rauf!', 40, 365);
                    } else if (gradient < 0) {
                        ctx.fillText('→ Gewicht muss KLEINER werden!', 40, 330);
                        ctx.fillStyle = '#ff6b6b';
                        ctx.font = 'bold 20px sans-serif';
                        ctx.fillText('⬇️ Gewicht runter!', 40, 365);
                    } else {
                        ctx.fillText('→ Passt perfekt! Nichts ändern.', 40, 330);
                        ctx.fillStyle = '#ffd43b';
                        ctx.font = 'bold 20px sans-serif';
                        ctx.fillText('✅ Perfekt!', 40, 365);
                    }
                }
            }
            
            // --- Draw the "brain" (weight) on the left ---
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(30, 40, 250, 110);
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(30, 40, 250, 110);
            
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('🧠 Gehirn der KI', 45, 68);
            
            ctx.fillStyle = '#fff';
            ctx.font = '13px sans-serif';
            ctx.fillText(`Stellschraube (Gewicht): `, 45, 95);
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 18px monospace';
            ctx.fillText(weight.toFixed(3), 45, 125);
            
            // Show weight change on step 4
            if (step >= 4) {
                ctx.fillStyle = '#51cf66';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText('✓ Angepasst!', 160, 125);
            }
            
            // --- Mini loss history chart ---
            if (lossHistory.length > 1) {
                const chartX = 30;
                const chartY = 170;
                const chartW = 250;
                const chartH = 90;
                
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(chartX, chartY, chartW, chartH);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(chartX, chartY, chartW, chartH);
                
                ctx.fillStyle = '#888';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('📉 Fehler über Zeit:', chartX + 5, chartY + 14);
                
                // Draw line
                ctx.beginPath();
                const maxLoss = Math.max(...lossHistory.map(l => Math.abs(l)), 0.5);
                for (let i = 0; i < lossHistory.length; i++) {
                    const x = chartX + 10 + (i / Math.max(lossHistory.length - 1, 1)) * (chartW - 20);
                    const y = chartY + chartH - 10 - (Math.abs(lossHistory[i]) / maxLoss) * (chartH - 25);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Current dot
                if (lossHistory.length > 0) {
                    const lastI = lossHistory.length - 1;
                    const x = chartX + 10 + (lastI / Math.max(lossHistory.length - 1, 1)) * (chartW - 20);
                    const y = chartY + chartH - 10 - (Math.abs(lossHistory[lastI]) / maxLoss) * (chartH - 25);
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fill();
                }
            }
        }
        
        function nextStep() {
            step++;
            
            if (step === 1) {
                // Predict
                predict();
                lossHistory.push(loss);
                round++;
                msgEl.innerHTML = `🤔 Die KI dreht an ihrer Stellschraube (Gewicht = ${weight.toFixed(3)}) und rät: <b>${output.toFixed(2)}</b>`;
                draw();
            } else if (step === 2) {
                // Show error
                if (Math.abs(loss) < 0.02) {
                    msgEl.innerHTML = `🎉 <b>Fast perfekt!</b> Die KI liegt nur ${Math.abs(loss).toFixed(3)} daneben. Sie hat es gelernt!`;
                } else if (loss > 0) {
                    msgEl.innerHTML = `📏 <b>Zu niedrig!</b> Die KI sagt ${output.toFixed(2)}, aber es soll ${TARGET} sein. Sie muss <b>höher</b> raten!`;
                } else {
                    msgEl.innerHTML = `📏 <b>Zu hoch!</b> Die KI sagt ${output.toFixed(2)}, aber es soll ${TARGET} sein. Sie muss <b>niedriger</b> raten!`;
                }
                draw();
            } else if (step === 3) {
                // Show gradient
                gradient = loss; // In this simple case, gradient direction = error direction
                if (Math.abs(loss) < 0.02) {
                    msgEl.innerHTML = `📐 <b>Gradient sagt:</b> "Alles gut, kaum was ändern!" Der Fehler ist winzig.`;
                } else if (gradient > 0) {
                    msgEl.innerHTML = `📐 <b>Gradient sagt:</b> "Dreh die Stellschraube HOCH! ⬆️" Dann wird das Ergebnis beim nächsten Mal größer.`;
                } else {
                    msgEl.innerHTML = `📐 <b>Gradient sagt:</b> "Dreh die Stellschraube RUNTER! ⬇️" Dann wird das Ergebnis beim nächsten Mal kleiner.`;
                }
                draw();
            } else if (step === 4) {
                // Update weight
                weight += LR * gradient;
                msgEl.innerHTML = `🔧 <b>Angepasst!</b> Neues Gewicht: ${weight.toFixed(3)}. Mal sehen, ob es jetzt besser klappt...`;
                draw();
            } else {
                // Reset for next round
                step = 0;
                msgEl.innerHTML = `🔁 <b>Nächste Runde!</b> Die KI versucht es nochmal mit dem neuen Gewicht...`;
                nextStep(); // auto-trigger prediction
            }
            
            epochEl.textContent = `Runde ${round}`;
        }
        
        document.getElementById('btnNext').addEventListener('click', nextStep);
        document.getElementById('btnReset').addEventListener('click', () => {
            weight = Math.random() * 0.5 + 0.1; // random bad start
            output = 0;
            gradient = 0;
            loss = 0;
            step = 0;
            round = 0;
            lossHistory = [];
            msgEl.innerHTML = '👋 Neues Spiel! Die KI hat ein neues zufälliges Gewicht bekommen. Klicke den Knopf!';
            epochEl.textContent = '';
            draw();
        });
        
        // Initial draw
        draw();
    </script>
</body>
</html>
