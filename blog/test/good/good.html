        "End MinimizeNetHarm."

        "",

        "Variable Agent : Type.",
        "Variable Communication : Type.",

        "Definition override_condition (a : Agent) (c : Communication) (ctx : Context) : Prop :=",

        "",
        "(* --- The integrated honesty principle --- *)",
        "Definition honest_action (a : Agent) (c : Communication) (ctx : Context) : Prop :=",
        "  truthful a c ctx \\/ override_condition a c ctx.",
