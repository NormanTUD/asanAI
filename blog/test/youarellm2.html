<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Token Odyssey – Erlebe die Welt eines Tokens im LLM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/temml@0.10.24/dist/Temml-Latin-Modern.css">
    <script src="https://cdn.jsdelivr.net/npm/temml@0.10.24/dist/temml.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #b400ff;
            --neon-pink: #ff00d4;
            --neon-green: #00ff88;
            --neon-orange: #ff8800;
            --dark-bg: #0a0a1a;
            --darker-bg: #050510;
            --card-bg: rgba(15, 15, 40, 0.9);
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--darker-bg);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Starfield background */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(0,212,255,0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0,212,255,0.3);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            color: rgba(255,255,255,0.7);
        }

        /* Input Section */
        .input-section {
            max-width: 800px;
            margin: 30px auto;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 0 40px rgba(0,212,255,0.1);
        }

        .input-section label {
            display: block;
            font-size: 1.1em;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,212,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .input-row input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }

        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0,212,255,0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Token Selection */
        .token-selection {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px 30px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(180,0,255,0.3);
            display: none;
        }

        .token-selection h3 {
            color: var(--neon-purple);
            margin-bottom: 15px;
        }

        .token-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .token-chip {
            padding: 10px 18px;
            background: rgba(180,0,255,0.15);
            border: 1px solid rgba(180,0,255,0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .token-chip:hover {
            background: rgba(180,0,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180,0,255,0.3);
        }

        .token-chip.selected {
            background: rgba(180,0,255,0.5);
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(180,0,255,0.5);
        }

        /* Stage Container */
        .stage-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }

        /* Progress Bar */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(0,212,255,0.1), rgba(180,0,255,0.1));
            transition: width 0.5s;
            width: var(--progress, 0%);
        }

        .stage-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            z-index: 1;
            transition: all 0.5s;
            cursor: pointer;
        }

        .stage-dot.active {
            background: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        .stage-dot.completed {
            background: var(--neon-green);
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0,255,136,0.4);
        }

        /* Stage Panel */
        .stage-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(0,212,255,0.2);
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .stage-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,212,255,0.03) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stage-panel h2 {
            font-size: 2em;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .stage-panel .description {
            font-size: 1.05em;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        /* Math Display */
        .math-block {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            font-size: 1.2em;
            overflow-x: auto;
            position: relative;
            z-index: 1;
        }

        .math-block .temml {
            color: #fff;
        }

        /* Canvas Visualizations */
        .viz-canvas {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            border: 1px solid rgba(0,212,255,0.3);
            background: rgba(0,0,0,0.5);
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        /* Embedding Space */
        .embedding-space {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 15px;
            background: radial-gradient(ellipse at center, rgba(0,20,40,0.8) 0%, rgba(0,0,0,0.9) 100%);
            border: 1px solid rgba(0,212,255,0.3);
            overflow: hidden;
            margin: 20px 0;
            z-index: 1;
        }

        .embedding-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .embedding-dot::after {
            content: attr(data-label);
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            white-space: nowrap;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .embedding-dot.you {
            width: 20px;
            height: 20px;
            background: var(--neon-blue) !important;
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0,212,255,0.3);
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Attention Visualization */
        .attention-grid {
            display: grid;
            gap: 3px;
            margin: 20px auto;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .attention-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            transition: all 0.5s;
            position: relative;
            cursor: pointer;
        }

        .attention-cell:hover {
            transform: scale(1.2);
            z-index: 10;
        }

        .attention-cell::after {
            content: attr(data-value);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.6em;
            color: rgba(255,255,255,0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .attention-cell:hover::after {
            opacity: 1;
        }

        /* Token Labels for Attention */
        .attn-labels {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .attn-labels span {
            font-size: 0.85em;
            color: var(--neon-blue);
            padding: 4px 8px;
            background: rgba(0,212,255,0.1);
            border-radius: 5px;
        }

        /* Dense Layer Visualization */
        .neural-network {
            position: relative;
            width: 100%;
            height: 400px;
            margin: 20px 0;
            z-index: 1;
        }

        .neuron {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
        }

        .neuron.active {
            box-shadow: 0 0 15px currentColor;
        }

        /* Softmax Output */
        .softmax-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        .softmax-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .softmax-label {
            min-width: 100px;
            text-align: right;
            font-size: 0.95em;
            color: rgba(255,255,255,0.9);
        }

        .softmax-bar-container {
            flex: 1;
            height: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .softmax-bar {
            height: 100%;
            border-radius: 15px;
            transition: width 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .softmax-bar::after {
            content: attr(data-prob);
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8em;
            color: white;
            font-weight: bold;
        }

        .softmax-bar.winner {
            animation: glow-bar 1.5s infinite alternate;
        }

        @keyframes glow-bar {
            from { box-shadow: 0 0 10px currentColor; }
            to { box-shadow: 0 0 25px currentColor, 0 0 50px currentColor; }
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .btn-nav {
            padding: 12px 25px;
            border: 1px solid rgba(0,212,255,0.4);
            background: rgba(0,212,255,0.1);
            color: var(--neon-blue);
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn-nav:hover {
            background: rgba(0,212,255,0.2);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Vector Display */
        .vector-display {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0;
            position: relative;
            z-index: 1;
        }

        .vector-cell {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6em;
            transition: all 0.3s;
            cursor: pointer;
        }

        .vector-cell:hover {
            transform: scale(1.5);
            z-index: 10;
        }

        /* Positional Encoding Wave */
        .wave-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin: 20px 0;
            z-index: 1;
        }

        /* Info Tooltip */
        .info-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0,255,136,0.15);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--neon-green);
            margin: 5px;
        }

        /* Particle effect for transitions */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fly 1s ease-out forwards;
        }

        @keyframes fly {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translateY(-100px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .stage-panel { padding: 20px; }
            .input-row { flex-direction: column; }
            .progress-bar { padding: 10px; }
            .stage-dot { width: 30px; height: 30px; font-size: 0.7em; }
        }

        /* Connection lines for attention */
        .connection-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Glow text */
        .glow-text {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
        }

        /* Animated gradient border */
        .gradient-border {
            position: relative;
        }

        .gradient-border::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-green));
            border-radius: inherit;
            z-index: -1;
            animation: borderRotate 3s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Temperature slider */
        .slider-container {
            margin: 15px 0;
            position: relative;
            z-index: 1;
        }

        .slider-container label {
            display: block;
            margin-bottom: 8px;
            color: var(--neon-orange);
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255,136,0,0.2);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--neon-orange);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-orange);
        }

        /* First person narrative */
        .first-person {
            background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(180,0,255,0.05));
            border-left: 3px solid var(--neon-blue);
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: rgba(255,255,255,0.9);
            position: relative;
            z-index: 1;
        }

        .first-person::before {
            content: '👁️ ICH (Token):';
            display: block;
            font-style: normal;
            font-weight: bold;
            color: var(--neon-blue);
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        /* QKV visualization */
        .qkv-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        .qkv-box {
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .qkv-box.query {
            background: rgba(255,0,100,0.1);
            border: 1px solid rgba(255,0,100,0.4);
        }

        .qkv-box.key {
            background: rgba(0,200,255,0.1);
            border: 1px solid rgba(0,200,255,0.4);
        }

        .qkv-box.value {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.4);
        }

        .qkv-box h4 {
            margin-bottom: 10px;
        }

        /* Layer norm visualization */
        .layer-norm-viz {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .norm-arrow {
            font-size: 2em;
            color: var(--neon-green);
            animation: arrowPulse 1s infinite;
        }

        @keyframes arrowPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="particles" id="particles"></div>

    <header class="header">
        <h1>🧠 Token Odyssey</h1>
        <p>Werde zum Token. Erlebe die Welt eines Large Language Models von innen.</p>
    </header>

    <div class="input-section">
        <label>📝 Gib einen Satz ein – du wirst eines seiner Tokens:</label>
        <div class="input-row">
            <input type="text" id="inputSentence" placeholder="z.B. Die Katze sitzt auf der Matte" value="Die Katze sitzt auf der Matte">
            <button class="btn" onclick="tokenize()">Tokenisieren 🔬</button>
        </div>
    </div>

    <div class="token-selection" id="tokenSelection">
        <h3>🎯 Wähle dein Token – du wirst es sein:</h3>
        <div class="token-chips" id="tokenChips"></div>
    </div>

    <div class="stage-container" id="stageContainer">
        <div class="progress-bar" id="progressBar">
            <div class="stage-dot" data-stage="0" onclick="goToStage(0)">1</div>
            <div class="stage-dot" data-stage="1" onclick="goToStage(1)">2</div>
            <div class="stage-dot" data-stage="2" onclick="goToStage(2)">3</div>
            <div class="stage-dot" data-stage="3" onclick="goToStage(3)">4</div>
            <div class="stage-dot" data-stage="4" onclick="goToStage(4)">5</div>
            <div class="stage-dot" data-stage="5" onclick="goToStage(5)">6</div>
        </div>

        <div id="stageContent"></div>

        <div class="nav-buttons">
            <button class="btn-nav" id="btnPrev" onclick="prevStage()" disabled>← Zurück</button>
            <button class="btn-nav" id="btnNext" onclick="nextStage()">Weiter →</button>
        </div>
    </div>

    <script>
        // ============ GLOBAL STATE ============
        let tokens = [];
        let selectedTokenIndex = -1;
        let currentStage = 0;
        const EMBED_DIM = 16; // Simplified for visualization (real: 768-12288)
        let tokenEmbeddings = [];
        let positionalEncodings = [];
        let combinedEmbeddings = [];
        let attentionWeights = [];
        let qkvVectors = {};
        let denseOutputs = [];
        let logits = [];
        let probabilities = [];
        let temperature = 1.0;

        const VOCAB = ["die", "der", "das", "ein", "eine", "katze", "hund", "matte", "tisch",
            "sitzt", "liegt", "steht", "auf", "unter", "neben", "ist", "war", "hat",
            "und", "oder", "aber", "schön", "groß", "klein", "schnell", "langsam",
            "rot", "blau", "grün", "haus", "baum", "sonne", "mond", "wasser", "feuer"];

        // ============ STARFIELD ============
        function createStarfield() {
            const sf = document.getElementById('starfield');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                sf.appendChild(star);
            }
        }
        createStarfield();

        // ============ PARTICLE EFFECTS ============
        function emitParticles(x, y, color, count = 20) {
            const container = document.getElementById('particles');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.background = color;
                p.style.transform = `translate(${(Math.random()-0.5)*200}px, ${(Math.random()-0.5)*200}px)`;
                container.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // ============ TOKENIZATION ============
        function tokenize() {
            const sentence = document.getElementById('inputSentence').value.trim();
            if (!sentence) return;

            // Simple whitespace tokenization for demonstration
            tokens = sentence.split(/\s+/).map(t => t.toLowerCase().replace(/[^a-zäöüß]/g, ''));
            tokens = tokens.filter(t => t.length > 0);

            const sel = document.getElementById('tokenSelection');
            const chips = document.getElementById('tokenChips');
            chips.innerHTML = '';

            tokens.forEach((token, i) => {
                const chip = document.createElement('div');
                chip.className = 'token-chip';
                chip.textContent = `"${token}" [ID: ${getTokenId(token)}]`;
                chip.onclick = () => selectToken(i, chip);
                chips.appendChild(chip);
            });

            sel.style.display = 'block';
            sel.scrollIntoView({ behavior: 'smooth' });
        }

        function getTokenId(token) {
            // Deterministic hash for token ID
            let hash = 0;
            for (let i = 0; i < token.length; i++) {
                hash = ((hash << 5) - hash) + token.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash) % 50000;
        }

        function selectToken(index, element) {
            selectedTokenIndex = index;

            document.querySelectorAll('.token-chip').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');

            // Generate all mathematical data
            generateEmbeddings();
            generatePositionalEncodings();
            computeAttention();
            computeDenseLayers();
            computeLogitsAndProbabilities();

            // Show stage container
            const sc = document.getElementById('stageContainer');
            sc.style.display = 'block';
            currentStage = 0;
            renderStage(0);
            updateProgressBar();

            setTimeout(() => sc.scrollIntoView({ behavior: 'smooth' }), 200);

            // Particle effect
            const rect = element.getBoundingClientRect();
            emitParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#b400ff', 30);
        }

        // ============ MATH GENERATION ============
        function seededRandom(seed) {
            let s = seed;
            return function() {
                s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
                return (s >>> 0) / 0xFFFFFFFF;
            };
        }

        function generateEmbeddings() {
            tokenEmbeddings = [];
            tokens.forEach((token, i) => {
                const rng = seededRandom(getTokenId(token));
                const emb = [];
                for (let d = 0; d < EMBED_DIM; d++) {
                    emb.push((rng() - 0.5) * 2); // Values between -1 and 1
                }
                // Normalize to unit sphere
                const norm = Math.sqrt(emb.reduce((s, v) => s + v*v, 0));
                tokenEmbeddings.push(emb.map(v => v / norm));
            });
        }

        function generatePositionalEncodings() {
            positionalEncodings = [];
            combinedEmbeddings = [];
            tokens.forEach((_, pos) => {
                const pe = [];
                for (let d = 0; d < EMBED_DIM; d++) {
                    if (d % 2 === 0) {
                        pe.push(Math.sin(pos / Math.pow(10000, d / EMBED_DIM)));
                    } else {
                        pe.push(Math.cos(pos / Math.pow(10000, (d-1) / EMBED_DIM)));
                    }
                }
                positionalEncodings.push(pe);
                // Combined = token embedding + positional encoding
                const combined = tokenEmbeddings[pos].map((v, d) => v + pe[d]);
                // Normalize
                const norm = Math.sqrt(combined.reduce((s, v) => s + v*v, 0));
                combinedEmbeddings.push(combined.map(v => v / norm));
            });
        }

        function computeAttention() {
            const n = tokens.length;
            // Generate Q, K, V matrices using linear projections (simulated)
            const Wq = generateMatrix(EMBED_DIM, EMBED_DIM, 42);
            const Wk = generateMatrix(EMBED_DIM, EMBED_DIM, 137);
            const Wv = generateMatrix(EMBED_DIM, EMBED_DIM, 256);

            const Q = combinedEmbeddings.map(e => matVecMul(Wq, e));
            const K = combinedEmbeddings.map(e => matVecMul(Wk, e));
            const V = combinedEmbeddings.map(e => matVecMul(Wv, e));

            qkvVectors = { Q, K, V };

            // Compute attention scores: softmax(QK^T / sqrt(d_k))
            const dk = Math.sqrt(EMBED_DIM);
            attentionWeights = [];

            for (let i = 0; i < n; i++) {
                const row = [];
                for (let j = 0; j < n; j++) {
                    // Causal mask: can only attend to positions <= i
                    if (j <= i) {
                        const score = dotProduct(Q[i], K[j]) / dk;
                        row.push(score);
                    } else {
                        row.push(-Infinity);
                    }
                }
                // Softmax
                const maxVal = Math.max(...row.filter(v => v !== -Infinity));
                const expRow = row.map(v => v === -Infinity ? 0 : Math.exp(v - maxVal));
                const sumExp = expRow.reduce((s, v) => s + v, 0);
                attentionWeights.push(expRow.map(v => v / sumExp));
            }
        }

        function computeDenseLayers() {
            // Simulate FFN: two dense layers with ReLU
            // FFN(x) = max(0, xW1 + b1)W2 + b2
            const W1 = generateMatrix(EMBED_DIM * 4, EMBED_DIM, 789);
            const b1 = Array(EMBED_DIM * 4).fill(0).map((_, i) => (seededRandom(i + 999)() - 0.5) * 0.1);

            // Apply attention output first
            const attnOutput = applyAttention(selectedTokenIndex);

            // First dense layer
            const hidden = matVecMul(W1, attnOutput).map((v, i) => Math.max(0, v + b1[i])); // ReLU

            // Second dense layer (project back)
            const W2 = generateMatrix(EMBED_DIM, EMBED_DIM * 4, 1337);
            const b2 = Array(EMBED_DIM).fill(0).map((_, i) => (seededRandom(i + 2000)() - 0.5) * 0.1);

            denseOutputs = matVecMul(W2, hidden).map((v, i) => v + b2[i]);

            // Layer norm
            const mean = denseOutputs.reduce((s, v) => s + v, 0) / EMBED_DIM;
            const variance = denseOutputs.reduce((s, v) => s + (v - mean) ** 2, 0) / EMBED_DIM;
            denseOutputs = denseOutputs.map(v => (v - mean) / Math.sqrt(variance + 1e-5));
        }

        function computeLogitsAndProbabilities() {
            // Project to vocabulary space
            const vocabSize = VOCAB.length;
            const Wout = generateMatrix(vocabSize, EMBED_DIM, 4242);

            logits = matVecMul(Wout, denseOutputs);

            // Apply temperature and softmax
            applyTemperatureAndSoftmax();
        }

        function applyTemperatureAndSoftmax() {
            const scaledLogits = logits.map(l => l / temperature);
            const maxLogit = Math.max(...scaledLogits);
            const expLogits = scaledLogits.map(l => Math.exp(l - maxLogit));
            const sumExp = expLogits.reduce((s, v) => s + v, 0);
            probabilities = expLogits.map(v => v / sumExp);
        }

        // ============ MATH HELPERS ============
        function generateMatrix(rows, cols, seed) {
            const rng = seededRandom(seed);
            const mat = [];
            const scale = Math.sqrt(2.0 / cols); // He initialization
            for (let i = 0; i < rows; i++) {
                const row = [];
                for (let j = 0; j < cols; j++) {
                    row.push((rng() - 0.5) * 2 * scale);
                }
                mat.push(row);
            }
            return mat;
        }

        function matVecMul(mat, vec) {
            return mat.map(row => dotProduct(row, vec));
        }

        function dotProduct(a, b) {
            let sum = 0;
            const len = Math.min(a.length, b.length);
            for (let i = 0; i < len; i++) sum += a[i] * b[i];
            return sum;
        }

        function applyAttention(tokenIdx) {
            const weights = attentionWeights[tokenIdx];
            const V = qkvVectors.V;
            const result = Array(EMBED_DIM).fill(0);
            for (let j = 0; j < tokens.length; j++) {
                for (let d = 0; d < EMBED_DIM; d++) {
                    result[d] += weights[j] * V[j][d];
                }
            }
            return result;
        }

        // ============ STAGE RENDERING ============
        const stages = [
            { title: "🌌 Token Embedding", color: "var(--neon-blue)" },
            { title: "🌊 Positional Encoding", color: "var(--neon-purple)" },
            { title: "🔗 Self-Attention (QKV)", color: "var(--neon-pink)" },
            { title: "⚡ Feed-Forward Network", color: "var(--neon-orange)" },
            { title: "📊 Logits & Softmax", color: "var(--neon-green)" },
            { title: "🎯 Nächstes Token Vorhersage", color: "#ffdd00" }
        ];

        function renderStage(stageIdx) {
            const content = document.getElementById('stageContent');
            switch(stageIdx) {
                case 0: content.innerHTML = renderEmbeddingStage(); break;
                case 1: content.innerHTML = renderPositionalStage(); break;
                case 2: content.innerHTML = renderAttentionStage(); break;
                case 3: content.innerHTML = renderDenseStage(); break;
                case 4: content.innerHTML = renderSoftmaxStage(); break;
                case 5: content.innerHTML = renderPredictionStage(); break;
            }
            // Render math with temml
            renderAllMath();
            // Trigger animations
            setTimeout(() => animateStage(stageIdx), 100);
        }

        function renderAllMath() {
            document.querySelectorAll('.math-render').forEach(el => {
                try {
                    temml.render(el.getAttribute('data-math'), el, { displayMode: true });
                } catch(e) {
                    el.textContent = el.getAttribute('data-math');
                }
            });
            document.querySelectorAll('.math-inline').forEach(el => {
                try {
                    temml.render(el.getAttribute('data-math'), el, { displayMode: false });
                } catch(e) {
                    el.textContent = el.getAttribute('data-math');
                }
            });
        }

        // ============ STAGE 0: TOKEN EMBEDDING ============
        function renderEmbeddingStage() {
            const token = tokens[selectedTokenIndex];
            const tokenId = getTokenId(token);
            const emb = tokenEmbeddings[selectedTokenIndex];

            return `

                        Ähnliche Wörter sind nahe bei mir, unähnliche weit entfernt.
                    </div>

                    <div class="math-block">

        }

        // ============ STAGE 1: POSITIONAL ENCODING ============
        function renderPositionalStage() {
            const token = tokens[selectedTokenIndex];
            const pos = selectedTokenIndex;
            const pe = positionalEncodings[pos];

            return `

                        Ich weiß jetzt WAS ich bin, aber noch nicht WO ich bin. Position ${pos} im Satz – das muss in meine Repräsentation einfließen.
                        Sinuswellen verschiedener Frequenzen werden zu mir addiert. Jede Dimension bekommt eine andere Frequenz – so entsteht ein einzigartiger "Fingerabdruck" für meine Position.
                        Danach bin ich nicht mehr nur "${token}" – ich bin "${token} an Position ${pos}".

                        <div class="math-render" data-math="PE_{(pos, 2i+1)} = \\cos\\left(\\frac{pos}{10000^{2i/d_{\\text{model}}}}\\right)"></div>
                    </div>
                    <div class="math-block">
                        <div class="math-render" data-math="x_{\\text{final}} = \\text{Embedding}(\\text{&quot;${token}&quot;}) + PE_{${pos}}"></div>

                    <h3 style="color: ${stages[1].color}; margin-top: 25px;">🌊 Positional Encoding Wellen (Position ${pos}):</h3>

                    <h3 style="color: ${stages[1].color}; margin-top: 25px;">➕ Embedding + Position = Mein neues Ich:</h3>
                    <div class="layer-norm-viz">
                        <div>
                            <div style="color: var(--neon-blue); margin-bottom: 5px; text-align: center;">Token Embedding</div>

                            <div style="color: var(--neon-purple); margin-bottom: 5px; text-align: center;">Positional Encoding</div>

        // ============ STAGE 2: SELF-ATTENTION ============
        function renderAttentionStage() {
            const token = tokens[selectedTokenIndex];
            const weights = attentionWeights[selectedTokenIndex];

            let weightsList = tokens.map((t, i) => `"${t}": ${(weights[i]*100).toFixed(1)}%`).join(', ');

            return `
                <div class="stage-panel" style="border-color: ${stages[2].color}">
                    <h2 style="color: ${stages[2].color}">${stages[2].title}</h2>

                    <div class="first-person">
                        Jetzt wird es spannend! Ich schaue mich um und frage: "Welche anderen Tokens sind relevant für mich?"
                        Ich erzeuge drei Versionen von mir: eine <strong>Query</strong> (meine Frage), einen <strong>Key</strong> (mein Schlüssel) und einen <strong>Value</strong> (mein Wert).
                        Meine Query wird mit den Keys aller anderen verglichen. Je ähnlicher, desto mehr Aufmerksamkeit schenke ich ihnen.

                    </div>

                    <div class="math-block">

                    <div class="math-block">

                    </div>
                    <div class="math-block">
                        <div class="math-render" data-math="\\alpha_{ij} = \\frac{\\exp(q_i \\cdot k_j / \\sqrt{d_k})}{\\sum_{m \\leq i} \\exp(q_i \\cdot k_m / \\sqrt{d_k})}"></div>
                    </div>

                    <h3 style="color: ${stages[2].color}; margin-top: 25px;">🔑 Meine Q, K, V Vektoren:</h3>

                            <h4 style="color: #00c8ff;">Key (K)</h4>

                            <p style="font-size: 0.8em; color: rgba(255,255,255,0.7);">"Was gebe ich weiter?"</p>
                            <div class="vector-display" id="valueVector"></div>
                        </div>
                    </div>

                    <h3 style="color: ${stages[2].color}; margin-top: 25px;">👁️ Attention Heatmap (Wem schenke ich Aufmerksamkeit?):</h3>

                    <div class="info-badge">d_k = ${EMBED_DIM}</div>
                    <div class="info-badge">Skalierung: 1/√${EMBED_DIM} = ${(1/Math.sqrt(EMBED_DIM)).toFixed(3)}</div>
                </div>
            `;
        }

        // ============ STAGE 3: FEED-FORWARD NETWORK ============
        function renderDenseStage() {
            const token = tokens[selectedTokenIndex];

            return `
                <div class="stage-panel" style="border-color: ${stages[3].color}">
                    <h2 style="color: ${stages[3].color}">${stages[3].title}</h2>

                    <div class="first-person">
                        Nach der Attention habe ich Informationen von anderen Tokens gesammelt. Jetzt gehe ich durch das Feed-Forward Network – zwei dichte Schichten mit einer ReLU-Aktivierung dazwischen.
                        Die erste Schicht expandiert mich auf das 4-fache meiner Dimension (${EMBED_DIM} → ${EMBED_DIM*4}), dann werde ich wieder komprimiert (${EMBED_DIM*4} → ${EMBED_DIM}).
                        Das ist wie ein Flaschenhals – ich werde gezwungen, die wichtigsten Features zu behalten!
                        Am Ende kommt Layer Normalization: mein Vektor wird auf Mittelwert 0 und Varianz 1 normalisiert.
                    </div>

                    <div class="math-block">
                        <div class="math-render" data-math="\\text{FFN}(x) = \\text{ReLU}(xW_1 + b_1)W_2 + b_2"></div>

                        <div class="math-render" data-math="W_1 \\in \\mathbb{R}^{d_{\\text{model}} \\times 4d_{\\text{model}}}, \\quad W_2 \\in \\mathbb{R}^{4d_{\\text{model}} \\times d_{\\text{model}}}"></div>
                    </div>
                    <div class="math-block">
                        <div class="math-render" data-math="\\text{LayerNorm}(x) = \\frac{x - \\mu}{\\sqrt{\\sigma^2 + \\epsilon}} \\cdot \\gamma + \\beta"></div>

        }

                        Dann kommt Softmax: alle Logits werden in Wahrscheinlichkeiten umgewandelt, die sich zu 1 summieren.

                    </div>
                    <div class="math-block">

        // ============ STAGE 5: PREDICTION ============
        function renderPredictionStage() {
            const token = tokens[selectedTokenIndex];
            const topK = getTopK(5);
            const winner = topK[0];

            return `

                        Bei Sampling wird zufällig gemäß der Verteilung gewählt – dann könnte auch ein weniger wahrscheinliches Token gewinnen!
                        Und dann beginnt der ganze Prozess von vorne – für das nächste Token...

                    <div class="math-block">

                    <h3 style="color: ${stages[5].color}; margin-top: 25px;">🏆 Top-5 Kandidaten:</h3>
                    <div class="softmax-bars" id="predictionBars"></div>

                    <h3 style="color: ${stages[5].color}; margin-top: 25px;">🎲 Sampling Visualisierung:</h3>
                    <canvas class="viz-canvas" id="samplingCanvas" width="800" height="300"></canvas>

                    <h3 style="color: ${stages[5].color}; margin-top: 25px;">📝 Generierter Text:</h3>
                    <div style="background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; font-size: 1.3em; text-align: center; border: 1px solid rgba(255,221,0,0.3); position: relative; z-index: 1;">
                        ${tokens.map((t, i) => `<span style="color: ${i === selectedTokenIndex ? 'var(--neon-blue)' : 'rgba(255,255,255,0.7)'}; ${i === selectedTokenIndex ? 'text-shadow: 0 0 10px var(--neon-blue); font-weight: bold;' : ''}">${t}</span>`).join(' ')}
                        <span style="color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); font-weight: bold; border-bottom: 2px solid var(--neon-green);"> ${winner.word}</span>
                        <span style="color: rgba(255,255,255,0.3);">...</span>
                    </div>

                    <div class="math-block">
                        <div class="math-render" data-math="\\text{Greedy: } w^* = \\arg\\max_w P(w|\\text{context})"></div>
                    </div>
                    <div class="math-block">
                        <div class="math-render" data-math="\\text{Sampling: } w \\sim \\text{Categorical}(P(w_1), P(w_2), \\ldots, P(w_{|V|}))"></div>
                    </div>

                    <div class="info-badge">Methode: Greedy Decoding</div>
                    <div class="info-badge">Gewinner: "${winner.word}"</div>
                    <div class="info-badge">Konfidenz: ${(winner.prob*100).toFixed(1)}%</div>
                    <div class="info-badge">Top-5 Abdeckung: ${(topK.reduce((s,t) => s+t.prob, 0)*100).toFixed(1)}%</div>
                </div>
            `;
        }

        // ============ HELPER FUNCTIONS ============
        function getTopK(k) {
            const indexed = probabilities.map((p, i) => ({ word: VOCAB[i], prob: p, index: i }));
            indexed.sort((a, b) => b.prob - a.prob);
            return indexed.slice(0, k);
        }

        function computeEntropy() {
            let entropy = 0;
            for (const p of probabilities) {
                if (p > 0) entropy -= p * Math.log2(p);
            }
            return entropy;
        }

        function updateTemperature(val) {
            temperature = parseFloat(val);
            document.getElementById('tempValue').textContent = temperature.toFixed(2);
            applyTemperatureAndSoftmax();
            // Re-render softmax bars
            renderSoftmaxBars();
            renderLogitsCanvas();
        }

        // ============ ANIMATION FUNCTIONS ============
        function animateStage(stageIdx) {
            switch(stageIdx) {
                case 0: animateEmbeddingStage(); break;
                case 1: animatePositionalStage(); break;
                case 2: animateAttentionStage(); break;
                case 3: animateDenseStage(); break;
                case 4: animateSoftmaxStage(); break;
                case 5: animatePredictionStage(); break;
            }
        }

        // ---- Stage 0 Animation: Embedding ----
        function animateEmbeddingStage() {
            const emb = tokenEmbeddings[selectedTokenIndex];
            const container = document.getElementById('embeddingVector');
            if (!container) return;

            container.innerHTML = '';
            emb.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'vector-cell';
                const intensity = (val + 1) / 2; // normalize to 0-1
                const hue = 200 + val * 60;
                cell.style.background = `hsla(${hue}, 80%, ${30 + intensity * 40}%, 0.9)`;
                cell.style.border = `1px solid hsla(${hue}, 80%, 60%, 0.5)`;
                cell.textContent = val.toFixed(2);
                cell.style.opacity = '0';
                cell.style.transform = 'scale(0)';
                container.appendChild(cell);

                setTimeout(() => {
                    cell.style.transition = 'all 0.3s ease';
                    cell.style.opacity = '1';
                    cell.style.transform = 'scale(1)';
                }, i * 50);
            });

            // Embedding space visualization
            animateEmbeddingSpace();
        }

        function animateEmbeddingSpace() {
            const space = document.getElementById('embeddingSpace');
            if (!space) return;
            space.innerHTML = '';

            // Project all tokens to 2D using first two principal components (simplified: use dim 0 and 1)
            const allTokens = [...tokens];
            // Add some vocabulary words for context
            const extraWords = ['hund', 'tisch', 'liegt', 'steht', 'unter', 'neben', 'schön', 'groß'];
            const allWords = [...allTokens, ...extraWords];

            const embeddings2D = allWords.map((word, idx) => {
                let emb;
                if (idx < tokens.length) {
                    emb = tokenEmbeddings[idx];
                } else {
                    const rng = seededRandom(getTokenId(word));
                    emb = Array(EMBED_DIM).fill(0).map(() => (rng() - 0.5) * 2);
                    const norm = Math.sqrt(emb.reduce((s, v) => s + v*v, 0));
                    emb = emb.map(v => v / norm);
                }
                // Use PCA-like projection (dims 0,1 combined with 2,3 for better spread)
                const x = emb[0] * 0.5 + emb[2] * 0.3 + emb[4] * 0.2;
                const y = emb[1] * 0.5 + emb[3] * 0.3 + emb[5] * 0.2;
                return { x, y, word, isToken: idx < tokens.length, isSelected: idx === selectedTokenIndex };
            });

            // Normalize to fit space
            const xs = embeddings2D.map(e => e.x);
            const ys = embeddings2D.map(e => e.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const rangeX = maxX - minX || 1;
            const rangeY = maxY - minY || 1;

            embeddings2D.forEach((point, idx) => {
                const dot = document.createElement('div');
                dot.className = 'embedding-dot' + (point.isSelected ? ' you' : '');
                const px = 50 + ((point.x - minX) / rangeX) * (space.clientWidth - 100);
                const py = 50 + ((point.y - minY) / rangeY) * (space.clientHeight - 100);

                dot.style.left = '50%';
                dot.style.top = '50%';
                dot.setAttribute('data-label', point.word);

                if (point.isSelected) {
                    dot.style.background = 'var(--neon-blue)';
                } else if (point.isToken) {
                    dot.style.background = 'var(--neon-purple)';
                    dot.style.boxShadow = '0 0 8px var(--neon-purple)';
                } else {
                    dot.style.background = 'rgba(255,255,255,0.4)';
                    dot.style.width = '8px';
                    dot.style.height = '8px';
                }

                space.appendChild(dot);

                // Animate to position
                setTimeout(() => {
                    dot.style.left = px + 'px';
                    dot.style.top = py + 'px';
                }, 200 + idx * 80);
            });

            // Draw grid lines
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'connection-svg');
            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = '0';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.opacity = '0.1';

            for (let i = 0; i < 10; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', '0');
                line.setAttribute('y1', (i * space.clientHeight / 10) + '');
                line.setAttribute('x2', space.clientWidth + '');
                line.setAttribute('y2', (i * space.clientHeight / 10) + '');
                line.setAttribute('stroke', 'rgba(0,212,255,0.5)');
                line.setAttribute('stroke-width', '0.5');
                svg.appendChild(line);

                const vline = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                vline.setAttribute('x1', (i * space.clientWidth / 10) + '');
                vline.setAttribute('y1', '0');
                vline.setAttribute('x2', (i * space.clientWidth / 10) + '');
                vline.setAttribute('y2', space.clientHeight + '');
                vline.setAttribute('stroke', 'rgba(0,212,255,0.5)');
                vline.setAttribute('stroke-width', '0.5');
                svg.appendChild(vline);
            }
            space.insertBefore(svg, space.firstChild);
        }

        // ---- Stage 1 Animation: Positional Encoding ----
        function animatePositionalStage() {
            drawPEWaves();
            renderPEVectors();
        }

        function drawPEWaves() {
            const canvas = document.getElementById('peWaveCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * 2;
            canvas.height = canvas.clientHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, w, h);

            const pos = selectedTokenIndex;
            const numDims = EMBED_DIM;
            const colors = [];
            for (let d = 0; d < numDims; d++) {
                const hue = (d / numDims) * 360;
                colors.push(`hsla(${hue}, 80%, 60%, 0.8)`);
            }

            // Draw waves for each dimension
            let frame = 0;
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(0, 0, w, h);

                // Draw position marker
                const posX = (pos / (tokens.length - 1 || 1)) * (w - 60) + 30;
                ctx.strokeStyle = 'rgba(0,212,255,0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(posX, 0);
                ctx.lineTo(posX, h);
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw sine/cosine waves for different dimensions
                for (let d = 0; d < Math.min(numDims, 8); d++) {
                    const freq = 1 / Math.pow(10000, (2 * Math.floor(d/2)) / numDims);
                    ctx.strokeStyle = colors[d];
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();

                    for (let x = 0; x < w; x++) {
                        const p = (x / w) * tokens.length;
                        let val;
                        if (d % 2 === 0) {
                            val = Math.sin(p * freq + frame * 0.01);
                        } else {
                            val = Math.cos(p * freq + frame * 0.01);
                        }
                        const y = (h / 2) + val * (h / 2 - 20) * (0.8 - d * 0.08);
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();

                    // Draw dot at current position
                    let val;
                    if (d % 2 === 0) {
                        val = Math.sin(pos * freq + frame * 0.01);
                    } else {
                        val = Math.cos(pos * freq + frame * 0.01);
                    }
                    const dotY = (h / 2) + val * (h / 2 - 20) * (0.8 - d * 0.08);
                    ctx.fillStyle = colors[d];
                    ctx.beginPath();
                    ctx.arc(posX, dotY, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Labels
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '11px Courier New';
                ctx.fillText(`Position: ${pos}`, posX + 10, 20);
                ctx.fillText('sin/cos Wellen verschiedener Frequenzen', 10, h - 10);

                frame++;
                if (currentStage === 1) requestAnimationFrame(animate);
            }
            animate();
        }

        function renderPEVectors() {
            const emb = tokenEmbeddings[selectedTokenIndex];
            const pe = positionalEncodings[selectedTokenIndex];

            renderVectorInContainer('peEmbVector', emb, 200);

        // ---- Stage 2 Animation: Attention ----
        function animateAttentionStage() {
            renderQKVVectors();
            renderAttentionHeatmap();
            renderAttentionBars();
        }

        function renderQKVVectors() {
            const Q = qkvVectors.Q[selectedTokenIndex];
            const K = qkvVectors.K[selectedTokenIndex];
            const V = qkvVectors.V[selectedTokenIndex];

            renderVectorInContainer('queryVector', Q, 340);
