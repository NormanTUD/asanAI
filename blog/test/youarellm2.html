        }

        function renderAttentionHeatmap() {
            const n = tokens.length;
            const grid = document.getElementById('attentionGrid');
            const labels = document.getElementById('attnLabels');
            if (!grid || !labels) return;

            // Labels
            labels.innerHTML = tokens.map(t => `<span>"${t}"</span>`).join('');

            // Grid
            grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
            grid.innerHTML = '';

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'attention-cell';
                    const weight = attentionWeights[i][j];
                    const intensity = weight;

                    if (j > i) {
                        // Masked (future)
                        cell.style.background = 'rgba(255,0,0,0.1)';
                        cell.style.border = '1px solid rgba(255,0,0,0.2)';
                        cell.setAttribute('data-value', '🚫');
                    } else {
                        const hue = i === selectedTokenIndex ? 280 : 200;
                        cell.style.background = `hsla(${hue}, 80%, ${10 + intensity * 60}%, ${0.3 + intensity * 0.7})`;
                        cell.style.border = `1px solid hsla(${hue}, 80%, 50%, ${intensity})`;
                        cell.setAttribute('data-value', (weight * 100).toFixed(1) + '%');

                        if (i === selectedTokenIndex) {
                            cell.style.boxShadow = `0 0 ${intensity * 15}px hsla(${hue}, 80%, 50%, ${intensity})`;
                        }
                    }

                    cell.style.opacity = '0';
                    grid.appendChild(cell);

                    setTimeout(() => {
                        cell.style.opacity = '1';
                    }, (i * n + j) * 30);
                }
            }
        }

        function renderAttentionBars() {
            const container = document.getElementById('attnBars');
            if (!container) return;
            container.innerHTML = '';

            const weights = attentionWeights[selectedTokenIndex];
            tokens.forEach((token, i) => {
                const row = document.createElement('div');
                row.className = 'softmax-row';

                const label = document.createElement('div');
                label.className = 'softmax-label';
                label.textContent = `"${token}"`;

                const barContainer = document.createElement('div');
                barContainer.className = 'softmax-bar-container';

                const bar = document.createElement('div');
                bar.className = 'softmax-bar';
                const hue = 280 + (i / tokens.length) * 60;
                bar.style.background = `linear-gradient(90deg, hsla(${hue}, 80%, 40%, 0.8), hsla(${hue}, 80%, 60%, 0.9))`;
                bar.style.width = '0%';
                bar.setAttribute('data-prob', (weights[i] * 100).toFixed(1) + '%');

                if (i > selectedTokenIndex) {
                    bar.style.background = 'rgba(255,0,0,0.2)';
                    bar.setAttribute('data-prob', '🚫 masked');
                }

                barContainer.appendChild(bar);
                row.appendChild(label);
                row.appendChild(barContainer);
                container.appendChild(row);

                setTimeout(() => {
                    if (i <= selectedTokenIndex) {
                        bar.style.width = (weights[i] * 100) + '%';
                    }
                }, 300 + i * 150);
            });
        }

        // ---- Stage 3 Animation: Dense Layers ----
        function animateDenseStage() {
            drawNeuralNetwork();
            drawReLUActivations();
            renderDenseOutput();
        }

        function drawNeuralNetwork() {
            const canvas = document.getElementById('nnCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * 2;
            canvas.height = canvas.clientHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            const layers = [
                { size: EMBED_DIM, label: 'Input (d_model)', color: 'var(--neon-blue)' },
                { size: EMBED_DIM * 4, label: 'Hidden (4×d_model)', color: 'var(--neon-orange)' },
                { size: EMBED_DIM, label: 'Output (d_model)', color: 'var(--neon-green)' }
            ];

            const layerX = [w * 0.15, w * 0.5, w * 0.85];
            const maxNeurons = 12; // Max neurons to display per layer

            let frame = 0;
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, 0, w, h);

                // Draw connections
                for (let l = 0; l < layers.length - 1; l++) {
                    const n1 = Math.min(layers[l].size, maxNeurons);
                    const n2 = Math.min(layers[l+1].size, maxNeurons);

                    for (let i = 0; i < n1; i++) {
                        for (let j = 0; j < n2; j++) {
                            const x1 = layerX[l];
                            const y1 = (i + 1) * h / (n1 + 1);
                            const x2 = layerX[l+1];
                            const y2 = (j + 1) * h / (n2 + 1);

                            const signal = Math.sin(frame * 0.05 + i * 0.3 + j * 0.2) * 0.5 + 0.5;
                            ctx.strokeStyle = `rgba(0, 212, 255, ${signal * 0.15})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(x1 + 8, y1);
                            ctx.lineTo(x2 - 8, y2);
                            ctx.stroke();
                        }
                    }
                }

                // Draw neurons
                for (let l = 0; l < layers.length; l++) {
                    const n = Math.min(layers[l].size, maxNeurons);
                    for (let i = 0; i < n; i++) {
                        const x = layerX[l];
                        const y = (i + 1) * h / (n + 1);

                        const activation = Math.sin(frame * 0.03 + i * 0.5 + l * 2) * 0.5 + 0.5;
                        const hue = l === 0 ? 200 : l === 1 ? 30 : 140;

                        ctx.beginPath();
                        ctx.arc(x, y, 6 + activation * 3, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue}, 80%, ${30 + activation * 40}%, 0.9)`;
                        ctx.fill();
                        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${0.5 + activation * 0.5})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();

                        // Glow
                        if (activation > 0.7) {
                            ctx.beginPath();
                            ctx.arc(x, y, 12, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${(activation - 0.7) * 0.5})`;
                            ctx.fill();
                        }
                    }

                    // Layer label
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = '10px Courier New';
                    ctx.textAlign = 'center';
                    ctx.fillText(layers[l].label, layerX[l], h - 15);

                    if (layers[l].size > maxNeurons) {
                        ctx.fillText(`(${layers[l].size} neurons)`, layerX[l], h - 3);
                    }
                }

                // Animated signal pulse
                const pulseX = layerX[0] + (layerX[2] - layerX[0]) * ((frame % 120) / 120);
                ctx.beginPath();
                ctx.arc(pulseX, h / 2, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 0, 0.8)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pulseX, h / 2, 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 0, 0.2)';
                ctx.fill();

                frame++;
                if (currentStage === 3) requestAnimationFrame(animate);
            }
            animate();
        }

        function drawReLUActivations() {
            const canvas = document.getElementById('reluCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * 2;
            canvas.height = canvas.clientHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            // Generate hidden layer activations
            const W1 = generateMatrix(EMBED_DIM * 4, EMBED_DIM, 789);
            const attnOutput = applyAttention(selectedTokenIndex);
            const preRelu = matVecMul(W1, attnOutput);
            const postRelu = preRelu.map(v => Math.max(0, v));

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, w, h);

            const barWidth = w / (EMBED_DIM * 4);

            // Draw pre-ReLU (faded)
            preRelu.forEach((val, i) => {
                const x = i * barWidth;
                const barH = Math.abs(val) / 3 * (h / 2);
                const y = val >= 0 ? h / 2 - barH : h / 2;

                ctx.fillStyle = val >= 0 ? 'rgba(100, 100, 255, 0.3)' : 'rgba(255, 50, 50, 0.3)';
                ctx.fillRect(x, y, barWidth - 1, barH);
            });

            // Draw post-ReLU
            postRelu.forEach((val, i) => {
                const x = i * barWidth;
                const barH = val / 3 * (h / 2);

                if (val > 0) {
                    const hue = 30 + (val / 3) * 30;
                    ctx.fillStyle = `hsla(${hue}, 90%, 50%, 0.8)`;
                    ctx.fillRect(x, h / 2 - barH, barWidth - 1, barH);
                }
            });

            // Center line
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Labels
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '10px Courier New';
            ctx.fillText('ReLU(x) = max(0, x) — Negative Werte werden auf 0 gesetzt', 10, 15);
            ctx.fillStyle = 'rgba(255,136,0,0.8)';
            ctx.fillText(`Aktive Neuronen: ${postRelu.filter(v => v > 0).length}/${EMBED_DIM*4}`, 10, h - 8);
        }

        function renderDenseOutput() {
            const container = document.getElementById('denseOutputVector');
            if (!container) return;
            container.innerHTML = '';

            denseOutputs.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'vector-cell';
                const intensity = (val + 2) / 4;
                const hue = 140;
                cell.style.background = `hsla(${hue}, 70%, ${20 + Math.max(0, intensity) * 50}%, 0.9)`;
                cell.style.border = `1px solid hsla(${hue}, 70%, 50%, 0.4)`;
                cell.textContent = val.toFixed(2);
                cell.style.opacity = '0';
                container.appendChild(cell);

                setTimeout(() => {
                    cell.style.transition = 'all 0.3s';
                    cell.style.opacity = '1';
                }, i * 60);
            });
        }

        // ---- Stage 4 Animation: Softmax ----
        function animateSoftmaxStage() {
            renderLogitsCanvas();
            renderSoftmaxBars();
        }

        function renderLogitsCanvas() {
            const canvas = document.getElementById('logitsCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * 2;
            canvas.height = canvas.clientHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, w, h);

            const barWidth = w / VOCAB.length;
            const maxLogit = Math.max(...logits);
            const minLogit = Math.min(...logits);
            const range = maxLogit - minLogit || 1;

            logits.forEach((val, i) => {
                const x = i * barWidth;
                const normalized = (val - minLogit) / range;
                const barH = normalized * (h - 40);

                const hue = 120 + normalized * 120;
                
                ctx.fillStyle = `hsla(${hue}, 80%, 50%, 0.8)`;
                ctx.fillRect(x + 1, h - 20 - barH, barWidth - 2, barH);

                // Highlight top logit
                if (val === maxLogit) {
                    ctx.strokeStyle = 'rgba(255,255,0,0.8)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, h - 20 - barH - 2, barWidth, barH + 4);
                }
            });

            // X-axis labels (every few)
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '8px Courier New';
            ctx.textAlign = 'center';
            for (let i = 0; i < VOCAB.length; i += 3) {
                ctx.save();
                ctx.translate(i * barWidth + barWidth/2, h - 5);
                ctx.rotate(-0.5);
                ctx.fillText(VOCAB[i], 0, 0);
                ctx.restore();
            }

            // Title
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '11px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`Logits (rohe Scores) — max: ${maxLogit.toFixed(2)}, min: ${minLogit.toFixed(2)}`, 10, 15);
        }

        function renderSoftmaxBars() {
            const container = document.getElementById('softmaxBars');
            if (!container) return;
            container.innerHTML = '';

            const topK = getTopK(10);

            topK.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'softmax-row';

                const label = document.createElement('div');
                label.className = 'softmax-label';
                label.textContent = `"${item.word}"`;

                const barContainer = document.createElement('div');
                barContainer.className = 'softmax-bar-container';

                const bar = document.createElement('div');
                bar.className = 'softmax-bar' + (i === 0 ? ' winner' : '');
                const hue = 120 + (1 - item.prob) * 200;
                bar.style.background = `linear-gradient(90deg, hsla(${hue}, 80%, 40%, 0.8), hsla(${hue}, 80%, 60%, 0.9))`;
                bar.style.color = `hsl(${hue}, 80%, 50%)`;
                bar.style.width = '0%';
                bar.setAttribute('data-prob', (item.prob * 100).toFixed(2) + '%');

                barContainer.appendChild(bar);
                row.appendChild(label);
                row.appendChild(barContainer);
                container.appendChild(row);

                setTimeout(() => {
                    bar.style.width = Math.max(item.prob * 100, 2) + '%';
                }, 200 + i * 100);
            });
        }

        // ---- Stage 5 Animation: Prediction ----
        function animatePredictionStage() {
            renderPredictionBars();
            drawSamplingVisualization();
        }

        function renderPredictionBars() {
            const container = document.getElementById('predictionBars');
            if (!container) return;
            container.innerHTML = '';

            const topK = getTopK(5);

            topK.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'softmax-row';

                const label = document.createElement('div');
                label.className = 'softmax-label';
                label.innerHTML = i === 0 ? `🏆 "${item.word}"` : `"${item.word}"`;
                label.style.color = i === 0 ? 'var(--neon-green)' : 'rgba(255,255,255,0.8)';

                const barContainer = document.createElement('div');
                barContainer.className = 'softmax-bar-container';

                const bar = document.createElement('div');
                bar.className = 'softmax-bar' + (i === 0 ? ' winner' : '');
                const colors = ['#00ff88', '#00d4ff', '#b400ff', '#ff00d4', '#ff8800'];
                bar.style.background = `linear-gradient(90deg, ${colors[i]}aa, ${colors[i]})`;
                bar.style.color = colors[i];
                bar.style.width = '0%';
                bar.setAttribute('data-prob', (item.prob * 100).toFixed(2) + '%');

                barContainer.appendChild(bar);
                row.appendChild(label);
                row.appendChild(barContainer);
                container.appendChild(row);

                setTimeout(() => {
                    bar.style.width = Math.max(item.prob * 100, 3) + '%';
                }, 300 + i * 200);
            });
        }

        function drawSamplingVisualization() {
            const canvas = document.getElementById('samplingCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * 2;
            canvas.height = canvas.clientHeight * 2;
            ctx.scale(2, 2);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            const topK = getTopK(10);
            let frame = 0;
            let sampledIndex = -1;
            let samplingPhase = 0; // 0 = spinning, 1 = slowing, 2 = stopped

            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.fillRect(0, 0, w, h);

                // Draw probability pie/roulette wheel
                const centerX = w * 0.35;
                const centerY = h * 0.5;
                const radius = Math.min(w * 0.25, h * 0.4);

                let startAngle = frame * 0.02;
                const totalProb = topK.reduce((s, t) => s + t.prob, 0);

                topK.forEach((item, i) => {
                    const sliceAngle = (item.prob / totalProb) * Math.PI * 2;
                    const endAngle = startAngle + sliceAngle;

                    const hue = (i / topK.length) * 300;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fillStyle = `hsla(${hue}, 70%, 45%, 0.8)`;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Label
                    const midAngle = startAngle + sliceAngle / 2;
                    const labelR = radius * 0.65;
                    const lx = centerX + Math.cos(midAngle) * labelR;
                    const ly = centerY + Math.sin(midAngle) * labelR;

                    if (item.prob / totalProb > 0.05) {
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.font = '10px Courier New';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(item.word, lx, ly);
                    }

                    startAngle = endAngle;
                });

                // Draw pointer (needle)
                ctx.beginPath();
                ctx.moveTo(centerX + radius + 15, centerY);
                ctx.lineTo(centerX + radius + 5, centerY - 8);
                ctx.lineTo(centerX + radius + 5, centerY + 8);
                ctx.closePath();
                ctx.fillStyle = '#ff0000';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Right side: sampling explanation
                const textX = w * 0.65;
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '12px Courier New';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';

                const lines = [
                    '🎲 Sampling Prozess:',
                    '',
                    '1. Ziehe u ~ Uniform(0,1)',
                    '2. Finde Token wo kumulative',
                    '   Wahrscheinlichkeit > u',
                    '',
                    'Größere Segmente = höhere',
                    'Wahrscheinlichkeit gewählt',
                    'zu werden!',
                    '',
                    `Top Token: "${topK[0].word}"`,
                    `P = ${(topK[0].prob * 100).toFixed(1)}%`
                ];

                lines.forEach((line, i) => {
                    ctx.fillText(line, textX, 20 + i * 18);
                });

                // Cumulative distribution on the right bottom
                const cdX = w * 0.65;
                const cdY = h * 0.65;
                const cdW = w * 0.3;
                const cdH = h * 0.3;

                ctx.strokeStyle = 'rgba(0,255,136,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(cdX, cdY, cdW, cdH);

                ctx.beginPath();
                let cumProb = 0;
                topK.forEach((item, i) => {
                    const x = cdX + (i / topK.length) * cdW;
                    cumProb += item.prob / totalProb;
                    const y = cdY + cdH - cumProb * cdH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = 'var(--neon-green)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Random sample line
                const sampleY = cdY + cdH - (Math.sin(frame * 0.01) * 0.5 + 0.5) * cdH;
                ctx.strokeStyle = 'rgba(255,0,0,0.6)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(cdX, sampleY);
                ctx.lineTo(cdX + cdW, sampleY);
                ctx.stroke();
                ctx.setLineDash([]);

                frame++;
                if (currentStage === 5) requestAnimationFrame(animate);
            }
            animate();
        }

        // ============ NAVIGATION ============
        function updateProgressBar() {
            const dots = document.querySelectorAll('.stage-dot');
            dots.forEach((dot, i) => {
                dot.classList.remove('active', 'completed');
                if (i < currentStage) dot.classList.add('completed');
                if (i === currentStage) dot.classList.add('active');
            });

            const progress = ((currentStage) / (stages.length - 1)) * 100;
            document.getElementById('progressBar').style.setProperty('--progress', progress + '%');

            document.getElementById('btnPrev').disabled = currentStage === 0;
            document.getElementById('btnNext').disabled = currentStage === stages.length - 1;
            document.getElementById('btnNext').textContent = currentStage === stages.length - 1 ? '🎉 Fertig!' : 'Weiter →';
        }

        function nextStage() {
            if (currentStage < stages.length - 1) {
                currentStage++;
                renderStage(currentStage);
                updateProgressBar();
                emitParticles(window.innerWidth / 2, 200, stages[currentStage].color, 15);
            }
        }

        function prevStage() {
            if (currentStage > 0) {
                currentStage--;
                renderStage(currentStage);
                updateProgressBar();
            }
        }

        function goToStage(idx) {
            if (idx >= 0 && idx < stages.length) {
                currentStage = idx;
                renderStage(currentStage);
                updateProgressBar();
            }
        }

        // ============ KEYBOARD NAVIGATION ============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextStage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevStage();
            }
        });

        // ============ INITIAL SETUP ============
        // Auto-tokenize on load
        window.addEventListener('load', () => {
            // Add some ambient animation to the page
            setInterval(() => {
                const stars = document.querySelectorAll('.star');
                if (stars.length > 0) {
                    const randomStar = stars[Math.floor(Math.random() * stars.length)];
                    randomStar.style.opacity = Math.random();
                }
            }, 500);
        });
    </script>
</body>
